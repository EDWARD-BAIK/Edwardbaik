<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDWARD - Nonton Gratis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#fff;font-family:'Courier New',monospace;padding:10px}
.header{text-align:center;padding:15px;background:#2e7d32;border:4px solid #8b8b8b;margin-bottom:10px}
.header h1{font-size:24px;color:#fff;text-shadow:3px 3px 0 #1b5e20}
.header p{font-size:10px;color:#e8f5e9;margin-top:5px}
.search-wrap{display:flex;gap:6px;margin:10px 0}
.search-wrap input{flex:1;padding:10px;background:#c6c6c6;border:4px solid #555;color:#000;font-size:12px;outline:0}
.search-wrap button{padding:10px 18px;background:#4caf50;border:4px solid #8b8b8b;color:#fff;cursor:pointer;font-weight:bold}
.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding:8px 0;margin-bottom:8px}
.cat-scroll button{padding:8px 14px;background:#c6c6c6;border:4px solid #8b8b8b;cursor:pointer;white-space:nowrap;font-weight:bold}
.cat-scroll button.active{background:#4caf50;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-top:10px}
.card{background:#8b8b8b;border:4px solid #555;cursor:pointer;overflow:hidden}
.card .poster{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:#3a3a3a;color:#fff;text-align:center;padding:10px;font-size:10px;position:relative}
.card .poster span{position:relative;z-index:1;text-shadow:2px 2px 0 #000;padding:5px}
.card .info{padding:8px 10px;background:#c6c6c6}
.card .info h4{font-size:10px;color:#000}
.card .info p{font-size:8px;color:#555}
.player-wrap{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:10px}
.player-wrap .top{position:absolute;top:0;width:100%;padding:12px 16px;display:flex;justify-content:space-between;background:#1a1a1a;border-bottom:4px solid #4caf50;align-items:center}
.player-wrap .top .t{font-size:14px;font-weight:bold}
.player-wrap .top button{background:#4caf50;border:4px solid #8b8b8b;padding:6px 14px;color:#fff;cursor:pointer}
.player-wrap .top .close{background:#f44336}
.player-wrap iframe{width:100%;max-width:1100px;height:70vh;border:4px solid #4caf50;background:#000}
.player-wrap .servers{position:absolute;bottom:20px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;background:rgba(0,0,0,.8);padding:10px 16px;border:4px solid #555}
.player-wrap .servers button{background:#c6c6c6;border:4px solid #8b8b8b;padding:6px 14px;cursor:pointer}
.player-wrap .servers button.active{background:#4caf50;color:#fff}
.custom-link-wrap{display:flex;gap:8px;margin-top:10px;padding:8px;background:rgba(0,0,0,.5);border:4px solid #555;flex-wrap:wrap;width:95%;max-width:1100px;justify-content:center}
.custom-link-wrap input{flex:1;padding:8px 14px;background:#c6c6c6;border:4px solid #555;color:#000;outline:0;min-width:150px}
.custom-link-wrap button{background:#4caf50;border:4px solid #8b8b8b;padding:8px 18px;color:#fff;cursor:pointer}
.loading{text-align:center;padding:30px;color:#aaa;font-size:14px}
.footer{text-align:center;padding:20px 0 10px;border-top:4px solid #555;margin-top:15px}
.footer p{font-size:8px;color:#aaa}
.footer span{color:#4caf50}
</style>
</head>
<body>

<div class="header">
<h1>⛏️ EDWARD</h1>
<p>Nonton Anime, Movie, Donghua & Drama • 100% GRATIS</p>
</div>

<div class="search-wrap">
<input id="search" placeholder="Cari judul..." onkeyup="if(event.key==='Enter') search()">
<button onclick="search()">🔍 Cari</button>
</div>

<div class="cat-scroll" id="cat">
<button class="active" onclick="setCat('all')">🔥 Semua</button>
<button onclick="setCat('anime')">🎌 Anime</button>
<button onclick="setCat('donghua')">🐉 Donghua</button>
<button onclick="setCat('movie')">🎬 Movie</button>
<button onclick="setCat('kdrama')">🇰🇷 K-Drama</button>
<button onclick="setCat('classic')">📼 Classic</button>
</div>

<div id="grid" class="grid"></div>

<div class="footer"><p>© 2026 <span>EDWARD</span> • 100% GRATIS</p></div>

<div class="player-wrap" id="player">
<div class="top">
<span class="t" id="ptitle">🎬 Now Playing</span>
<div>
<button onclick="refreshPlayer()">🔄 Refresh</button>
<button onclick="nextServer()">⏭ Next</button>
<button class="close" onclick="closePlayer()">✕</button>
</div>
</div>
<iframe id="iframe" src="" allowfullscreen></iframe>
<div class="servers" id="sv">
<button class="active" onclick="switchSvr(0)">Server 1</button>
<button onclick="switchSvr(1)">Server 2</button>
<button onclick="switchSvr(2)">Server 3</button>
</div>
<div class="custom-link-wrap">
<input id="customLink" placeholder="Link alternatif...">
<button onclick="playCustomLink()">▶️ Putar</button>
</div>
</div>

<script>
// ===== DATA FILM =====
const FILMS = [
{title:'Attack on Titan',id:'tt2560140',type:'Anime'},
{title:'Demon Slayer',id:'tt9335498',type:'Anime'},
{title:'One Piece',id:'tt0388629',type:'Anime'},
{title:'Jujutsu Kaisen',id:'tt12343534',type:'Anime'},
{title:'Solo Leveling',id:'tt26635464',type:'Anime'},
{title:'Naruto',id:'tt0988824',type:'Anime'},
{title:'Bleach',id:'tt0434665',type:'Anime'},
{title:'Chainsaw Man',id:'tt11737520',type:'Anime'},
{title:'Soul Land',id:'tt10544940',type:'Donghua'},
{title:'Battle Through Heavens',id:'tt10544942',type:'Donghua'},
{title:'Final Destination 1',id:'tt0195714',type:'Movie'},
{title:'Final Destination 2',id:'tt0309593',type:'Movie'},
{title:'Final Destination 3',id:'tt0414982',type:'Movie'},
{title:'Final Destination 4',id:'tt1144884',type:'Movie'},
{title:'Final Destination 5',id:'tt1622979',type:'Movie'},
{title:'Merah Putih One For All',id:'tt12345678',type:'Movie'},
{title:'Deadpool 3',id:'tt6263850',type:'Movie'},
{title:'Avengers 5',id:'tt21361868',type:'Movie'},
{title:'Spider-Man 4',id:'tt31289056',type:'Movie'},
{title:'Squid Game S3',id:'tt19463462',type:'K-Drama'},
{title:'All of Us Are Dead',id:'tt23898882',type:'K-Drama'},
{title:'The Glory',id:'tt20859782',type:'K-Drama'},
{title:'The Godfather',id:'tt0068646',type:'Classic'},
{title:'The Dark Knight',id:'tt0468569',type:'Classic'}
];

// ===== SERVER =====
const SERVERS = [
    id => `https://vidsrc.to/embed/movie/${id}`,
    id => `https://embed.su/embed/${id}`,
    id => `https://vidsrc.cc/v2/embed/movie/${id}`
];

let curSvr = 0, curId = '', curCat = 'all', customUrl = '';

function getUrl(id){ return customUrl || SERVERS[curSvr](id); }

function switchSvr(i){ curSvr=i; document.querySelectorAll('#sv button').forEach((b,j)=>b.classList.toggle('active',j==i)); if(curId) document.getElementById('iframe').src=getUrl(curId); }

function nextServer(){ switchSvr((curSvr+1)%SERVERS.length); }

function refreshPlayer(){ if(curId) document.getElementById('iframe').src=getUrl(curId); }

function playCustomLink(){ const l=document.getElementById('customLink').value.trim(); if(!l) return alert('Masukkan link!'); customUrl=l; document.getElementById('iframe').src=l; document.getElementById('player').style.display='flex'; document.body.style.overflow='hidden'; document.getElementById('ptitle').textContent='🎬 Custom Link'; }

// ===== RENDER =====
function render(){
    let items = FILMS;
    if(curCat !== 'all'){
        items = FILMS.filter(i => 
            i.type.toLowerCase() === curCat.toLowerCase() ||
            (curCat === 'kdrama' && i.type === 'K-Drama') ||
            (curCat === 'classic' && i.type === 'Classic') ||
            (curCat === 'donghua' && i.type === 'Donghua')
        );
    }
    const grid = document.getElementById('grid');
    if(!items.length){ grid.innerHTML='<div class="loading">😞 Tidak ada hasil</div>'; return; }
    const colors = ['#4caf50','#ff5722','#2196f3','#ffc107','#9c27b0','#e91e63','#00bcd4','#8bc34a','#ff9800'];
    grid.innerHTML = items.map(i => {
        const color = colors[Math.floor(Math.random() * colors.length)];
        return `<div class="card" onclick="play('${i.id}','${i.title.replace(/'/g,"\\'")}')">
            <div class="poster" style="background:${color};">
                <span>${i.title}</span>
                <div style="position:absolute;bottom:6px;left:4px;right:4px;background:rgba(0,0,0,.7);padding:4px;font-size:8px;">${i.type}</div>
            </div>
            <div class="info"><h4>${i.title}</h4><p>${i.type}</p></div>
        </div>`;
    }).join('');
}

function search(){
    const q = document.getElementById('search').value.trim().toLowerCase();
    if(!q) return render();
    const f = FILMS.filter(i => i.title.toLowerCase().includes(q) || i.type.toLowerCase().includes(q));
    const grid = document.getElementById('grid');
    if(!f.length){ grid.innerHTML='<div class="loading">😞 Tidak ada hasil</div>'; return; }
    const colors = ['#4caf50','#ff5722','#2196f3','#ffc107','#9c27b0','#e91e63','#00bcd4','#8bc34a','#ff9800'];
    grid.innerHTML = f.map(i => {
        const color = colors[Math.floor(Math.random() * colors.length)];
        return `<div class="card" onclick="play('${i.id}','${i.title.replace(/'/g,"\\'")}')">
            <div class="poster" style="background:${color};">
                <span>${i.title}</span>
                <div style="position:absolute;bottom:6px;left:4px;right:4px;background:rgba(0,0,0,.7);padding:4px;font-size:8px;">${i.type}</div>
            </div>
            <div class="info"><h4>${i.title}</h4><p>${i.type}</p></div>
        </div>`;
    }).join('');
}

function setCat(c){ curCat=c; document.querySelectorAll('#cat button').forEach(b=>b.classList.remove('active')); document.querySelector(`#cat button[onclick="setCat('${c}')"]`).classList.add('active'); document.getElementById('search').value=''; render(); }

function play(id, title){
    curId=id; customUrl='';
    document.getElementById('ptitle').textContent='🎬 '+title;
    document.getElementById('iframe').src=getUrl(id);
    document.getElementById('player').style.display='flex';
    document.body.style.overflow='hidden';
    document.getElementById('customLink').value='';
}

function closePlayer(){
    document.getElementById('player').style.display='none';
    document.getElementById('iframe').src='';
    curId=''; customUrl='';
    document.body.style.overflow='auto';
}

// ===== START =====
window.onload = function(){ render(); };
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closePlayer(); });
</script>
</body>
</html>
