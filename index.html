<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - ESP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;padding:10px;min-height:100vh}
::selection{background:#ff2d55;color:#fff}
.header{text-align:center;padding:10px 0 5px;border-bottom:2px solid #00ff41;margin-bottom:10px}
.header h1{font-size:24px;color:#00ff41;text-shadow:0 0 20px rgba(0,255,65,.3);letter-spacing:2px}
.header h1 span{color:#ff2d55}
.header p{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stats div{background:#141b2b;border:1px solid rgba(0,255,65,.2);border-radius:8px;padding:6px;text-align:center}
.stats div span{display:block;font-size:20px;font-weight:700;color:#00ff41}
.stats div small{font-size:9px;color:rgba(255,255,255,.4)}
.camera-wrap{position:relative;width:100%;max-width:800px;margin:0 auto;border-radius:12px;overflow:hidden;border:2px solid #00ff41;background:#000}
.camera-wrap video{width:100%;display:block}
.camera-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.controls{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.controls button{background:rgba(0,255,65,.1);border:1px solid #00ff41;border-radius:30px;padding:8px 20px;color:#00ff41;font-weight:600;cursor:pointer;font-size:11px;font-family:'Courier New',monospace}
.controls button:active{transform:scale(.95)}
.controls button.active{background:#00ff41;color:#000}
.footer{text-align:center;padding:10px 0 5px;border-top:1px solid rgba(255,255,255,.05);margin-top:10px}
.footer p{font-size:8px;color:rgba(255,255,255,.2)}
.footer span{color:#00ff41}
</style>
</head>
<body>

<div class="header">
<h1>👁️ ED<span>WARD</span> <span style="color:#00ff41;font-size:12px;">· ESP</span></h1>
<p>Edward-esp2026 · ESP Tracker</p>
</div>

<div class="stats">
<div><small>TARGET</small><span id="objCount">0</span></div>
<div><small>FPS</small><span id="fpsCount">0</span></div>
<div><small>STATUS</small><span id="statusText" style="font-size:14px;">●</span></div>
</div>

<div class="camera-wrap">
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
</div>

<div class="controls">
<button id="btnStart" class="active" onclick="startCamera()">📷 Start</button>
<button id="btnStop" onclick="stopCamera()">⏹ Stop</button>
<button id="btnReset" onclick="resetTracker()">🔄 Reset</button>
</div>

<div class="footer"><p>© 2026 <span>EDWARD</span> · Edward-esp2026 · <span id="modelStatus">ESP Active</span></p></div>

<script>
let stream = null;
let running = false;
let animationId = null;
let frameCount = 0;
let lastFpsTime = Date.now();
let fps = 0;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const objCount = document.getElementById('objCount');
const fpsCount = document.getElementById('fpsCount');
const statusText = document.getElementById('statusText');
const modelStatus = document.getElementById('modelStatus');

let previousGray = null;
let target = null;
let targetHistory = [];
let trackingId = 0;
const motionThreshold = 20;
const minMotionPixels = 10;

async function startCamera() {
    try {
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 480 },
                height: { ideal: 360 }
            },
            audio: false
        });

        video.srcObject = stream;
        video.muted = true;
        
        await new Promise(resolve => {
            video.onloadedmetadata = () => resolve();
            setTimeout(resolve, 1500);
        });

        await video.play();
        
        statusText.textContent = '●';
        statusText.style.color = '#00ff41';
        document.getElementById('btnStart').classList.remove('active');

        canvas.width = video.videoWidth || 480;
        canvas.height = video.videoHeight || 360;

        if (!running) {
            running = true;
            detectLoop();
        }
    } catch(e) {
        alert('Error: ' + e.message);
        statusText.textContent = '✕';
        statusText.style.color = '#ff2d55';
    }
}

function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    running = false;
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    objCount.textContent = '0';
    target = null;
    previousGray = null;
    statusText.textContent = '⬤';
    statusText.style.color = '#ff4444';
    document.getElementById('btnStart').classList.add('active');
}

function resetTracker() {
    target = null;
    targetHistory = [];
    previousGray = null;
    objCount.textContent = '0';
}

async function detectLoop() {
    if (!running) return;
    await detect();
    animationId = requestAnimationFrame(detectLoop);
}

function detect() {
    if (!video.srcObject || video.readyState < 2) return;

    try {
        frameCount++;
        const now = Date.now();
        if (now - lastFpsTime > 1000) {
            fps = frameCount;
            frameCount = 0;
            lastFpsTime = now;
            fpsCount.textContent = fps;
        }

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        const gray = new Uint8Array(canvas.width * canvas.height);
        for (let i = 0; i < data.length; i += 4) {
            gray[i/4] = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
        }

        let foundTarget = false;
        let minX = canvas.width, maxX = 0, minY = canvas.height, maxY = 0;
        let motionPixels = 0;

        if (previousGray) {
            const diff = new Uint8Array(gray.length);
            for (let i = 0; i < gray.length; i++) {
                diff[i] = Math.abs(gray[i] - previousGray[i]);
            }

            const w = canvas.width;
            const h = canvas.height;
            const gridSize = 6;
            const cols = Math.floor(w / gridSize);
            const rows = Math.floor(h / gridSize);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let sum = 0, count = 0;
                    for (let dy = 0; dy < gridSize; dy++) {
                        for (let dx = 0; dx < gridSize; dx++) {
                            const idx = (r * gridSize + dy) * w + (c * gridSize + dx);
                            if (idx < diff.length) {
                                sum += diff[idx];
                                count++;
                            }
                        }
                    }
                    const avg = count > 0 ? sum / count : 0;
                    if (avg > motionThreshold) {
                        const cx = c * gridSize + gridSize/2;
                        const cy = r * gridSize + gridSize/2;
                        motionPixels++;
                        if (cx < minX) minX = cx;
                        if (cx > maxX) maxX = cx;
                        if (cy < minY) minY = cy;
                        if (cy > maxY) maxY = cy;
                        foundTarget = true;
                    }
                }
            }
        }

        previousGray = gray;

        if (foundTarget && motionPixels > minMotionPixels) {
            const padding = 25;
            let x = Math.max(0, minX - padding);
            let y = Math.max(0, minY - padding);
            let w = Math.min(canvas.width - x, maxX - minX + padding * 2);
            let h = Math.min(canvas.height - y, maxY - minY + padding * 2);

            if (!target) {
                target = {x, y, w, h, id: ++trackingId};
            } else {
                const smooth = 0.65;
                target.x = target.x * smooth + x * (1 - smooth);
                target.y = target.y * smooth + y * (1 - smooth);
                target.w = target.w * smooth + w * (1 - smooth);
                target.h = target.h * smooth + h * (1 - smooth);
            }
        }

        // ============================================
        // GAMBAR ESP
        // ============================================
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        const color = '#ff2d55';
        objCount.textContent = target ? 1 : 0;

        if (target) {
            const x = target.x;
            const y = target.y;
            const w = target.w;
            const h = target.h;

            // ===== TALI/GARIS DARI ATAS KOTAK =====
            ctx.strokeStyle = color;
            ctx.globalAlpha = 0.35;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 8]);
            
            // Garis vertikal dari atas kotak ke atas layar
            ctx.beginPath();
            ctx.moveTo(x + w/2, y);
            ctx.lineTo(x + w/2, 0);
            ctx.stroke();
            
            // Garis vertikal dari bawah kotak ke bawah layar
            ctx.beginPath();
            ctx.moveTo(x + w/2, y + h);
            ctx.lineTo(x + w/2, canvas.height);
            ctx.stroke();
            
            // Garis horizontal dari kiri kotak ke kiri layar
            ctx.beginPath();
            ctx.moveTo(x, y + h/2);
            ctx.lineTo(0, y + h/2);
            ctx.stroke();
            
            // Garis horizontal dari kanan kotak ke kanan layar
            ctx.beginPath();
            ctx.moveTo(x + w, y + h/2);
            ctx.lineTo(canvas.width, y + h/2);
            ctx.stroke();
            
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;

            // ===== BOUNDING BOX =====
            ctx.shadowColor = color;
            ctx.shadowBlur = 30;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0;

            // ===== CENTER CROSS =====
            ctx.strokeStyle = color;
            ctx.globalAlpha = 0.5;
            ctx.lineWidth = 1;
            const cx = x + w/2;
            const cy = y + h/2;
            const size = 12;
            ctx.beginPath();
            ctx.moveTo(cx - size, cy);
            ctx.lineTo(cx + size, cy);
            ctx.moveTo(cx, cy - size);
            ctx.lineTo(cx, cy + size);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // ===== JARAK =====
            const dist = Math.round(50 - (w * h) / 1500);
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.6;
            ctx.font = '10px Courier New';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'top';
            ctx.fillText(Math.max(3, dist) + 'm', x + w - 6, y + 6);
            ctx.globalAlpha = 1;

        } else {
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.font = '13px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('Gerakkan target di depan kamera', canvas.width/2, canvas.height/2);
        }

    } catch(e) {}
}

setTimeout(() => {
    startCamera();
}, 500);
</script>
</body>
</html>
