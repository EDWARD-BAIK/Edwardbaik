<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDWARD OMNI V.173</title>
    <style>
        :root { --neon: #00ff88; --bg: #050a0e; --red: #ff4757; --blue: #00bdff; --gold: #ffd700; }
        * { box-sizing: border-box; transition: 0.2s; outline: none; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin:0; padding: 15px; }
        .master-name { text-align: center; font-size: 24px; font-weight: 800; color: var(--neon); margin-bottom: 15px; text-transform: uppercase; text-shadow: 0 0 10px var(--neon); }
        .card { background: rgba(15, 25, 35, 0.95); border: 1px solid rgba(0,255,136,0.2); border-radius: 20px; padding: 18px; margin-bottom: 15px; }
        h3 { margin: 0 0 12px 0; font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; border-left: 3px solid var(--neon); padding-left: 10px; }
        .input-group { background: rgba(0,0,0,0.6); border: 1px solid rgba(0,255,136,0.3); border-radius: 12px; padding: 10px; margin-bottom: 10px; }
        .label-text { font-size: 10px; color: var(--neon); display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { background: transparent; border: none; color: #fff; width: 100%; padding: 5px; font-size: 14px; }
        option { background: #050a0e; color: #fff; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
        .btn-cast { background: var(--neon); color: #000; }
        .btn-scan { background: transparent; border: 1px solid var(--neon); color: var(--neon); }
        .mon-box { border: 1px solid rgba(0,255,136,0.3); padding: 10px; border-radius: 12px; text-align: center; color: var(--neon); font-size: 11px; font-weight: bold; background: rgba(0,0,0,0.3); margin-bottom: 10px; }
        #customNotif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--neon); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 800; display: none; z-index: 10001; }
    </style>
</head>
<body>
    <div id="customNotif"></div>
    <p class="master-name">EDWARD OMNI V.173</p>
    
    <div class="mon-box">CORE: BREAKER MODE | TARGET: GLOBAL</div>

    <div class="card">
        <h3>🎯 GLOBAL MANTRA SELECTOR (BUG HUNTER)</h3>
        <div class="input-group">
            <span class="label-text">TARGET SITE (Kosongkan untuk Global):</span>
            <input type="text" id="targetMain" placeholder="Contoh: facebook.com">
        </div>
        <div class="input-group">
            <span class="label-text">KATEGORI BUG/MANTRA:</span>
            <select id="mantraSelect">
                <option value='inurl:admin OR inurl:login'>Cari Panel Admin/Login</option>
                <option value='intitle:index.of "parent directory"'>Cari Folder Terbuka (Directory)</option>
                <option value='filetype:log inurl:log'>Cari File Log (Aktivitas User)</option>
                <option value='filetype:env "DB_PASSWORD"'>Cari File ENV (Password DB)</option>
                <option value='filetype:sql "INSERT INTO"'>Cari Bocoran Database SQL</option>
                <option value='inurl:phpmyadmin'>Cari Panel phpMyAdmin</option>
                <option value='"index of" "backup"'>Cari File Backup Situs</option>
                <option value='ext:txt "password"'>Cari File Teks Berisi Password</option>
            </select>
        </div>
        <button class="btn btn-cast" onclick="cast()">CAST GLOBAL MANTRA 🔮</button>
    </div>

    <div class="card">
        <h3>🛡️ DEEP AI LINK SCANNER</h3>
        <div class="input-group">
            <span class="label-text">SCAN ANY LINK:</span>
            <input type="text" id="scanInput" placeholder=" ">
        </div>
        <button class="btn btn-scan" onclick="analyze()">⚡ RUN DEEP SCAN</button>
    </div>

    <script>
        function notify(msg) {
            const n = document.getElementById('customNotif'); n.innerText = msg; n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 2000);
        }

        function cast() {
            const t = document.getElementById('targetMain').value;
            const m = document.getElementById('mantraSelect').value;
            
            // Jika target kosong, Google akan mencari di SELURUH dunia
            let query = t ? "site:" + t + " " + m : m;
            
            window.open("https://www.google.com/search?q=" + encodeURIComponent(query), "_blank");
            notify("BREAKER MANTRA CASTED!");
        }

        function analyze() {
            const url = document.getElementById('scanInput').value.toLowerCase();
            if(!url) return notify("LINK KOSONG!");
            notify("SCANNING DEEP CLOUD...");
            setTimeout(() => {
                const danger = ["dana", "kaget", "login", "verif", "id-", "secure", "claim", "gift"];
                const isPhish = danger.some(w => url.includes(w));
                alert(isPhish ? "🔥 DANGER: Link ini 100% PHISING!" : "✅ SAFE: Link terlihat bersih.");
            }, 800);
        }
    </script>
</body>
</html>
