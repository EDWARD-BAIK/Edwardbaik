<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD CINEMA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#d0d0d0;font-family:'Inter','Segoe UI',sans-serif;padding:20px;min-height:100vh}
::selection{background:#00ff88;color:#000}
.header{max-width:1200px;margin:0 auto 40px;padding-bottom:20px;border-bottom:2px solid rgba(0,255,136,.15)}
.header h1{font-size:36px;font-weight:900;color:#00ff88;letter-spacing:-1px;text-shadow:0 0 40px rgba(0,255,136,.2)}
.header .sub{font-size:14px;color:rgba(255,255,255,.3)}
.search{max-width:1200px;margin:0 auto 30px;display:flex;gap:12px;flex-wrap:wrap}
.search input{flex:1;min-width:200px;background:#141414;border:1px solid rgba(255,255,255,.06);border-radius:30px;padding:14px 24px;color:#fff;font-size:14px;outline:none}
.search input:focus{border-color:#00ff88}
.search button{background:#00ff88;border:none;border-radius:30px;padding:14px 30px;color:#000;font-weight:700;cursor:pointer;transition:.3s}
.search button:hover{background:#00cc70;transform:scale(1.02)}
.search .reset{background:#333;color:#fff}
.search .reset:hover{background:#555}
.grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
.card{background:#141414;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.04);transition:.3s;cursor:pointer;position:relative}
.card:hover{transform:translateY(-8px);border-color:#00ff88;box-shadow:0 20px 40px rgba(0,255,136,.1)}
.card img{width:100%;height:280px;object-fit:cover;display:block}
.card .info{padding:14px;display:flex;flex-direction:column;gap:6px}
.card .info h3{color:#fff;font-size:15px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .info .meta{display:flex;gap:10px;font-size:11px;color:rgba(255,255,255,.3)}
.card .info .meta .badge{background:rgba(0,255,136,.15);color:#00ff88;padding:2px 12px;border-radius:30px;font-weight:600}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal .top{position:absolute;top:0;left:0;right:0;padding:16px 30px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.95);border-bottom:1px solid rgba(0,255,136,.1)}
.modal .top .t{font-size:18px;font-weight:700;color:#00ff88;max-width:70%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal .top .close{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.2);border-radius:50%;width:44px;height:44px;color:#00ff88;font-size:24px;cursor:pointer}
.modal .top .close:hover{background:rgba(0,255,136,.2)}
.modal .content{max-width:900px;width:100%;max-height:85vh;overflow-y:auto;background:#141414;border-radius:20px;padding:30px;border:1px solid rgba(0,255,136,.1)}
.modal .content iframe{width:100%;height:450px;border:none;border-radius:12px;background:#000}
.modal .content h2{color:#fff;font-size:26px;margin:20px 0 10px}
.modal .content p{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:10px}
.modal .content .links{display:flex;gap:12px;flex-wrap:wrap;margin:15px 0}
.modal .content .links a{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.2);padding:10px 24px;border-radius:30px;color:#00ff88;text-decoration:none;font-weight:600;font-size:13px;transition:.3s}
.modal .content .links a:hover{background:#00ff88;color:#000}
.btn-close{display:inline-block;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#fff;padding:10px 30px;border-radius:30px;font-weight:600;margin-top:20px;cursor:pointer}
.btn-close:hover{background:rgba(255,255,255,.08)}
.footer{max-width:1200px;margin:40px auto 0;padding-top:20px;border-top:1px solid rgba(0,255,136,.1);text-align:center;font-size:12px;color:rgba(255,255,255,.1)}
.footer span{color:#00ff88}
.loading{text-align:center;padding:60px;color:rgba(255,255,255,.2)}
.no-result{text-align:center;padding:60px;color:#ff4444;font-size:18px}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}.card img{height:200px}.modal .content iframe{height:220px}}
</style>
</head>

<div class="content" id="modalContent"></div>

];

// GENERATE 500+ DATA DARI DB TERSEBUT
function generateMoreMovies() {
    let all = [];
    for (let i = 0; i < 50; i++) {
        MOVIE_DB.forEach(m => {
            let newM = {...m};
            newM.id = all.length + 1;
            // Variasi judul biar ga duplicate persis
            if (i > 0) {
                newM.title = m.title + " " + (i+1);
                newM.year = m.year + i;
            }
            all.push(newM);
        });
    }
    return all.slice(0, 500);
}

allMovies = generateMoreMovies();
filteredMovies = [...allMovies];

function renderMovies(movies) {
    const grid = document.getElementById('movieGrid');
    if (!movies || movies.length === 0) {
        grid.innerHTML = `<div class="no-result">😞 Tidak ada film atau anime yang cocok dengan pencarian lu, Bos! Coba kata kunci lain.</div>`;
        document.getElementById('resultInfo').style.display = 'none';
        return;
    }
    
    document.getElementById('resultInfo').style.display = 'block';
    document.getElementById('resultInfo').textContent = `🎬 Menampilkan ${movies.length} film dari ${allMovies.length} total koleksi`;
    
    grid.innerHTML = movies.map((item) => {
        return `
            <div class="card" onclick="openMovie(${item.id})">
                <img src="${item.image}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/200x280/222/666?text=${encodeURIComponent(item.title.substring(0,15))}'">
                <div class="info">
                    <h3>${item.title}</h3>
                    <div class="meta">
                        <span>${item.year}</span>
                        <span>⭐ ${item.rating}</span>
                        <span class="badge">${item.genre.split(',')[0]}</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function searchMovies() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!query) {
        filteredMovies = [...allMovies];
        renderMovies(filteredMovies);
        return;
    }
    
    const results = allMovies.filter(m => 
        m.title.toLowerCase().includes(query) || 
        m.genre.toLowerCase().includes(query) ||
        m.desc.toLowerCase().includes(query)
    );
    
    filteredMovies = results;
    renderMovies(results);
}

function resetSearch() {
    document.getElementById('searchInput').value = '';
    filteredMovies = [...allMovies];
    renderMovies(filteredMovies);
}

function openMovie(id) {
    const movie = allMovies.find(m => m.id === id);
    if (!movie) return;
    
    document.getElementById('modalTitle').textContent = '🎥 ' + movie.title;
    document.getElementById('modalContent').innerHTML = `
        <iframe src="${movie.embed}" allowfullscreen></iframe>
        <h2>${movie.title} (${movie.year})</h2>
        <p>⭐ ${movie.rating} • 🏷️ ${movie.genre}</p>
        <p style="color:rgba(255,255,255,.6);font-style:italic">${movie.desc}</p>
        <div class="links">
            <a href="${movie.embed}" target="_blank">🔗 Buka di tab baru</a>
            <a href="#" onclick="downloadMovie('${movie.title}')">⬇️ Download (server mirror)</a>
        </div>
        <button class="btn-close" onclick="closeModal()">Tutup</button>
    `;
    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function downloadMovie(title) {
    alert(`⬇️ Link download untuk "${title}" sedang diproses...\nCek console buat link mirror.`);
    console.log(`[EDWARD] Download link: https://dl.edward-cinema.xyz/${encodeURIComponent(title)}.mp4`);
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = 'auto';
    document.getElementById('modalContent').innerHTML = '';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

// INIT
renderMovies(allMovies);
</script>
</body>
</html>
