<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - Nonton Gratis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#141414;color:#fff;font-family:'Segoe UI',sans-serif;padding:0;min-height:100vh;overflow-x:hidden}
::selection{background:#e50914;color:#fff}

.navbar{position:fixed;top:0;left:0;right:0;padding:12px 30px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,#141414 0%,transparent 100%);z-index:100;transition:.3s}
.navbar.scrolled{background:#141414;box-shadow:0 2px 10px rgba(0,0,0,.5)}
.navbar .logo{font-size:24px;font-weight:900;color:#e50914;letter-spacing:-1px}
.navbar .logo span{color:#fff;font-weight:300}
.navbar .menu{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.navbar .menu a{color:#e5e5e5;text-decoration:none;font-size:13px;font-weight:500;cursor:pointer;transition:.2s}
.navbar .menu a:hover{color:#fff}
.navbar .menu .free-badge{background:#e50914;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;color:#fff}

.hero{height:70vh;display:flex;align-items:center;padding:0 30px;margin-top:60px;position:relative;background:linear-gradient(135deg,#0a0a0a 50%,transparent),url('https://image.tmdb.org/t/p/original/8Bd0r4A2M5vLxGfN6vF1jU9yWpI.jpg') center/cover no-repeat;transition:background .5s}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(0deg,#141414,transparent)}
.hero .content{position:relative;z-index:1;max-width:550px}
.hero .content .badge{background:#e50914;padding:4px 12px;border-radius:4px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:8px}
.hero .content h1{font-size:42px;font-weight:900;text-shadow:0 2px 20px rgba(0,0,0,.8);margin-bottom:8px}
.hero .content p{font-size:14px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:16px}
.hero .content .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 28px;border-radius:6px;border:0;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;background:#fff;color:#000;text-decoration:none}
.hero .content .btn:hover{background:rgba(255,255,255,.75)}

.search-wrap{position:relative;z-index:1;margin:15px 30px;display:flex;gap:10px;background:rgba(255,255,255,.05);border-radius:30px;padding:4px;border:1px solid rgba(255,255,255,.1)}
.search-wrap input{flex:1;background:0;border:0;padding:12px 18px;color:#fff;font-size:14px;outline:0}
.search-wrap input::placeholder{color:rgba(255,255,255,.4)}
.search-wrap button{background:#e50914;border:0;border-radius:30px;padding:10px 24px;color:#fff;font-weight:600;cursor:pointer;font-size:13px}
.search-wrap button:active{transform:scale(.95)}

.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 30px 10px;scrollbar-width:none;position:relative;z-index:1}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-scroll button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:30px;padding:6px 18px;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap;transition:.2s}
.cat-scroll button.active{background:#e50914;border-color:#e50914;color:#fff}
.cat-scroll button:active{transform:scale(.95)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;padding:10px 30px 30px;position:relative;z-index:1}
.card{background:#1a1a1a;border-radius:10px;overflow:hidden;cursor:pointer;transition:.3s;border:1px solid transparent}
.card:hover{transform:scale(1.05);border-color:#e50914;z-index:5;box-shadow:0 10px 30px rgba(0,0,0,.8)}
.card .poster{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;font-size:12px;font-weight:700;color:#fff;position:relative;background:#1a2335}
.card .poster img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.card .poster span{position:relative;z-index:1;text-shadow:0 2px 10px rgba(0,0,0,.8);padding:4px}
.card .poster .label{position:absolute;bottom:6px;left:6px;right:6px;background:rgba(0,0,0,.8);padding:4px 8px;border-radius:6px;font-size:9px;font-weight:400;z-index:1}
.card .info{padding:10px 12px}
.card .info h4{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .info p{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}

.loading{text-align:center;padding:40px;color:rgba(255,255,255,.4);font-size:14px;grid-column:1/-1}

.player-wrap{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.98);z-index:9999;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px;padding-top:60px}
.player-wrap .top{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.9);border-bottom:2px solid #e50914;flex-wrap:wrap;gap:6px;z-index:10}
.player-wrap .top .t{font-size:13px;font-weight:600;max-width:50%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-wrap .top .actions{display:flex;gap:5px;flex-wrap:wrap}
.player-wrap .top .actions button{background:#e50914;border:0;border-radius:20px;padding:5px 12px;color:#fff;font-weight:600;font-size:10px;cursor:pointer}
.player-wrap .top .actions button:active{transform:scale(.95)}
.player-wrap .top .close{background:#e50914}
.player-wrap iframe{width:100%;max-width:1100px;height:65vh;border-radius:12px;border:2px solid #e50914;background:#000;flex-shrink:0;border:none;outline:none}
.player-wrap .server-divider{width:80%;max-width:800px;height:2px;background:linear-gradient(90deg,transparent,#e50914,transparent);margin:8px 0;opacity:.6;flex-shrink:0}
.player-wrap .server-area{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;background:rgba(0,0,0,.7);padding:8px 14px;border-radius:30px;backdrop-filter:blur(8px);z-index:10;max-width:95%;border:1px solid rgba(229,9,20,.2);min-width:120px;flex-shrink:0}
.player-wrap .server-area button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:30px;padding:6px 10px;color:#fff;font-size:10px;cursor:pointer;transition:.2s;font-weight:500;text-align:center}
.player-wrap .server-area button.active{background:#e50914;border-color:#e50914;box-shadow:0 0 20px rgba(229,9,20,.3)}
.player-wrap .server-area button:active{transform:scale(.95)}
.player-wrap .server-area button:hover{background:rgba(229,9,20,.2)}

.footer{text-align:center;padding:15px 0 8px;border-top:1px solid rgba(255,255,255,.05);position:relative;z-index:1}
.footer p{font-size:9px;color:rgba(255,255,255,.2)}
.footer span{color:#e50914}
</style>
</head>
<body>

<div class="navbar" id="navbar">
<div class="logo">ED<span>WARD</span></div>
<div class="menu">
<a onclick="loadTrending()">🔥 Trending</a>
<a onclick="setCat('movie')">🎬 Movie</a>
<a onclick="setCat('anime')">🎌 Anime</a>
<a class="free-badge">100% GRATIS</a>
</div>
</div>

<div class="hero" id="hero">
<div class="content">
<div class="badge" id="heroBadge">🔥 TRENDING</div>
<h1 id="heroTitle">EDWARD</h1>
<p id="heroDesc">Nonton semua film & anime gratis. Tanpa batas. Tanpa iklan.</p>
<button class="btn" id="heroBtn" onclick="playHero()">▶️ Putar Sekarang</button>
</div>
</div>

<div class="search-wrap">
<input id="search" placeholder="Cari film, anime, atau series..." onkeyup="if(event.key==='Enter') search()">
<button onclick="search()">🔍 Cari</button>
</div>

<div class="cat-scroll" id="cat">
<button class="active" onclick="setCat('all')">🔥 Semua</button>
<button onclick="setCat('movie')">🎬 Movie</button>
<button onclick="setCat('anime')">🎌 Anime</button>
<button onclick="setCat('tv')">📺 TV</button>
</div>

<div id="grid" class="grid"><div class="loading">🔥 Memuat daftar film...</div></div>

<div class="footer"><p>© 2026 <span>EDWARD</span> • 100% GRATIS</p></div>

<div class="player-wrap" id="player">
<div class="top">
<span class="t" id="ptitle">🎬 Now Playing</span>
<div class="actions">
<button onclick="refreshPlayer()">🔄 Refresh</button>
<button onclick="nextServer()">⏭ Next</button>
<button class="close" onclick="closePlayer()">✕</button>
</div>
</div>
<iframe id="iframe" src="" allowfullscreen></iframe>
<div class="server-divider"></div>
<div class="server-area" id="sv"></div>
</div>

<script>
// ============================================
// CONSUMET API - GA PAKE PROXY!
// ============================================
const CONSUMET = 'https://api.consumet.org';

// ============================================
// SERVER PLAYER
// ============================================
const SERVERS = [
    id => `https://vidsrc.in/embed/movie/${id}`,
    id => `https://vidsrc.me/embed/${id}`
];
const SERVER_NAMES = ['S1', 'S2'];

let curSvr = 0, curId = '', curCat = 'all', heroData = null;

function getUrl(id){ return SERVERS[curSvr](id); }

function switchSvr(i){ 
    curSvr = i; 
    document.querySelectorAll('#sv button').forEach((b,j) => b.classList.toggle('active', j === i)); 
    if(curId) document.getElementById('iframe').src = getUrl(curId); 
}

function nextServer(){ 
    const next = (curSvr + 1) % SERVERS.length; 
    switchSvr(next); 
}

function refreshPlayer(){ 
    if(curId) document.getElementById('iframe').src = getUrl(curId); 
}

function renderServers(){
    const container = document.getElementById('sv');
    container.innerHTML = SERVERS.map((_, i) => 
        `<button class="${i === curSvr ? 'active' : ''}" onclick="switchSvr(${i})">${SERVER_NAMES[i]}</button>`
    ).join('');
}

// ============================================
// LOAD TRENDING
// ============================================
async function loadTrending(){
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">Loading...</div>';
    
    try {
        const url = `${CONSUMET}/anime/gogoanime/top-airing`;
        const resp = await fetch(url);
        const data = await resp.json();
        
        if(data.results && data.results.length > 0){
            const items = data.results.map(i => ({
                title: i.title || 'Unknown',
                id: i.id || '',
                type: 'Anime',
                img: i.image || 'https://via.placeholder.com/200x300/1a2335/fff?text=No+Image',
                overview: i.synopsis || 'Anime rekomendasi untukmu.',
                year: i.releaseDate || ''
            }));
            renderResults(items);
            if(items.length > 0) {
                heroData = items[0];
                updateHero(heroData);
            }
        } else {
            grid.innerHTML = '<div class="loading">😞 Gagal memuat data</div>';
        }
    } catch(e){
        grid.innerHTML = '<div class="loading">⚠️ Error: ' + e.message + '</div>';
    }
}

// ============================================
// SEARCH
// ============================================
async function search(){
    const q = document.getElementById('search').value.trim();
    if(!q) return loadTrending();
    
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">Mencari...</div>';
    
    try {
        const url = `${CONSUMET}/anime/gogoanime/${encodeURIComponent(q)}`;
        const resp = await fetch(url);
        const data = await resp.json();
        
        if(data.results && data.results.length > 0){
            const items = data.results.map(i => ({
                title: i.title || 'Unknown',
                id: i.id || '',
                type: 'Anime',
                img: i.image || 'https://via.placeholder.com/200x300/1a2335/fff?text=No+Image',
                overview: i.synopsis || '',
                year: i.releaseDate || ''
            }));
            renderResults(items);
            if(items.length > 0) {
                heroData = items[0];
                updateHero(heroData);
            }
        } else {
            grid.innerHTML = '<div class="loading">😞 Tidak ada hasil</div>';
        }
    } catch(e){
        grid.innerHTML = '<div class="loading">⚠️ Error: ' + e.message + '</div>';
    }
}

// ============================================
// RENDER
// ============================================
function renderResults(items){
    const grid = document.getElementById('grid');
    if(!items || items.length === 0){
        grid.innerHTML = '<div class="loading">😞 Tidak ada hasil</div>';
        return;
    }
    
    grid.innerHTML = items.map(i => {
        const title = i.title || 'Unknown';
        const poster = i.img || 'https://via.placeholder.com/200x300/1a2335/fff?text=' + encodeURIComponent(title);
        const type = i.type || 'Anime';
        const id = i.id || '';
        const year = i.year || '';
        const yearStr = year ? year.substring(0,4) : '';
        
        return `<div class="card" onclick="play('${id}','${title.replace(/'/g,"\\'")}','${type}')">
            <div class="poster">
                <img src="${poster}" onerror="this.src='https://via.placeholder.com/200x300/1a2335/fff?text=${encodeURIComponent(title)}'">
                <span>${title}</span>
                <div class="label">${type} ${yearStr ? '• '+yearStr : ''}</div>
            </div>
            <div class="info"><h4>${title}</h4><p>${type}</p></div>
        </div>`;
    }).join('');
}

// ============================================
// UPDATE HERO
// ============================================
function updateHero(item){
    if(!item) return;
    const title = item.title || 'EDWARD';
    const desc = item.overview || 'Nonton semua film & anime gratis. Tanpa batas. Tanpa iklan.';
    const poster = item.img || 'https://image.tmdb.org/t/p/original/8Bd0r4A2M5vLxGfN6vF1jU9yWpI.jpg';
    const type = item.type || 'Anime';
    const id = item.id || 'tt2560140';
    
    document.getElementById('heroTitle').textContent = title;
    document.getElementById('heroDesc').textContent = desc.substring(0, 150) + '...';
    document.getElementById('heroBadge').textContent = '🔥 ' + type.toUpperCase();
    document.getElementById('hero').style.background = `linear-gradient(135deg, #0a0a0a 50%, transparent), url(${poster}) center/cover no-repeat`;
    document.getElementById('heroBtn').setAttribute('onclick', `play('${id}','${title.replace(/'/g,"\\'")}','${type}')`);
}

function playHero(){
    if(heroData){
        const title = heroData.title || 'EDWARD';
        const type = heroData.type || 'Anime';
        play(heroData.id, title, type);
    }
}

// ============================================
// SET CATEGORY
// ============================================
function setCat(c){
    curCat = c;
    document.querySelectorAll('#cat button').forEach(b => b.classList.remove('active'));
    document.querySelector(`#cat button[onclick="setCat('${c}')"]`).classList.add('active');
    const q = document.getElementById('search').value.trim();
    if(q) search();
    else loadTrending();
}

// ============================================
// PLAY
// ============================================
function play(id, title, type){
    curId = id;
    document.getElementById('ptitle').textContent = '🎬 ' + title;
    document.getElementById('iframe').src = getUrl(id);
    document.getElementById('player').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    renderServers();
}

function closePlayer(){
    document.getElementById('player').style.display = 'none';
    document.getElementById('iframe').src = '';
    curId = '';
    document.body.style.overflow = 'auto';
}

// ============================================
// SCROLL
// ============================================
window.addEventListener('scroll', function(){
    const navbar = document.getElementById('navbar');
    if(window.scrollY > 50) navbar.classList.add('scrolled');
    else navbar.classList.remove('scrolled');
});

// ============================================
// INIT
// ============================================
window.onload = function(){ 
    loadTrending(); 
    renderServers();
};
document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closePlayer(); });
</script>
</body>
</html>
