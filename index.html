<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDWARD - Real Time Sky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            transition: background 1.5s ease;
            background: linear-gradient(180deg, #0b0e1a 0%, #1a1f33 100%);
        }

        /* ===== LANGIT ===== */
        .sky {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            transition: background 1.5s ease;
        }

        /* ===== MATAHARI ===== */
        .sun {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffdd55, #ff8800);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(255, 200, 50, 0.8), 0 0 160px rgba(255, 150, 0, 0.4);
            transition: all 0.5s ease;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* ===== BULAN ===== */
        .moon {
            position: absolute;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 35% 35%, #f0f0f0, #aaaac0);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(200, 200, 255, 0.3), 0 0 120px rgba(150, 150, 255, 0.1);
            transition: all 0.5s ease;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .moon::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 15px;
            width: 18px;
            height: 18px;
            background: rgba(180, 180, 200, 0.3);
            border-radius: 50%;
            box-shadow: 20px 20px 0 5px rgba(180, 180, 200, 0.2), 40px 5px 0 3px rgba(180, 180, 200, 0.15);
        }

        /* ===== BINTANG ===== */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 2s ease;
        }
        .star.visible {
            opacity: 0.8;
        }

        /* ===== HORIZON ===== */
        .horizon {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(0deg, rgba(20, 30, 50, 0.6) 0%, transparent 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* ===== INFO ===== */
        .info {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            color: white;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            padding: 16px 32px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }
        .info h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #00ff88;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.15);
        }
        .info .clock {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }
        .info .status {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-top: 4px;
            opacity: 0.6;
            text-transform: uppercase;
        }

        /* ===== LOKASI ===== */
        .location {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            pointer-events: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .info {
                top: 16px;
                padding: 12px 20px;
                width: 90%;
            }
            .info h1 {
                font-size: 20px;
            }
            .info .clock {
                font-size: 26px;
            }
            .sun {
                width: 55px;
                height: 55px;
            }
            .moon {
                width: 50px;
                height: 50px;
            }
            .location {
                font-size: 10px;
                padding: 6px 14px;
                bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="sky" id="sky">
        <!-- Bintang -->
        <div class="stars" id="stars"></div>

        <!-- Matahari -->
        <div class="sun" id="sun"></div>

        <!-- Bulan -->
        <div class="moon" id="moon"></div>

        <!-- Horizon -->
        <div class="horizon"></div>

        <!-- Info -->
        <div class="info">
            <h1>⬡ EDWARD</h1>
            <div class="clock" id="clock">--:--:--</div>
            <div class="status" id="status">Mencari lokasi...</div>
        </div>

        <!-- Lokasi -->
        <div class="location" id="location">🌍 Menunggu izin lokasi...</div>
    </div>

    <script>
        // ============================================
        // GENERATE BINTANG
        // ============================================
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 70 + '%';
            star.style.width = (Math.random() * 2.5 + 1) + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = (Math.random() * 3) + 's';
            starsContainer.appendChild(star);
        }
        const starElements = document.querySelectorAll('.star');

        // ============================================
        // ELEMEN
        // ============================================
        const sky = document.getElementById('sky');
        const sun = document.getElementById('sun');
        const moon = document.getElementById('moon');
        const clockEl = document.getElementById('clock');
        const statusEl = document.getElementById('status');
        const locationEl = document.getElementById('location');

        let userLat = -6.2088; // Default: Jakarta
        let userLng = 106.8456;
        let isNight = false;

        // ============================================
        // MINTAA IZIN LOKASI
        // ============================================
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        userLat = pos.coords.latitude;
                        userLng = pos.coords.longitude;
                        locationEl.textContent = `🌍 ${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
                        statusEl.textContent = 'Lokasi ditemukan ✅';
                        updateSky();
                    },
                    (err) => {
                        locationEl.textContent = '⚠️ Izin lokasi ditolak, gunakan default (Jakarta)';
                        statusEl.textContent = 'Menggunakan lokasi default';
                        console.warn('Geolocation error:', err.message);
                        updateSky();
                    },
                    { enableHighAccuracy: true }
                );
            } else {
                locationEl.textContent = '⚠️ Geolocation tidak didukung browser';
                statusEl.textContent = 'Menggunakan lokasi default';
                updateSky();
            }
        }

        // ============================================
        // HITUNG POSISI MATAHARI & BULAN
        // ============================================
        function calculateSunPosition(lat, lng, now) {
            const hours = now.getHours() + now.getMinutes() / 60;
            // Sederhana: 6:00 = sunrise (0%), 12:00 = puncak (100%), 18:00 = sunset (0%)
            let progress = (hours - 6) / 12; // 0 = sunrise, 1 = sunset
            if (progress < 0) progress = 0;
            if (progress > 1) progress = 1;

            // Posisi X: kiri ke kanan
            const x = progress * 100;
            // Posisi Y: parabola (0 = horizon, 1 = puncak)
            const y = Math.sin(progress * Math.PI) * 70 + 10; // 10% = horizon, 80% = puncak

            return { x, y, progress };
        }

        function getSunriseSunset(lat, lng, now) {
            // Estimasi sederhana (bisa pakai rumus lebih akurat nanti)
            const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            const declination = 23.44 * Math.sin((360 / 365) * (dayOfYear - 81) * Math.PI / 180);
            const latRad = lat * Math.PI / 180;
            const declRad = declination * Math.PI / 180;
            const cosHourAngle = -Math.tan(latRad) * Math.tan(declRad);
            let hourAngle = Math.acos(Math.min(1, Math.max(-1, cosHourAngle))) * 180 / Math.PI;
            hourAngle = hourAngle / 15;

            const sunrise = 12 - hourAngle;
            const sunset = 12 + hourAngle;
            return { sunrise, sunset };
        }

        // ============================================
        // UPDATE SKY
        // ============================================
        function updateSky() {
            const now = new Date();
            const hours = now.getHours() + now.getMinutes() / 60;

            // Hitung sunrise/sunset berdasarkan lokasi
            const { sunrise, sunset } = getSunriseSunset(userLat, userLng, now);

            // Tentukan apakah malam
            isNight = hours < sunrise || hours > sunset;

            // Update status
            if (isNight) {
                statusEl.textContent = '🌙 Malam';
            } else {
                statusEl.textContent = '☀️ Siang';
            }

            // Update background langit
            if (isNight) {
                sky.style.background = 'linear-gradient(180deg, #05080f 0%, #0b1424 40%, #1a1f33 100%)';
            } else {
                // Gradasi berdasarkan posisi matahari
                const progress = (hours - sunrise) / (sunset - sunrise);
                const clamped = Math.min(1, Math.max(0, progress));
                const r = Math.round(20 + 135 * clamped);
                const g = Math.round(30 + 150 * (1 - Math.abs(clamped - 0.5) * 2));
                const b = Math.round(60 + 150 * (1 - clamped));
                sky.style.background = `linear-gradient(180deg, rgb(${r}, ${g}, ${b}) 0%, rgb(${r/2}, ${g/2}, ${b/2}) 100%)`;
            }

            // Update posisi matahari
            const sunProgress = (hours - sunrise) / (sunset - sunrise);
            const sunClamped = Math.min(1, Math.max(0, sunProgress));
            const sunX = sunClamped * 90 + 5;
            const sunY = Math.sin(sunClamped * Math.PI) * 60 + 15;

            sun.style.left = sunX + '%';
            sun.style.top = sunY + '%';
            sun.style.opacity = isNight ? '0' : '1';

            // Update posisi bulan (kebalikan dari matahari)
            const moonProgress = 1 - sunClamped;
            const moonX = moonProgress * 90 + 5;
            const moonY = Math.sin(moonProgress * Math.PI) * 60 + 15;

            moon.style.left = moonX + '%';
            moon.style.top = moonY + '%';
            moon.style.opacity = isNight ? '1' : '0.2';

            // Update bintang
            starElements.forEach(star => {
                const shouldShow = isNight && Math.random() > 0.2;
                star.classList.toggle('visible', shouldShow);
            });

            // Update jam
            clockEl.textContent = now.toLocaleTimeString('id-ID', { hour12: false });
        }

        // ============================================
        // LOOP
        // ============================================
        setInterval(() => {
            updateSky();
        }, 1000);

        // ============================================
        // START
        // ============================================
        getLocation();

        // Fallback: update tiap menit biar posisi matahari halus
        setInterval(() => {
            updateSky();
        }, 30000);
    </script>
</body>
</html>
