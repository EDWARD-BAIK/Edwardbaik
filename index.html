<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - Musik Gratis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#121212;color:#fff;font-family:'Segoe UI',sans-serif;padding:0;min-height:100vh;overflow-x:hidden}
::selection{background:#1db954;color:#fff}

.navbar{position:fixed;top:0;left:0;right:0;padding:12px 30px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,#121212 0%,transparent 100%);z-index:100;transition:.3s}
.navbar.scrolled{background:#121212;box-shadow:0 2px 10px rgba(0,0,0,.5)}
.navbar .logo{font-size:28px;font-weight:900;color:#1db954;letter-spacing:-1px}
.navbar .logo span{color:#fff;font-weight:300}
.navbar .sub{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;margin-left:5px}
.navbar .menu{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.navbar .menu a{color:#e5e5e5;text-decoration:none;font-size:13px;font-weight:500;cursor:pointer;transition:.2s}
.navbar .menu a:hover{color:#fff}
.navbar .menu .free-badge{background:#1db954;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;color:#121212}

.hero{height:55vh;display:flex;align-items:center;padding:0 30px;margin-top:60px;position:relative;background:linear-gradient(135deg,#121212 50%,transparent),url('https://i.ytimg.com/vi/4NRXx6U8ABQ/hqdefault.jpg') center/cover no-repeat;transition:background .5s}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(0deg,#121212,transparent)}
.hero .content{position:relative;z-index:1;max-width:550px}
.hero .content .badge{background:#1db954;padding:4px 12px;border-radius:4px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:8px;color:#121212}
.hero .content h1{font-size:42px;font-weight:900;text-shadow:0 2px 20px rgba(0,0,0,.8);margin-bottom:4px}
.hero .content .subtitle{font-size:12px;color:rgba(255,255,255,.3);letter-spacing:3px;margin-bottom:16px}
.hero .content p{font-size:14px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:16px}
.hero .content .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 28px;border-radius:30px;border:0;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;background:#1db954;color:#121212;text-decoration:none}
.hero .content .btn:hover{background:rgba(29,185,84,.75)}

.search-wrap{position:relative;z-index:1;margin:15px 30px;display:flex;gap:10px;background:rgba(255,255,255,.05);border-radius:30px;padding:4px;border:1px solid rgba(255,255,255,.1)}
.search-wrap input{flex:1;background:0;border:0;padding:12px 18px;color:#fff;font-size:14px;outline:0}
.search-wrap input::placeholder{color:rgba(255,255,255,.4)}
.search-wrap button{background:#1db954;border:0;border-radius:30px;padding:10px 24px;color:#121212;font-weight:600;cursor:pointer;font-size:13px}
.search-wrap button:active{transform:scale(.95)}

.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 30px 10px;scrollbar-width:none;position:relative;z-index:1}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-scroll button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:30px;padding:6px 18px;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap;transition:.2s}
.cat-scroll button.active{background:#1db954;border-color:#1db954;color:#121212}
.cat-scroll button:active{transform:scale(.95)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px;padding:10px 30px 30px;position:relative;z-index:1}
.card{background:#181818;border-radius:10px;overflow:hidden;cursor:pointer;transition:.3s;border:1px solid transparent;padding-bottom:10px}
.card:hover{transform:scale(1.05);border-color:#1db954;z-index:5;box-shadow:0 10px 30px rgba(0,0,0,.8)}
.card .poster{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;font-size:12px;font-weight:700;color:#fff;position:relative;background:#1a2335}
.card .poster img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.card .poster span{position:relative;z-index:1;text-shadow:0 2px 10px rgba(0,0,0,.8);padding:4px}
.card .poster .label{position:absolute;bottom:6px;left:6px;right:6px;background:rgba(0,0,0,.8);padding:4px 8px;border-radius:6px;font-size:9px;font-weight:400;z-index:1}
.card .info{padding:10px 12px}
.card .info h4{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .info p{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}

.loading{text-align:center;padding:40px;color:rgba(255,255,255,.4);font-size:14px;grid-column:1/-1}

.player-wrap{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.95);z-index:9999;padding:15px 20px;border-top:2px solid #1db954}
.player-wrap .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.player-wrap .top .t{font-size:14px;font-weight:600;max-width:50%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-wrap .top .actions{display:flex;gap:10px;align-items:center}
.player-wrap .top .actions button{background:#1db954;border:0;border-radius:30px;padding:8px 16px;color:#121212;font-weight:600;cursor:pointer;font-size:11px}
.player-wrap .top .actions button:active{transform:scale(.95)}
.player-wrap .top .close{background:#ff4444;color:#fff}
.player-wrap iframe{width:100%;max-width:1100px;height:60vh;border-radius:12px;border:2px solid #1db954;background:#000;flex-shrink:0;border:none;outline:none;margin-top:10px}
.player-wrap .server-divider{width:80%;max-width:800px;height:2px;background:linear-gradient(90deg,transparent,#1db954,transparent);margin:8px 0;opacity:.6;flex-shrink:0}
.player-wrap .server-area{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;background:rgba(0,0,0,.7);padding:8px 14px;border-radius:30px;backdrop-filter:blur(8px);z-index:10;max-width:95%;border:1px solid rgba(29,185,84,.2);min-width:120px;flex-shrink:0}
.player-wrap .server-area button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:30px;padding:6px 10px;color:#fff;font-size:10px;cursor:pointer;transition:.2s;font-weight:500;text-align:center}
.player-wrap .server-area button.active{background:#1db954;border-color:#1db954;color:#121212;box-shadow:0 0 20px rgba(29,185,84,.3)}
.player-wrap .server-area button:active{transform:scale(.95)}
.player-wrap .server-area button:hover{background:rgba(29,185,84,.2)}

.footer{text-align:center;padding:15px 0 8px;border-top:1px solid rgba(255,255,255,.05);position:relative;z-index:1}
.footer p{font-size:9px;color:rgba(255,255,255,.2)}
.footer span{color:#1db954}
</style>
</head>
<body>

<div class="navbar" id="navbar">
<div class="logo">ED<span>WARD</span></div>
<div class="menu">
<a onclick="loadTrending()">🔥 Trending</a>
<a onclick="loadCharts()">🎵 Charts</a>
<a class="free-badge">GRATIS</a>
</div>
</div>

<div class="hero" id="hero">
<div class="content">
<div class="badge">🎵 TRENDING</div>
<h1 id="heroTitle">EDWARD</h1>
<div class="subtitle">Edward's 2026 artificial code</div>
<p id="heroDesc">Dengarkan semua musik gratis. Tanpa batas. Tanpa iklan.</p>
<button class="btn" id="heroBtn" onclick="playHero()">▶️ Putar Sekarang</button>
</div>
</div>

<div class="search-wrap">
<input id="search" placeholder="Cari lagu, artis, atau album..." onkeyup="if(event.key==='Enter') search()">
<button onclick="search()">🔍 Cari</button>
</div>

<div class="cat-scroll" id="cat">
<button class="active" onclick="loadTrending()">🔥 Trending</button>
<button onclick="loadCharts()">📊 Charts</button>
<button onclick="loadRandom()">🎲 Random</button>
</div>

<div id="grid" class="grid"><div class="loading">🔥 Memuat daftar lagu...</div></div>

<div class="footer"><p>© 2026 <span>EDWARD</span> • Edward's 2026 artificial code</p></div>

<div class="player-wrap" id="player">
<div class="top">
<span class="t" id="ptitle">🎵 Now Playing</span>
<div class="actions">
<button onclick="refreshPlayer()">🔄 Refresh</button>
<button onclick="nextServer()">⏭ Next</button>
<button class="close" onclick="closePlayer()">✕</button>
</div>
</div>
<iframe id="iframe" src="" allowfullscreen></iframe>
<div class="server-divider"></div>
<div class="server-area" id="sv"></div>
</div>

<script>
// ============================================
// PROXY CORS BUAT YOUTUBE MUSIC API
// ============================================
const PROXY = 'https://api.allorigins.win/raw?url=';
const YT_API = 'https://api.ytmusicapi.com';

// ============================================
// SERVER PLAYER
// ============================================
const SERVERS = [
    id => `https://www.youtube.com/embed/${id}`,
    id => `https://www.youtube.com/embed/${id}`
];
const SERVER_NAMES = ['▶️ YouTube', '▶️ YouTube 2'];

let curSvr = 0, curId = '', curCat = 'all', heroData = null;

function getUrl(id){ return SERVERS[curSvr](id); }

function switchSvr(i){ 
    curSvr = i; 
    document.querySelectorAll('#sv button').forEach((b,j) => b.classList.toggle('active', j === i)); 
    if(curId) document.getElementById('iframe').src = getUrl(curId); 
}

function nextServer(){ 
    const next = (curSvr + 1) % SERVERS.length; 
    switchSvr(next); 
}

function refreshPlayer(){ 
    if(curId) document.getElementById('iframe').src = getUrl(curId); 
}

function renderServers(){
    const container = document.getElementById('sv');
    container.innerHTML = SERVERS.map((_, i) => 
        `<button class="${i === curSvr ? 'active' : ''}" onclick="switchSvr(${i})">${SERVER_NAMES[i]}</button>`
    ).join('');
}

// ============================================
// FETCH DENGAN PROXY
// ============================================
async function fetchWithProxy(url){
    const response = await fetch(PROXY + encodeURIComponent(url));
    if(!response.ok) throw new Error('Failed to fetch');
    return await response.json();
}

// ============================================
// LOAD TRENDING
// ============================================
async function loadTrending(){
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">Loading...</div>';
    
    try {
        const data = await fetchWithProxy(`${YT_API}/browse/trending`);
        
        if(data && data.length > 0){
            const items = data.map(i => ({
                title: i.title || 'Unknown',
                artist: i.artist?.name || 'Unknown',
                id: i.videoId || '',
                img: i.thumbnail?.[0]?.url || 'https://i.ytimg.com/vi/4NRXx6U8ABQ/hqdefault.jpg'
            }));
            renderResults(items);
            if(items.length > 0) {
                heroData = items[0];
                updateHero(heroData);
            }
        } else {
            grid.innerHTML = '<div class="loading">😞 Tidak ada data</div>';
        }
    } catch(e){
        grid.innerHTML = '<div class="loading">⚠️ Error: ' + e.message + '</div>';
    }
}

// ============================================
// LOAD CHARTS
// ============================================
async function loadCharts(){
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">Loading charts...</div>';
    
    try {
        const data = await fetchWithProxy(`${YT_API}/browse/charts`);
        
        if(data && data.length > 0){
            const items = data.map(i => ({
                title: i.title || 'Unknown',
                artist: i.artist?.name || 'Unknown',
                id: i.videoId || '',
                img: i.thumbnail?.[0]?.url || 'https://i.ytimg.com/vi/4NRXx6U8ABQ/hqdefault.jpg'
            }));
            renderResults(items);
            if(items.length > 0) {
                heroData = items[0];
                updateHero(heroData);
            }
        } else {
            grid.innerHTML = '<div class="loading">😞 Tidak ada data</div>';
        }
    } catch(e){
        grid.innerHTML = '<div class="loading">⚠️ Error: ' + e.message + '</div>';
    }
}

// ============================================
// LOAD RANDOM
// ============================================
async function loadRandom(){
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">Loading random...</div>';
    
    try {
        const randomId = Math.floor(Math.random() * 1000000000);
        const data = await fetchWithProxy(`${YT_API}/search?q=music+${randomId}`);
        
        if(data && data.length > 0){
            const items = data.map(i => ({
                title: i.title || 'Unknown',
                artist: i.artist?.name || 'Unknown',
                id: i.videoId || '',
                img: i.thumbnail?.[0]?.url || 'https://i.ytimg.com/vi/4NRXx6U8ABQ/hqdefault.jpg'
            }));
            renderResults(items);
            if(items.length > 0) {
                heroData = items[0];
                updateHero(heroData);
            }
        } else {
            grid.innerHTML = '<div class="loading">😞 Tidak ada data</div>';
        }
    } catch(e){
        grid.innerHTML = '<div class="loading">⚠️ Error: ' + e.message + '</div>';
    }
}

// ============================================
// SEARCH
// ============================================
async function search(){
    const q = document.getElementById('search').value.trim();
    if(!q) return loadTrending();
    
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">Mencari...</div>';
    
    try {
        const data = await fetchWithProxy(`${YT_API}/search?q=${encodeURIComponent(q)}`);
        
        if(data && data.length > 0){
            const items = data.map(i => ({
                title: i.title || 'Unknown',
                artist: i.artist?.name || 'Unknown',
                id: i.videoId || '',
                img: i.thumbnail?.[0]?.url || 'https://i.ytimg.com/vi/4NRXx6U8ABQ/hqdefault.jpg'
            }));
            renderResults(items);
            if(items.length > 0) {
                heroData = items[0];
                updateHero(heroData);
            }
        } else {
            grid.innerHTML = '<div class="loading">😞 Tidak ada hasil</div>';
        }
    } catch(e){
        grid.innerHTML = '<div class="loading">⚠️ Error: ' + e.message + '</div>';
    }
}

// ============================================
// RENDER
// ============================================
function renderResults(items){
    const grid = document.getElementById('grid');
    if(!items || items.length === 0){
        grid.innerHTML = '<div class="loading">😞 Tidak ada hasil</div>';
        return;
    }
    
    grid.innerHTML = items.map(i => {
        const title = i.title || 'Unknown';
        const poster = i.img || 'https://i.ytimg.com/vi/4NRXx6U8ABQ/hqdefault.jpg';
        const artist = i.artist || 'Unknown';
        const id = i.id || '';
        
        return `<div class="card" onclick="play('${id}','${title.replace(/'/g,"\\'")} - ${artist}')">
            <div class="poster">
                <img src="${poster}" onerror="this.src='https://i.ytimg.com/vi/4NRXx6U8ABQ/hqdefault.jpg'">
                <span>${title}</span>
                <div class="label">${artist}</div>
            </div>
            <div class="info"><h4>${title}</h4><p>${artist}</p></div>
        </div>`;
    }).join('');
}

// ============================================
// UPDATE HERO
// ============================================
function updateHero(item){
    if(!item) return;
    const title = item.title || 'EDWARD';
    const artist = item.artist || 'Music';
    const poster = item.img || 'https://i.ytimg.com/vi/4NRXx6U8ABQ/hqdefault.jpg';
    const id = item.id || '';
    
    document.getElementById('heroTitle').textContent = title;
    document.getElementById('heroDesc').textContent = artist;
    document.getElementById('heroBadge').textContent = '🎵 TRENDING';
    document.getElementById('hero').style.background = `linear-gradient(135deg, #121212 50%, transparent), url(${poster}) center/cover no-repeat`;
    document.getElementById('heroBtn').setAttribute('onclick', `play('${id}','${title.replace(/'/g,"\\'")} - ${artist}')`);
}

function playHero(){
    if(heroData){
        const title = heroData.title || 'EDWARD';
        const artist = heroData.artist || 'Music';
        play(heroData.id, `${title} - ${artist}`);
    }
}

// ============================================
// PLAY
// ============================================
function play(id, title){
    curId = id;
    document.getElementById('ptitle').textContent = '🎵 ' + title;
    document.getElementById('iframe').src = getUrl(id);
    document.getElementById('player').style.display = 'block';
    document.body.style.paddingBottom = '80px';
    renderServers();
}

function closePlayer(){
    document.getElementById('player').style.display = 'none';
    document.getElementById('iframe').src = '';
    curId = '';
    document.body.style.paddingBottom = '0';
}

// ============================================
// SCROLL
// ============================================
window.addEventListener('scroll', function(){
    const navbar = document.getElementById('navbar');
    if(window.scrollY > 50) navbar.classList.add('scrolled');
    else navbar.classList.remove('scrolled');
});

// ============================================
// INIT
// ============================================
window.onload = function(){ 
    loadTrending(); 
    renderServers();
};
document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closePlayer(); });
</script>
</body>
</html>
