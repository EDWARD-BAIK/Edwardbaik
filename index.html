<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - Nonton Gratis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e17;color:#fff;font-family:'Segoe UI',sans-serif;padding:15px}
:root{--p:#ff2d55;--s:#00d4ff;--g:#0f0}
.header{text-align:center;padding:20px 0 10px;border-bottom:2px solid var(--p)}
.header h1{font-size:28px;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.header p{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
.search-wrap{display:flex;gap:10px;margin:15px 0;background:#141b2b;border-radius:30px;padding:5px}
.search-wrap input{flex:1;background:0;border:0;padding:14px 18px;color:#fff;font-size:14px;outline:0}
.search-wrap input::placeholder{color:rgba(255,255,255,.3)}
.search-wrap button{background:var(--p);border:0;border-radius:30px;padding:12px 25px;color:#fff;font-weight:700;cursor:pointer;font-size:13px}
.search-wrap button:hover{opacity:.8}
.cat-scroll{display:flex;gap:12px;overflow-x:auto;padding:12px 0;margin-bottom:10px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-scroll button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:8px 20px;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap;transition:.2s}
.cat-scroll button.active{background:var(--p);border-color:var(--p);color:#fff}
.cat-scroll button:hover{background:rgba(255,45,87,.2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:15px;margin-top:15px}
.card{background:#141b2b;border-radius:16px;overflow:hidden;transition:.3s;cursor:pointer;border:1px solid transparent}
.card:hover{transform:translateY(-5px);border-color:var(--p)}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1a2335}
.card .info{padding:12px}
.card .info h4{font-size:13px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .info p{font-size:10px;color:rgba(255,255,255,.5)}
.card .badge{position:absolute;top:8px;right:8px;background:var(--p);padding:2px 10px;border-radius:20px;font-size:9px;font-weight:700}
.card-wrap{position:relative}
.player-wrap{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.player-wrap iframe{width:95%;max-width:1000px;height:70vh;border-radius:20px;border:2px solid var(--p)}
.player-wrap .close-btn{position:absolute;top:20px;right:20px;background:var(--p);border:0;color:#fff;width:50px;height:50px;border-radius:50%;font-size:24px;cursor:pointer;font-weight:700}
.player-wrap .close-btn:hover{transform:scale(1.1)}
.loading{text-align:center;padding:40px;color:rgba(255,255,255,.3);font-size:14px}
.footer{text-align:center;padding:30px 0 10px;border-top:1px solid rgba(255,255,255,.05);margin-top:20px}
.footer p{font-size:11px;color:rgba(255,255,255,.2)}
.footer span{color:var(--p)}
</style>
</head>
<body>
<div class="header">
<h1>🎬 ANIX</h1>
<p>Nonton Anime & Movie Gratis • 100% No Iklan</p>
</div>
<div class="search-wrap">
<input id="searchInput" placeholder="Cari judul anime / film..." onkeyup="if(event.key==='Enter') searchMedia()">
<button onclick="searchMedia()">🔍 Cari</button>
</div>
<div class="cat-scroll" id="categoryList">
<button class="active" onclick="setCategory('popular')">🔥 Populer</button>
<button onclick="setCategory('anime')">🎌 Anime</button>
<button onclick="setCategory('movie')">🎬 Movie</button>
<button onclick="setCategory('k-drama')">🇰🇷 K-Drama</button>
<button onclick="setCategory('china')">🇨🇳 China</button>
</div>
<div id="resultGrid" class="grid"><div class="loading">⏳ Loading...</div></div>
<div class="footer"><p>© 2026 <span>ANIX</span> • 100% Gratis - <span>EDWARD</span></p></div>

<div class="player-wrap" id="playerWrap">
<button class="close-btn" onclick="closePlayer()">✕</button>
<iframe id="playerIframe" src="" allowfullscreen></iframe>
</div>

<script>
const API_BASE = 'https://api.consumet.org';
let currentCategory = 'popular';
let currentPage = 1;
let isLoading = false;

async function fetchMedia(category, page = 1, query = '') {
    try {
        let url = '';
        if (query) {
            url = `${API_BASE}/anime/gogoanime/${encodeURIComponent(query)}?page=${page}`;
        } else {
            const catMap = {
                'popular': `${API_BASE}/anime/gogoanime/top-airing?page=${page}`,
                'anime': `${API_BASE}/anime/gogoanime/recent-episodes?page=${page}`,
                'movie': `${API_BASE}/movies?page=${page}`,
                'k-drama': `${API_BASE}/drama?page=${page}`,
                'china': `${API_BASE}/anime?page=${page}`
            };
            url = catMap[category] || catMap['popular'];
        }
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Gagal fetch');
        return await resp.json();
    } catch(e) {
        console.error('API Error:', e);
        return fallbackData(query || category);
    }
}

function fallbackData(key) {
    const samples = {
        'popular': [
            {title:'Attack on Titan', image:'https://cdn.myanimelist.net/images/anime/1000/110531.jpg', id:'1', type:'Anime'},
            {title:'Demon Slayer', image:'https://cdn.myanimelist.net/images/anime/1286/99889.jpg', id:'2', type:'Anime'},
            {title:'One Piece', image:'https://cdn.myanimelist.net/images/anime/1244/138851.jpg', id:'3', type:'Anime'},
            {title:'Jujutsu Kaisen', image:'https://cdn.myanimelist.net/images/anime/1171/109222.jpg', id:'4', type:'Anime'},
            {title:'Solo Leveling', image:'https://cdn.myanimelist.net/images/anime/1303/138497.jpg', id:'5', type:'Anime'}
        ],
        'anime': [
            {title:'Naruto', image:'https://cdn.myanimelist.net/images/anime/1460/98853.jpg', id:'6', type:'Anime'},
            {title:'Bleach', image:'https://cdn.myanimelist.net/images/anime/1220/142476.jpg', id:'7', type:'Anime'}
        ]
    };
    return { results: samples[key] || samples['popular'] };
}

async function searchMedia() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return setCategory('popular');
    showLoading();
    try {
        const data = await fetchMedia('', 1, q);
        renderResults(data.results || data || []);
    } catch(e) {
        renderFallback(q);
    }
}

function setCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.cat-scroll button').forEach(b => b.classList.remove('active'));
    document.querySelector(`.cat-scroll button:contains(${cat})`)?.classList.add('active');
    document.getElementById('searchInput').value = '';
    loadCategory(cat);
}

function loadCategory(cat) {
    showLoading();
    fetchMedia(cat).then(data => {
        renderResults(data.results || data || []);
    }).catch(() => renderFallback(cat));
}

function renderResults(items) {
    const grid = document.getElementById('resultGrid');
    if (!items || !items.length) {
        grid.innerHTML = '<div class="loading">😞 Tidak ada hasil</div>';
        return;
    }
    grid.innerHTML = items.map(item => `
        <div class="card-wrap">
            <div class="card" onclick="playMedia('${item.id || item.title}')">
                <img src="${item.image || 'https://via.placeholder.com/200x300/1a2335/fff?text=No+Image'}" 
                     onerror="this.src='https://via.placeholder.com/200x300/1a2335/fff?text=Error'">
                <div class="info">
                    <h4>${item.title || 'Unknown'}</h4>
                    <p>${item.type || 'Media'}</p>
                </div>
            </div>
        </div>
    `).join('');
}

function renderFallback(key) {
    const dummy = [
        {title:'Demon Slayer - Mugen Train', image:'https://cdn.myanimelist.net/images/anime/1704/106947.jpg', id:'movie1', type:'Movie'},
        {title:'Spy x Family', image:'https://cdn.myanimelist.net/images/anime/1441/122425.jpg', id:'anime1', type:'Anime'},
        {title:'Kingdom Season 5', image:'https://cdn.myanimelist.net/images/anime/1130/138785.jpg', id:'anime2', type:'Anime'},
        {title:'Squid Game S2', image:'https://cdn.myanimelist.net/images/anime/1190/138563.jpg', id:'drama1', type:'K-Drama'}
    ];
    renderResults(dummy);
}

function playMedia(id) {
    const player = document.getElementById('playerWrap');
    const iframe = document.getElementById('playerIframe');
    // Redirect ke layanan streaming gratis
    iframe.src = `https://vidsrc.to/embed/movie/${id}`;
    player.style.display = 'flex';
}

function closePlayer() {
    document.getElementById('playerWrap').style.display = 'none';
    document.getElementById('playerIframe').src = '';
}

function showLoading() {
    document.getElementById('resultGrid').innerHTML = '<div class="loading">⏳ Memuat...</div>';
}

// Init
window.onload = () => loadCategory('popular');

// Auto-hide player on ESC
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePlayer();
    if (e.key === 'Enter' && document.activeElement === document.getElementById('searchInput')) {
        searchMedia();
    }
});

// Smooth scroll for category buttons
document.querySelectorAll('.cat-scroll button').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.cat-scroll button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
    });
});

// Touch support for mobile
let touchStartX = 0;
document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
document.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].screenX;
    if (Math.abs(diff) > 50) {
        const btns = document.querySelectorAll('.cat-scroll button');
        const active = document.querySelector('.cat-scroll button.active');
        const idx = Array.from(btns).indexOf(active);
        if (diff > 0 && idx < btns.length - 1) btns[idx+1].click();
        else if (diff < 0 && idx > 0) btns[idx-1].click();
    }
});
</script>
</body>
</html>
