<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - ESP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;padding:10px;min-height:100vh}
::selection{background:#ff2d55;color:#fff}
.header{text-align:center;padding:10px 0 5px;border-bottom:2px solid #00ff41;margin-bottom:10px}
.header h1{font-size:24px;color:#00ff41;text-shadow:0 0 20px rgba(0,255,65,.3);letter-spacing:2px}
.header h1 span{color:#ff2d55}
.header p{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stats div{background:#141b2b;border:1px solid rgba(0,255,65,.2);border-radius:8px;padding:6px;text-align:center}
.stats div span{display:block;font-size:20px;font-weight:700;color:#00ff41}
.stats div small{font-size:9px;color:rgba(255,255,255,.4)}
.camera-wrap{position:relative;width:100%;max-width:800px;margin:0 auto;border-radius:12px;overflow:hidden;border:2px solid #00ff41;background:#000}
.camera-wrap video{width:100%;display:block}
.camera-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.controls{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.controls button{background:rgba(0,255,65,.1);border:1px solid #00ff41;border-radius:30px;padding:8px 20px;color:#00ff41;font-weight:600;cursor:pointer;font-size:11px;font-family:'Courier New',monospace}
.controls button:active{transform:scale(.95)}
.controls button.active{background:#00ff41;color:#000}
.controls button.full{background:rgba(255,215,0,.1);border-color:#ffd700;color:#ffd700}
.footer{text-align:center;padding:10px 0 5px;border-top:1px solid rgba(255,255,255,.05);margin-top:10px}
.footer p{font-size:8px;color:rgba(255,255,255,.2)}
.footer span{color:#00ff41}
</style>
</head>
<body>

<div class="header">
<h1>👁️ ED<span>WARD</span> <span style="color:#00ff41;font-size:12px;">· ESP</span></h1>
<p>Edward-esp2026 · Multi Target Tracker</p>
</div>

<div class="stats">
<div><small>TARGETS</small><span id="objCount">0</span></div>
<div><small>FPS</small><span id="fpsCount">0</span></div>
<div><small>STATUS</small><span id="statusText" style="font-size:14px;">●</span></div>
</div>

<div class="camera-wrap" id="cameraWrap">
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
</div>

<div class="controls">
<button id="btnStart" class="active" onclick="startCamera()">📷 Start</button>
<button id="btnStop" onclick="stopCamera()">⏹ Stop</button>
<button id="btnReset" onclick="resetTracker()">🔄 Reset</button>
<button class="full" onclick="toggleFullscreen()">⛶ Full</button>
</div>

<div class="footer"><p>© 2026 <span>EDWARD</span> · Edward-esp2026 · <span id="modelStatus">Multi ESP Active</span></p></div>

<script>
let stream = null;
let running = false;
let animationId = null;
let frameCount = 0;
let lastFpsTime = Date.now();
let fps = 0;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const objCount = document.getElementById('objCount');
const fpsCount = document.getElementById('fpsCount');
const statusText = document.getElementById('statusText');
const modelStatus = document.getElementById('modelStatus');
const cameraWrap = document.getElementById('cameraWrap');

let previousGray = null;
let targets = [];
let trackingId = 0;
const motionThreshold = 20;
const minMotionPixels = 8;
const targetTimeout = 30; // frame

// Warna untuk tiap target
const COLORS = ['#ff2d55','#00d4ff','#ffd700','#00ff41','#ff6b35','#7b2ffc','#ff4081','#40c4ff'];

function getColor(id) {
    return COLORS[id % COLORS.length];
}

// ============================================
// FULLSCREEN
// ============================================
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        cameraWrap.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
}

// ============================================
// CAMERA
// ============================================
async function startCamera() {
    try {
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 640 },
                height: { ideal: 480 }
            },
            audio: false
        });

        video.srcObject = stream;
        video.muted = true;
        
        await new Promise(resolve => {
            video.onloadedmetadata = () => resolve();
            setTimeout(resolve, 1500);
        });

        await video.play();
        
        statusText.textContent = '●';
        statusText.style.color = '#00ff41';
        document.getElementById('btnStart').classList.remove('active');

        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;

        if (!running) {
            running = true;
            detectLoop();
        }
    } catch(e) {
        alert('Error: ' + e.message);
        statusText.textContent = '✕';
        statusText.style.color = '#ff2d55';
    }
}

function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    running = false;
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    objCount.textContent = '0';
    targets = [];
    previousGray = null;
    statusText.textContent = '⬤';
    statusText.style.color = '#ff4444';
    document.getElementById('btnStart').classList.add('active');
}

function resetTracker() {
    targets = [];
    previousGray = null;
    objCount.textContent = '0';
}

// ============================================
// DETECTION LOOP
// ============================================
async function detectLoop() {
    if (!running) return;
    await detect();
    animationId = requestAnimationFrame(detectLoop);
}

function detect() {
    if (!video.srcObject || video.readyState < 2) return;

    try {
        frameCount++;
        const now = Date.now();
        if (now - lastFpsTime > 1000) {
            fps = frameCount;
            frameCount = 0;
            lastFpsTime = now;
            fpsCount.textContent = fps;
        }

        // Ambil frame
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        const gray = new Uint8Array(canvas.width * canvas.height);
        for (let i = 0; i < data.length; i += 4) {
            gray[i/4] = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
        }

        // Deteksi motion
        let motionClusters = [];
        let foundMotion = false;

        if (previousGray) {
            const diff = new Uint8Array(gray.length);
            for (let i = 0; i < gray.length; i++) {
                diff[i] = Math.abs(gray[i] - previousGray[i]);
            }

            const w = canvas.width;
            const h = canvas.height;
            const gridSize = 6;
            const cols = Math.floor(w / gridSize);
            const rows = Math.floor(h / gridSize);

            // Cari cluster motion
            const visited = new Set();
            const clusters = [];

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const key = r * cols + c;
                    if (visited.has(key)) continue;
                    
                    let sum = 0, count = 0;
                    for (let dy = 0; dy < gridSize; dy++) {
                        for (let dx = 0; dx < gridSize; dx++) {
                            const idx = (r * gridSize + dy) * w + (c * gridSize + dx);
                            if (idx < diff.length) {
                                sum += diff[idx];
                                count++;
                            }
                        }
                    }
                    const avg = count > 0 ? sum / count : 0;
                    
                    if (avg > motionThreshold) {
                        // Flood fill cluster
                        const cluster = [];
                        const queue = [{r, c}];
                        visited.add(key);
                        let minX = c * gridSize, maxX = c * gridSize + gridSize;
                        let minY = r * gridSize, maxY = r * gridSize + gridSize;
                        let totalPixels = 0;

                        while (queue.length > 0) {
                            const curr = queue.shift();
                            const ck = curr.r * cols + curr.c;
                            if (visited.has(ck)) continue;
                            visited.add(ck);
                            
                            cluster.push(curr);
                            totalPixels++;
                            
                            minX = Math.min(minX, curr.c * gridSize);
                            maxX = Math.max(maxX, curr.c * gridSize + gridSize);
                            minY = Math.min(minY, curr.r * gridSize);
                            maxY = Math.max(maxY, curr.r * gridSize + gridSize);

                            // Cek tetangga
                            const neighbors = [
                                {r: curr.r-1, c: curr.c}, {r: curr.r+1, c: curr.c},
                                {r: curr.r, c: curr.c-1}, {r: curr.r, c: curr.c+1}
                            ];
                            for (let n of neighbors) {
                                if (n.r >= 0 && n.r < rows && n.c >= 0 && n.c < cols) {
                                    const nk = n.r * cols + n.c;
                                    if (visited.has(nk)) continue;
                                    let nSum = 0, nCount = 0;
                                    for (let dy = 0; dy < gridSize; dy++) {
                                        for (let dx = 0; dx < gridSize; dx++) {
                                            const idx = (n.r * gridSize + dy) * w + (n.c * gridSize + dx);
                                            if (idx < diff.length) {
                                                nSum += diff[idx];
                                                nCount++;
                                            }
                                        }
                                    }
                                    const nAvg = nCount > 0 ? nSum / nCount : 0;
                                    if (nAvg > motionThreshold) {
                                        queue.push(n);
                                    }
                                }
                            }
                        }

                        if (totalPixels > minMotionPixels) {
                            clusters.push({
                                x: minX, y: minY, 
                                w: maxX - minX, 
                                h: maxY - minY,
                                pixels: totalPixels,
                                cx: (minX + maxX) / 2,
                                cy: (minY + maxY) / 2
                            });
                        }
                    }
                }
            }

            // Gabungkan cluster yang berdekatan
            const merged = [];
            for (let c of clusters) {
                let found = false;
                for (let m of merged) {
                    const dx = Math.abs(c.cx - m.cx);
                    const dy = Math.abs(c.cy - m.cy);
                    if (dx < 50 && dy < 50) {
                        m.x = Math.min(m.x, c.x);
                        m.y = Math.min(m.y, c.y);
                        m.w = Math.max(m.x + m.w, c.x + c.w) - m.x;
                        m.h = Math.max(m.y + m.h, c.y + c.h) - m.y;
                        m.pixels += c.pixels;
                        m.cx = m.x + m.w/2;
                        m.cy = m.y + m.h/2;
                        found = true;
                        break;
                    }
                }
                if (!found) merged.push({...c});
            }

            motionClusters = merged;
            if (motionClusters.length > 0) foundMotion = true;
        }

        previousGray = gray;

        // Update targets
        const newTargets = [];
        const usedIds = new Set();

        for (let cluster of motionClusters) {
            const padding = Math.max(15, Math.min(35, 35 - cluster.pixels / 30));
            let x = Math.max(0, cluster.x - padding);
            let y = Math.max(0, cluster.y - padding);
            let w = Math.min(canvas.width - x, cluster.w + padding * 2);
            let h = Math.min(canvas.height - y, cluster.h + padding * 2);

            // Cari target yang cocok (berdasarkan jarak)
            let matched = null;
            let minDist = Infinity;
            const cx = x + w/2;
            const cy = y + h/2;

            for (let t of targets) {
                if (usedIds.has(t.id)) continue;
                const dist = Math.hypot(t.cx - cx, t.cy - cy);
                if (dist < 80 && dist < minDist) {
                    minDist = dist;
                    matched = t;
                }
            }

            if (matched) {
                const smooth = 0.7;
                matched.x = matched.x * smooth + x * (1 - smooth);
                matched.y = matched.y * smooth + y * (1 - smooth);
                matched.w = matched.w * smooth + w * (1 - smooth);
                matched.h = matched.h * smooth + h * (1 - smooth);
                matched.cx = matched.x + matched.w/2;
                matched.cy = matched.y + matched.h/2;
                matched.frameCount = 0;
                usedIds.add(matched.id);
                newTargets.push(matched);
            } else {
                // Target baru
                const newTarget = {
                    id: ++trackingId,
                    x, y, w, h,
                    cx: x + w/2,
                    cy: y + h/2,
                    frameCount: 0
                };
                newTargets.push(newTarget);
            }
        }

        // Hapus target yang hilang
        for (let t of targets) {
            if (!usedIds.has(t.id)) {
                t.frameCount++;
                if (t.frameCount < targetTimeout) {
                    newTargets.push(t);
                }
            }
        }

        targets = newTargets;

        // ============================================
        // GAMBAR ESP
        // ============================================
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        objCount.textContent = targets.length;

        // Gambar setiap target
        targets.forEach((t, idx) => {
            const color = getColor(t.id);
            const x = t.x;
            const y = t.y;
            const w = t.w;
            const h = t.h;
            const alpha = Math.min(1, 1 - t.frameCount / targetTimeout);

            ctx.globalAlpha = alpha;

            // Tali/garis ESP
            ctx.strokeStyle = color;
            ctx.globalAlpha = alpha * 0.3;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 8]);
            
            ctx.beginPath();
            ctx.moveTo(x + w/2, y);
            ctx.lineTo(x + w/2, 0);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x + w/2, y + h);
            ctx.lineTo(x + w/2, canvas.height);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x, y + h/2);
            ctx.lineTo(0, y + h/2);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x + w, y + h/2);
            ctx.lineTo(canvas.width, y + h/2);
            ctx.stroke();
            
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;

            // Bounding Box
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0;

            // Center cross
            ctx.strokeStyle = color;
            ctx.globalAlpha = alpha * 0.5;
            ctx.lineWidth = 1;
            const cx = x + w/2;
            const cy = y + h/2;
            const size = 10;
            ctx.beginPath();
            ctx.moveTo(cx - size, cy);
            ctx.lineTo(cx + size, cy);
            ctx.moveTo(cx, cy - size);
            ctx.lineTo(cx, cy + size);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Jarak (berdasarkan ukuran)
            const dist = Math.round(50 - (w * h) / 2000);
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha * 0.6;
            ctx.font = '10px Courier New';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'top';
            ctx.fillText(Math.max(3, dist) + 'm', x + w - 6, y + 6);
            ctx.globalAlpha = 1;

            // Label ID
            ctx.fillStyle = color;
            ctx.globalAlpha = alpha * 0.4;
            ctx.font = '9px Courier New';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom';
            ctx.fillText('#' + t.id, x + 6, y + h + 16);
            ctx.globalAlpha = 1;

            ctx.globalAlpha = 1;
        });

        if (targets.length === 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.font = '13px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('Gerakkan target di depan kamera', canvas.width/2, canvas.height/2);
        }

    } catch(e) {
        // silent
    }
}

// ============================================
// INIT
// ============================================
setTimeout(() => {
    startCamera();
}, 500);
</script>
</body>
</html>
