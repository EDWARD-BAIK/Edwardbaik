<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - 50 Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Segoe UI',sans-serif;padding:10px;min-height:100vh;overflow-x:hidden}
::selection{background:#ff2d55;color:#fff}

.header{text-align:center;padding:15px 0 5px;border-bottom:2px solid #ff2d55;margin-bottom:10px}
.header h1{font-size:28px;background:linear-gradient(135deg,#ff2d55,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.header p{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px;letter-spacing:1px}
.search-wrap{display:flex;gap:8px;margin:10px 0;background:#141b2b;border-radius:30px;padding:4px}
.search-wrap input{flex:1;background:0;border:0;padding:10px 16px;color:#fff;font-size:13px;outline:0}
.search-wrap input::placeholder{color:rgba(255,255,255,.3)}
.search-wrap button{background:#ff2d55;border:0;border-radius:30px;padding:8px 18px;color:#fff;font-weight:600;cursor:pointer}
.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding:8px 0;margin-bottom:8px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-scroll button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:30px;padding:5px 14px;color:#aaa;font-size:10px;cursor:pointer;white-space:nowrap;transition:.2s}
.cat-scroll button.active{background:#ff2d55;border-color:#ff2d55;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:10px}
.card{background:#141b2b;border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid transparent;transition:.2s;padding:12px;text-align:center}
.card:active{transform:scale(.95)}
.card .icon{font-size:32px;display:block;margin-bottom:6px}
.card h4{font-size:11px;color:#fff}
.card p{font-size:9px;color:rgba(255,255,255,.4)}
.card .badge{display:inline-block;background:#ff2d55;padding:2px 10px;border-radius:20px;font-size:8px;margin-top:4px}
.game-wrap{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px;padding-top:50px}
.game-wrap .top{position:absolute;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.8);border-bottom:2px solid #ff2d55;z-index:10}
.game-wrap .top .t{font-size:14px;font-weight:600}
.game-wrap .top .close{background:#ff2d55;border:0;border-radius:50%;width:40px;height:40px;color:#fff;font-size:18px;cursor:pointer}
.game-wrap iframe{width:100%;max-width:500px;height:80vh;border:2px solid #ff2d55;border-radius:12px;background:#fff;margin-top:10px}
.loading{text-align:center;padding:30px;color:rgba(255,255,255,.3);font-size:13px;grid-column:1/-1}
.footer{text-align:center;padding:15px 0 8px;border-top:1px solid rgba(255,255,255,.05);margin-top:15px}
.footer p{font-size:9px;color:rgba(255,255,255,.2)}
.footer span{color:#ff2d55}
</style>
</head>
<body>

<div class="header">
<h1>🎮 EDWARD</h1>
<p>Edward-game2026 • 50 Classic & Puzzle Games</p>
</div>

<div class="search-wrap">
<input id="search" placeholder="Cari game..." onkeyup="if(event.key==='Enter') searchGame()">
<button onclick="searchGame()">🔍 Cari</button>
</div>

<div class="cat-scroll" id="cat">
<button class="active" onclick="filterGame('all')">🎯 Semua</button>
<button onclick="filterGame('classic')">🕹️ Classic</button>
<button onclick="filterGame('puzzle')">🧩 Puzzle</button>
<button onclick="filterGame('action')">⚡ Action</button>
</div>

<div id="grid" class="grid"></div>
<div class="footer"><p>© 2026 <span>EDWARD</span> • Edward-game2026</p></div>

<div class="game-wrap" id="gameWrap">
<div class="top">
<span class="t" id="gameTitle">🎮 Game</span>
<button class="close" onclick="closeGame()">✕</button>
</div>
<iframe id="gameIframe" src="" allowfullscreen></iframe>
</div>

<script>
// ===== 50 GAME =====

{id:7,title:'Minesweeper',cat:'classic',icon:'💣',url:'https://www.1001games.com/embed/minesweeper'},
{id:8,title:'Solitaire',cat:'classic',icon:'🃏',url:'https://www.1001games.com/embed/solitaire'},
{id:9,title:'Chess',cat:'classic',icon:'♟️',url:'https://www.1001games.com/embed/chess'},
{id:10,title:'Checkers',cat:'classic',icon:'🔴',url:'https://www.1001games.com/embed/checkers'},
{id:11,title:'Mahjong',cat:'classic',icon:'🀄',url:'https://www.1001games.com/embed/mahjong'},
{id:12,title:'Sudoku',cat:'classic',icon:'🔢',url:'https://www.1001games.com/embed/sudoku'},
{id:13,title:'Crossword',cat:'classic',icon:'📝',url:'https://www.1001games.com/embed/crossword'},

{id:15,title:'Hangman',cat:'classic',icon:'🪢',url:'https://www.1001games.com/embed/hangman'},
// PUZZLE
{id:16,title:'2048',cat:'puzzle',icon:'🔢',url:'https://www.1001games.com/embed/2048'},
{id:17,title:'Candy Crush',cat:'puzzle',icon:'🍬',url:'https://www.1001games.com/embed/candy-crush'},
{id:18,title:'Bubble Shooter',cat:'puzzle',icon:'🫧',url:'https://www.1001games.com/embed/bubble-shooter'},
{id:19,title:'Jigsaw Puzzle',cat:'puzzle',icon:'🧩',url:'https://www.1001games.com/embed/jigsaw'},
{id:20,title:'Wordle',cat:'puzzle',icon:'📖',url:'https://www.1001games.com/embed/wordle'},
{id:21,title:'Block Puzzle',cat:'puzzle',icon:'🧱',url:'https://www.1001games.com/embed/block-puzzle'},
{id:22,title:'Match 3',cat:'puzzle',icon:'🔄',url:'https://www.1001games.com/embed/match-3'},

{id:24,title:'Bejeweled',cat:'puzzle',icon:'💎',url:'https://www.1001games.com/embed/bejeweled'},
{id:25,title:'Candy Land',cat:'puzzle',icon:'🍭',url:'https://www.1001games.com/embed/candy-land'},

{id:30,title:'Rubik Cube',cat:'puzzle',icon:'🧊',url:'https://www.1001games.com/embed/rubik-cube'},
// ACTION
{id:31,title:'Flappy Bird',cat:'action',icon:'🐦',url:'https://www.1001games.com/embed/flappy-bird'},
{id:32,title:'Doodle Jump',cat:'action',icon:'🦘',url:'https://www.1001games.com/embed/doodle-jump'},

{id:35,title:'Hill Climb',cat:'action',icon:'🚗',url:'https://www.1001games.com/embed/hill-climb'},

{id:43,title:'Sonic Dash',cat:'action',icon:'💨',url:'https://www.1001games.com/embed/sonic-dash'},

{id:46,title:'Clash of Clans',cat:'action',icon:'🏰',url:'https://www.1001games.com/embed/clash-of-clans'},
{id:47,title:'Plants vs Zombies',cat:'action',icon:'🌻',url:'https://www.1001games.com/embed/plants-vs-zombies'},
{id:48,title:'Minecraft',cat:'action',icon:'⛏️',url:'https://www.1001games.com/embed/minecraft'},
{id:49,title:'Among Us',cat:'action',icon:'🛸',url:'https://www.1001games.com/embed/among-us'},
{id:50,title:'Fall Guys',cat:'action',icon:'🫠',url:'https://www.1001games.com/embed/fall-guys'}
];

let currentFilter = 'all';

function renderGames(filter){
    const grid = document.getElementById('grid');
    const filtered = filter === 'all' ? GAMES : GAMES.filter(g => g.cat === filter);
    if(filtered.length === 0){ grid.innerHTML = '<div class="loading">😞 Tidak ada game</div>'; return; }
    grid.innerHTML = filtered.map(g => `
        <div class="card" onclick="openGame('${g.url}','${g.title}')">
            <span class="icon">${g.icon}</span>
            <h4>${g.title}</h4>
            <p>${g.cat}</p>
            <span class="badge">▶️ Play</span>
        </div>
    `).join('');
}

function filterGame(cat){ currentFilter = cat; document.querySelectorAll('#cat button').forEach(b => b.classList.remove('active')); document.querySelector(`#cat button[onclick="filterGame('${cat}')"]`).classList.add('active'); renderGames(cat); }

function searchGame(){
    const q = document.getElementById('search').value.trim().toLowerCase();
    if(!q) return renderGames(currentFilter);
    const filtered = GAMES.filter(g => g.title.toLowerCase().includes(q) || g.cat.includes(q));
    const grid = document.getElementById('grid');
    if(filtered.length === 0){ grid.innerHTML = '<div class="loading">😞 Tidak ada hasil</div>'; return; }
    grid.innerHTML = filtered.map(g => `
        <div class="card" onclick="openGame('${g.url}','${g.title}')">
            <span class="icon">${g.icon}</span>
            <h4>${g.title}</h4>
            <p>${g.cat}</p>
            <span class="badge">▶️ Play</span>
        </div>
    `).join('');
}

function openGame(url, title){
    document.getElementById('gameTitle').textContent = '🎮 ' + title;
    document.getElementById('gameIframe').src = url;
    document.getElementById('gameWrap').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeGame(){
    document.getElementById('gameWrap').style.display = 'none';
    document.getElementById('gameIframe').src = '';
    document.body.style.overflow = 'auto';
}

window.onload = function(){ renderGames('all'); };
document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeGame(); });
</script>
</body>
</html>
