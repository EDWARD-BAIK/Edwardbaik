<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EDWARD</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Segoe UI',sans-serif;height:100vh;overflow:hidden;background:#0b0e1a}
        .sky{position:relative;width:100vw;height:100vh;overflow:hidden;transition:background 1.5s ease}
        .stars{position:absolute;width:100%;height:100%;z-index:1;pointer-events:none}
        .star{position:absolute;background:#fff;border-radius:50%;opacity:0;transition:opacity 1.8s ease}
        .star.visible{opacity:.9}
        .sun{position:absolute;width:80px;height:80px;background:radial-gradient(circle at 30% 30%,#fff7b0,#ffb347);border-radius:50%;box-shadow:0 0 90px rgba(255,200,50,.8),0 0 200px rgba(255,150,0,.4);transition:all .4s ease;transform:translate(-50%,-50%);z-index:10;pointer-events:none}
        .moon{position:absolute;width:70px;height:70px;background:radial-gradient(circle at 40% 35%,#f5f5ff,#b0b0d0);border-radius:50%;box-shadow:0 0 70px rgba(200,200,255,.3),0 0 150px rgba(150,150,255,.1);transition:all .4s ease;transform:translate(-50%,-50%);z-index:11;pointer-events:none}
        .moon::before{content:'';position:absolute;top:15%;left:20%;width:16px;height:16px;background:rgba(180,180,200,.25);border-radius:50%;box-shadow:22px 18px 0 4px rgba(180,180,200,.2),42px 4px 0 3px rgba(180,180,200,.15)}
        .ground{position:absolute;bottom:0;left:0;width:100%;height:30%;z-index:5;pointer-events:none;background:linear-gradient(0deg,#1a2a1a 0%,#2a4a2a 50%,#3a6a3a 100%);transition:background 1.5s ease}
        .ground .grass{position:absolute;top:-10px;left:0;width:100%;height:20px;background:#4a8a3a;clip-path:polygon(0% 0%,10% 40%,20% 10%,30% 50%,40% 20%,50% 60%,60% 30%,70% 50%,80% 20%,90% 40%,100% 0%,100% 100%,0% 100%);transition:background 1.5s ease}
        .info{position:absolute;top:20px;left:50%;transform:translateX(-50%);z-index:20;text-align:center;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.8);background:rgba(0,0,0,.25);backdrop-filter:blur(12px);padding:14px 28px;border-radius:16px;border:1px solid rgba(255,255,255,.06);pointer-events:none;min-width:200px}
        .info h1{font-size:26px;font-weight:700;letter-spacing:2px;color:#00ff88;text-shadow:0 0 40px rgba(0,255,136,.15)}
        .info .clock{font-size:30px;font-weight:300;letter-spacing:4px;margin-top:2px;font-variant-numeric:tabular-nums}
        .info .status{font-size:12px;font-weight:500;letter-spacing:1px;margin-top:2px;opacity:.5;text-transform:uppercase}
        .location{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;color:rgba(255,255,255,.25);font-size:11px;letter-spacing:1px;background:rgba(0,0,0,.15);backdrop-filter:blur(8px);padding:6px 18px;border-radius:30px;border:1px solid rgba(255,255,255,.04);pointer-events:none}
        @media(max-width:600px){.info{top:12px;padding:10px 16px;min-width:unset;width:92%}.info h1{font-size:18px}.info .clock{font-size:22px}.sun{width:55px;height:55px}.moon{width:45px;height:45px}.location{font-size:9px;padding:4px 12px;bottom:10px}}
    </style>
</head>
<body>
    <div class="sky" id="sky">
        <div class="stars" id="stars"></div>
        <div class="sun" id="sun"></div>
        <div class="moon" id="moon"></div>
        <div class="ground" id="ground"><div class="grass" id="grass"></div></div>
        <div class="info"><h1>EDWARD</h1><div class="clock" id="clock">--:--:--</div><div class="status" id="status">Mencari lokasi...</div></div>
        <div class="location" id="location">🌍 Menunggu izin lokasi...</div>
    </div>
    <script>
        // ============================================
        // BYPASS / ANTI INSPECT TOTAL
        // ============================================
        (function() {
            // Blokir klik kanan
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });

            // Blokir semua shortcut keyboard
            document.addEventListener('keydown', function(e) {
                // F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U, Ctrl+S, Ctrl+Shift+C, Ctrl+Shift+J
                if (e.key === 'F12' ||
                    (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                    (e.ctrlKey && e.key === 'u') ||
                    (e.ctrlKey && e.key === 's') ||
                    (e.ctrlKey && e.shiftKey && e.key === 'i') ||
                    (e.metaKey && e.altKey && e.key === 'i')) {
                    e.preventDefault();
                    return false;
                }
            });

            // Blokir drag
            document.addEventListener('dragstart', function(e) {
                e.preventDefault();
                return false;
            });

            // Blokir select text
            document.addEventListener('selectstart', function(e) {
                e.preventDefault();
                return false;
            });

            // Anti inspect via debugger (loop)
            function antiDebug() {
                var start = new Date().getTime();
                debugger;
                var end = new Date().getTime();
                if (end - start > 100) {
                    document.body.innerHTML = '';
                    window.location.reload();
                }
            }
            setInterval(antiDebug, 1000);

            // Hapus console.log
            console.log = function() {};
            console.warn = function() {};
            console.error = function() {};
            console.info = function() {};

            // Blokir akses ke devtools via window
            Object.defineProperty(window, 'devtools', {
                get: function() {
                    throw new Error('Akses ditolak');
                }
            });

            // Hapus semua atribut dari body & html agar tidak ada class/js tersisa
            document.documentElement.removeAttribute('class');
            document.body.removeAttribute('class');

            // Hapus semua event listener bawaan
            window.onload = function() {
                document.querySelectorAll('*').forEach(function(el) {
                    el.removeAttribute('onclick');
                    el.removeAttribute('onmouseover');
                    el.removeAttribute('onmouseout');
                    el.removeAttribute('onfocus');
                    el.removeAttribute('onblur');
                });
            };
        })();

        // ============================================
        // GENERATE BINTANG
        // ============================================
        (function() {
            var starsContainer = document.getElementById('stars');
            for (var i = 0; i < 250; i++) {
                var star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                var size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                starsContainer.appendChild(star);
            }
            window.starElements = document.querySelectorAll('.star');
        })();

        // ============================================
        // ELEMEN
        // ============================================
        var sky = document.getElementById('sky');
        var sun = document.getElementById('sun');
        var moon = document.getElementById('moon');
        var ground = document.getElementById('ground');
        var grass = document.getElementById('grass');
        var clockEl = document.getElementById('clock');
        var statusEl = document.getElementById('status');
        var locationEl = document.getElementById('location');

        var userLat = -6.2088;
        var userLng = 106.8456;

        // ============================================
        // MINTAA IZIN LOKASI
        // ============================================
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        userLat = pos.coords.latitude;
                        userLng = pos.coords.longitude;
                        locationEl.textContent = '🌍 ' + userLat.toFixed(4) + ', ' + userLng.toFixed(4);
                        statusEl.textContent = 'Lokasi ditemukan ✅';
                        updateSky();
                    },
                    function() {
                        locationEl.textContent = '⚠️ Izin lokasi ditolak, default Jakarta';
                        statusEl.textContent = 'Menggunakan default';
                        updateSky();
                    },
                    { enableHighAccuracy: true }
                );
            } else {
                locationEl.textContent = '⚠️ Geolocation tidak didukung';
                statusEl.textContent = 'Menggunakan default';
                updateSky();
            }
        }

        // ============================================
        // HITUNG SUNRISE/SUNSET
        // ============================================
        function getSunriseSunset(lat, lng, now) {
            var dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            var declination = 23.44 * Math.sin((360 / 365) * (dayOfYear - 81) * Math.PI / 180);
            var latRad = lat * Math.PI / 180;
            var declRad = declination * Math.PI / 180;
            var cosHourAngle = -Math.tan(latRad) * Math.tan(declRad);
            var hourAngle = Math.acos(Math.min(1, Math.max(-1, cosHourAngle))) * 180 / Math.PI;
            hourAngle = hourAngle / 15;
            var sunrise = 12 - hourAngle;
            var sunset = 12 + hourAngle;
            return { sunrise: sunrise, sunset: sunset };
        }

        // ============================================
        // UPDATE SKY
        // ============================================
        function updateSky() {
            var now = new Date();
            var hours = now.getHours() + now.getMinutes() / 60;

            var sunData = getSunriseSunset(userLat, userLng, now);
            var sunrise = sunData.sunrise;
            var sunset = sunData.sunset;
            var isNight = hours < sunrise || hours > sunset;

            statusEl.textContent = isNight ? '🌙 Malam' : '☀️ Siang';

            // Background langit
            if (isNight) {
                sky.style.background = 'linear-gradient(180deg, #05080f 0%, #0b1424 40%, #1a1f33 100%)';
            } else {
                var progress = (hours - sunrise) / (sunset - sunrise);
                var clamped = Math.min(1, Math.max(0, progress));
                var r = Math.round(20 + 135 * clamped);
                var g = Math.round(30 + 150 * (1 - Math.abs(clamped - 0.5) * 2));
                var b = Math.round(60 + 150 * (1 - clamped));
                sky.style.background = 'linear-gradient(180deg, rgb(' + r + ', ' + g + ', ' + b + ') 0%, rgb(' + Math.round(r/2) + ', ' + Math.round(g/2) + ', ' + Math.round(b/2) + ') 100%)';
            }

            // Matahari
            var sunProgress = (hours - sunrise) / (sunset - sunrise);
            var sunClamped = Math.min(1, Math.max(0, sunProgress));
            var sunX = sunClamped * 90 + 5;
            var sunY = Math.sin(sunClamped * Math.PI) * 60 + 15;
            sun.style.left = sunX + '%';
            sun.style.top = sunY + '%';
            sun.style.opacity = isNight ? '0' : '1';

            // Bulan
            var moonProgress = 1 - sunClamped;
            var moonX = moonProgress * 90 + 5;
            var moonY = Math.sin(moonProgress * Math.PI) * 60 + 15;
            moon.style.left = moonX + '%';
            moon.style.top = moonY + '%';
            moon.style.opacity = isNight ? '1' : '0.2';

            // Bintang
            var starEls = document.querySelectorAll('.star');
            starEls.forEach(function(star) {
                var shouldShow = isNight && Math.random() > 0.3;
                if (shouldShow) {
                    star.classList.add('visible');
                } else {
                    star.classList.remove('visible');
                }
            });

            // Ground
            if (isNight) {
                ground.style.background = 'linear-gradient(0deg, #0a1a0a 0%, #1a2a1a 50%, #2a3a2a 100%)';
                grass.style.background = '#2a4a2a';
            } else {
                ground.style.background = 'linear-gradient(0deg, #1a2a1a 0%, #2a4a2a 50%, #3a6a3a 100%)';
                grass.style.background = '#4a8a3a';
            }

            // Jam
            clockEl.textContent = now.toLocaleTimeString('id-ID', { hour12: false });
        }

        // ============================================
        // LOOP
        // ============================================
        setInterval(updateSky, 1000);
        getLocation();
        setInterval(updateSky, 30000);
    </script>
</body>
</html>
