<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#e0e0e0;font-family:'Inter','Segoe UI',sans-serif;padding:20px;min-height:100vh;line-height:1.6}
::selection{background:#ff2d55;color:#fff}
.header{max-width:960px;margin:0 auto 40px;padding-bottom:20px;border-bottom:2px solid rgba(0,212,255,.08)}
.header h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#00d4ff,#ff2d55);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:14px;color:rgba(255,255,255,.3);margin-top:4px}
.grid{max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:24px}
.card{background:#141b2b;border-radius:20px;padding:28px 30px;border:1px solid rgba(255,255,255,.04);transition:.3s;cursor:pointer}
.card:hover{transform:translateY(-4px);border-color:#00d4ff;box-shadow:0 20px 60px rgba(0,212,255,.06)}
.card .meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,.3);margin-bottom:10px}
.card .meta .tag{background:rgba(0,212,255,.1);color:#00d4ff;padding:4px 14px;border-radius:30px;font-weight:500;font-size:11px}
.card .meta .time{color:rgba(255,255,255,.25)}
.card h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.3}
.card .desc{font-size:15px;color:rgba(255,255,255,.45);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card .author{font-size:13px;color:rgba(255,255,255,.2);margin-top:12px}
.loading{text-align:center;padding:60px;color:rgba(255,255,255,.3)}
.error{text-align:center;padding:60px;color:#ff2d55}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.96);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal .top{position:absolute;top:0;left:0;right:0;padding:16px 30px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.85);border-bottom:1px solid rgba(0,212,255,.1)}
.modal .top .t{font-size:16px;font-weight:600;color:#00d4ff;max-width:65%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal .top .close{background:rgba(255,45,85,.15);border:1px solid rgba(255,45,85,.2);border-radius:50%;width:44px;height:44px;color:#fff;font-size:22px;cursor:pointer}
.modal .top .close:hover{background:#ff2d55}
.modal .content{max-width:820px;width:100%;max-height:82vh;overflow-y:auto;background:#141b2b;border-radius:20px;padding:40px 45px;border:1px solid rgba(0,212,255,.08)}
.modal .content h2{color:#fff;font-size:28px;font-weight:800;margin-bottom:8px}
.modal .content .meta{font-size:13px;color:rgba(255,255,255,.3);margin-bottom:25px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:16px;flex-wrap:wrap}
.modal .content .meta .tag{color:#00d4ff}
.modal .content p{color:rgba(255,255,255,.85);line-height:1.9;margin-bottom:18px;font-size:16px}
.modal .content .btn-close{display:inline-block;background:#00d4ff;color:#000;padding:10px 30px;border-radius:30px;font-weight:700;margin-top:20px;border:0;cursor:pointer}
.modal .content .btn-close:hover{background:#00b8e6}
.footer{max-width:960px;margin:40px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.04);text-align:center;font-size:12px;color:rgba(255,255,255,.15)}
.footer span{color:#00d4ff}
@media(max-width:600px){body{padding:12px}.header h1{font-size:24px}.card{padding:18px}.card h2{font-size:18px}.modal .content{padding:20px}.modal .content h2{font-size:21px}}
</style>
</head>
<body>

<div class="header">
<h1>⚡ EDWARD</h1>
<div class="sub">Technical deep dives • Powered by Dev.to API</div>
</div>

<div id="grid" class="grid"><div class="loading">⏳ Loading...</div></div>

<div class="footer"><p>© 2026 <span>EDWARD</span> • Dev.to API</p></div>

<div class="modal" id="modal">
<div class="top">
<span class="t" id="modalTitle">📄 Artikel</span>
<button class="close" onclick="closeModal()">✕</button>
</div>
<div class="content" id="modalContent"></div>
</div>

<script>
// ============================================
// DEV.TO API - REAL, NO GIMMICK
// ============================================
async function fetchArticles() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">⏳ Loading from Dev.to...</div>';
    
    try {
        const res = await fetch('https://dev.to/api/articles?per_page=30');
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        
        if (data && data.length > 0) {
            grid.innerHTML = data.map((item, index) => `
                <div class="card" onclick="openModal(${index})">
                    <div class="meta">
                        <span class="tag">${item.tag_list?.[0] || 'Tech'}</span>
                        <span class="time">${Math.ceil(item.reading_time_minutes || 3)} min</span>
                        <span class="time">${new Date(item.published_at).toLocaleDateString('id-ID')}</span>
                    </div>
                    <h2>${item.title}</h2>
                    <div class="desc">${item.description || item.summary || 'Artikel dari developer.'}</div>
                    <div class="author">✍️ ${item.user?.name || 'Developer'}</div>
                </div>
            `).join('');
            
            window._articles = data;
        } else {
            grid.innerHTML = '<div class="error">😞 Tidak ada artikel</div>';
        }
    } catch (e) {
        grid.innerHTML = `<div class="error">⚠️ Error: ${e.message}</div>`;
    }
}

function openModal(index) {
    const data = window._articles;
    if (!data || !data[index]) return;
    const a = data[index];
    
    document.getElementById('modalTitle').textContent = '📄 ' + a.title;
    
    // Ambil konten full dari API
    fetch(`https://dev.to/api/articles/${a.id}`)
        .then(res => res.json())
        .then(detail => {
            let content = detail.body_html || detail.body_markdown || 'Konten tidak tersedia';
            // Clean HTML
            content = content.replace(/<[^>]*>/g, '').split('\n\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');
            
            document.getElementById('modalContent').innerHTML = `
                <h2>${a.title}</h2>
                <div class="meta">
                    <span class="tag">🏷️ ${a.tag_list?.[0] || 'Tech'}</span>
                    <span class="time">⏱️ ${Math.ceil(a.reading_time_minutes || 3)} min</span>
                    <span class="time">📅 ${new Date(a.published_at).toLocaleDateString('id-ID')}</span>
                </div>
                ${content || '<p>Konten tidak tersedia</p>'}
                <button class="btn-close" onclick="closeModal()">Tutup</button>
            `;
        })
        .catch(() => {
            document.getElementById('modalContent').innerHTML = `
                <h2>${a.title}</h2>
                <div class="meta">
                    <span class="tag">🏷️ ${a.tag_list?.[0] || 'Tech'}</span>
                    <span class="time">⏱️ ${Math.ceil(a.reading_time_minutes || 3)} min</span>
                </div>
                <p>Konten tidak tersedia</p>
                <button class="btn-close" onclick="closeModal()">Tutup</button>
            `;
        });
    
    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = 'auto';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

fetchArticles();
</script>
</body>
</html>
