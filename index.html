<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>-EDWARD-</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Segoe UI','Inter',sans-serif;padding:20px;min-height:100vh}

/* SCROLLBAR KEREN */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#141414}
::-webkit-scrollbar-thumb{background:#00ff88;border-radius:10px}

/* HEADER */
.header{max-width:1200px;margin:0 auto 40px;padding:20px 30px;background:linear-gradient(135deg,#141414 0%,#1a1a1a 100%);border-radius:24px;border:1px solid rgba(0,255,136,.08)}
.header h1{font-size:38px;font-weight:900;color:#00ff88;letter-spacing:-1px;text-shadow:0 0 60px rgba(0,255,136,.15)}
.header .sub{font-size:14px;color:rgba(255,255,255,.25);margin-top:4px}
.header .counter{display:inline-block;background:rgba(0,255,136,.1);color:#00ff88;padding:4px 16px;border-radius:30px;font-size:12px;font-weight:600;margin-top:10px}

/* SEARCH */
.search{max-width:1200px;margin:0 auto 30px;display:flex;gap:12px;flex-wrap:wrap}
.search input{flex:1;min-width:200px;background:#141414;border:2px solid rgba(255,255,255,.04);border-radius:16px;padding:16px 24px;color:#fff;font-size:15px;outline:none;transition:.3s}
.search input:focus{border-color:#00ff88;box-shadow:0 0 30px rgba(0,255,136,.05)}
.search button{background:linear-gradient(135deg,#00ff88,#00cc70);border:none;border-radius:16px;padding:16px 32px;color:#000;font-weight:700;font-size:15px;cursor:pointer;transition:.3s}
.search button:hover{transform:scale(1.02);box-shadow:0 10px 30px rgba(0,255,136,.2)}
.search .reset{background:rgba(255,255,255,.06);color:#fff}
.search .reset:hover{background:rgba(255,255,255,.12);box-shadow:none}

/* INFO */
#resultInfo{max-width:1200px;margin:0 auto 20px;color:rgba(255,255,255,.15);font-size:13px;letter-spacing:.3px}

/* GRID */
.grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:24px}

/* CARD */
.card{background:linear-gradient(145deg,#141414,#121212);border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.03);transition:.4s cubic-bezier(.25,.46,.45,.94);cursor:pointer;position:relative}
.card::before{content:'';position:absolute;inset:0;border-radius:20px;padding:1.5px;background:linear-gradient(135deg,transparent 40%,#00ff88 100%,transparent 60%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:.4s}
.card:hover::before{opacity:1}
.card:hover{transform:translateY(-12px);border-color:rgba(0,255,136,.15);box-shadow:0 30px 60px rgba(0,0,0,.6)}
.card img{width:100%;height:290px;object-fit:cover;display:block;transition:.4s}
.card:hover img{transform:scale(1.03)}
.card .info{padding:16px 18px 20px}
.card .info h3{color:#fff;font-size:15px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.card .info .meta{display:flex;gap:12px;font-size:12px;color:rgba(255,255,255,.25);margin-top:8px;flex-wrap:wrap}
.card .info .meta .badge{background:rgba(0,255,136,.08);color:#00ff88;padding:3px 14px;border-radius:30px;font-weight:600;font-size:10px;letter-spacing:.3px;text-transform:uppercase}

/* PAGINATION */
.pagination{max-width:1200px;margin:40px auto;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.pagination button{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.5);padding:12px 22px;border-radius:14px;font-weight:600;font-size:14px;cursor:pointer;transition:.3s}
.pagination button:hover{background:rgba(255,255,255,.08);color:#fff;transform:translateY(-2px)}
.pagination button.active{background:#00ff88;color:#000;border-color:#00ff88;box-shadow:0 8px 25px rgba(0,255,136,.15)}
.pagination button:disabled{opacity:.2;cursor:not-allowed;transform:none!important}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.98);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(10px)}
.modal.show{display:flex}
.modal .top{position:absolute;top:0;left:0;right:0;padding:18px 30px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.85);border-bottom:1px solid rgba(0,255,136,.06);backdrop-filter:blur(20px)}
.modal .top .t{font-size:18px;font-weight:700;color:#00ff88;max-width:70%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal .top .close{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.04);border-radius:50%;width:46px;height:46px;color:#fff;font-size:22px;cursor:pointer;transition:.3s}
.modal .top .close:hover{background:rgba(255,255,255,.08);transform:rotate(90deg)}
.modal .content{max-width:1050px;width:100%;max-height:88vh;overflow-y:auto;background:#141414;border-radius:24px;padding:35px;border:1px solid rgba(0,255,136,.06)}
.modal .content iframe{width:100%;height:620px;border:none;border-radius:16px;background:#000;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal .content h2{color:#fff;font-size:28px;font-weight:800;margin:22px 0 6px}
.modal .content .sub{color:rgba(255,255,255,.3);font-size:14px}
.modal .content .desc{color:rgba(255,255,255,.5);font-style:italic;font-size:15px;margin:10px 0 20px;line-height:1.6}
.btn-close{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.04);color:#fff;padding:12px 36px;border-radius:16px;font-weight:600;font-size:14px;cursor:pointer;transition:.3s}
.btn-close:hover{background:rgba(255,255,255,.08)}

/* FOOTER */
.footer{max-width:1200px;margin:50px auto 0;padding-top:24px;border-top:1px solid rgba(255,255,255,.03);text-align:center;font-size:12px;color:rgba(255,255,255,.08)}
.footer span{color:#00ff88}

.loading{text-align:center;padding:80px;color:rgba(255,255,255,.12);font-size:16px;letter-spacing:1px}
.no-result{text-align:center;padding:80px;color:#ff4466;font-size:18px}

@media(max-width:600px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:16px}
    .card img{height:210px}
    .modal .content iframe{height:280px}
    .modal .content{padding:18px}
    .header h1{font-size:26px}
    .search input{padding:14px 18px;font-size:13px}
    .search button{padding:14px 20px;font-size:13px}
}
</style>
</head>

    {id:27,title:"Mr. Robot: Season 4",year:2019,genre:"Cyber Security, Thriller",rating:"8.7",image:"https://image.tmdb.org/t/p/w200/8yW1Z5fL4tXgQzY6h5QkXgY5fL4tXgQz.jpg",embed:"https://vidsrc.me/embed/movie/823421",desc:"Final season - Elliot vs Whiterose."}
];

function generateMovies() {
    let all = [];
    const suffixes = ['', ' 2', ' 3', ' 4', ' 5', ' 6', ' 7', ' 8', ' 9', ' 10', 
                     ' Remastered', ' Extended', " Director's Cut", ' Final Cut',
                     ' Uncut', ' Special Edition', ' Anniversary', ' 4K', ' IMAX',
                     ' Deluxe', ' Premium', ' Gold', ' Platinum', ' Ultimate',
                     ' Legendary', ' Epic', ' Supreme', ' Elite', ' Prime',
                     ' Pro', ' Max', ' Plus', ' Ultra', ' Hyper', ' Mega'];
    const genres = ['', ', Drama', ', Comedy', ', Thriller', ', Mystery', ', Romance', ', Crime', ', Fantasy'];
    
    for (let i = 0; i < 40; i++) {
        MOVIE_DB.forEach(m => {
            let nm = {...m};
            nm.id = all.length + 1;
            if (i > 0) {
                const suffix = suffixes[(i + m.id) % suffixes.length];
                nm.title = m.title + suffix;
                nm.year = m.year + (i % 6);
                nm.rating = (parseFloat(m.rating) + (i % 4) * 0.1).toFixed(1);
                if (parseFloat(nm.rating) > 9.5) nm.rating = '9.5';
                nm.genre = m.genre + genres[i % genres.length];
                nm.desc = m.desc + ' ' + ['Versi spesial', 'Edisi terbatas', 'Rilis ulang', 'Versi lengkap', 'Bonus scene'][i % 5];
            }
            all.push(nm);
        });
    }
    return all.slice(0, 1000);
}

allMovies = generateMovies();
filteredMovies = [...allMovies];

function renderMovies(movies, page = 1) {
    const grid = document.getElementById('movieGrid');
    const pag = document.getElementById('pagination');
    if (!movies || !movies.length) {
        grid.innerHTML = '<div class="no-result">Tidak ada film ditemukan.</div>';
        pag.innerHTML = '';
        document.getElementById('resultInfo').style.display = 'none';
        return;
    }
    const totalPages = Math.ceil(movies.length / PER_PAGE);
    const start = (page - 1) * PER_PAGE;
    const end = start + PER_PAGE;
    const pageMovies = movies.slice(start, end);
    document.getElementById('resultInfo').textContent = `Menampilkan ${pageMovies.length} dari ${movies.length} film • Halaman ${page}/${totalPages}`;
    
    grid.innerHTML = pageMovies.map(item => `
        <div class="card" onclick="openMovie(${item.id})">
            <img src="${item.image}" onerror="this.src='https://via.placeholder.com/210x290/1a1a1a/333?text=${encodeURIComponent(item.title.substring(0,12))}'">
            <div class="info">
                <h3>${item.title}</h3>
                <div class="meta">
                    <span>${item.year}</span>
                    <span>⭐ ${item.rating}</span>
                    <span class="badge">${item.genre.split(',')[0]}</span>
                </div>
            </div>
        </div>
    `).join('');
    
    let html = '';
    if (totalPages > 1) {
        html += `<button onclick="changePage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹ Prev</button>`;
        let sp = Math.max(1, page - 2), ep = Math.min(totalPages, page + 2);
        if (sp > 1) { html += `<button onclick="changePage(1)">1</button>`; if (sp > 2) html += `<span style="color:rgba(255,255,255,.15);padding:0 6px;">…</span>`; }
        for (let i = sp; i <= ep; i++) html += `<button onclick="changePage(${i})" class="${i === page ? 'active' : ''}">${i}</button>`;
        if (ep < totalPages) { if (ep < totalPages - 1) html += `<span style="color:rgba(255,255,255,.15);padding:0 6px;">…</span>`; html += `<button onclick="changePage(${totalPages})">${totalPages}</button>`; }
        html += `<button onclick="changePage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>Next ›</button>`;
    }
    pag.innerHTML = html;
}

function changePage(p) {
    if (p < 1) return;
    const tp = Math.ceil(filteredMovies.length / PER_PAGE);
    if (p > tp) return;
    currentPage = p;
    renderMovies(filteredMovies, p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function searchMovies() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    filteredMovies = q ? allMovies.filter(m => m.title.toLowerCase().includes(q) || m.genre.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q)) : [...allMovies];
    currentPage = 1;
    renderMovies(filteredMovies, 1);
}

function resetSearch() {
    document.getElementById('searchInput').value = '';
    filteredMovies = [...allMovies];
    currentPage = 1;
    renderMovies(filteredMovies, 1);
}

function openMovie(id) {
    const m = allMovies.find(x => x.id === id);
    if (!m) return;
    document.getElementById('modalTitle').textContent = '-EDWARD- - ' + m.title;
    document.getElementById('modalContent').innerHTML = `
        <iframe src="${m.embed}" allowfullscreen></iframe>
        <h2>${m.title}</h2>
        <div class="sub">${m.year} • ⭐ ${m.rating} • ${m.genre}</div>
        <div class="desc">${m.desc}</div>
        <button class="btn-close" onclick="closeModal()">Tutup</button>
    `;
    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = 'auto';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
renderMovies(filteredMovies, 1);
</script>
</body>
</html>
