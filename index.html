<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - Nonton Ilegal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e17;color:#fff;font-family:'Segoe UI',sans-serif;padding:15px}
:root{--p:#ff2d55;--s:#00d4ff}
.header{text-align:center;padding:20px 0 10px;border-bottom:2px solid var(--p)}
.header h1{font-size:28px;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:11px;color:rgba(255,255,255,.4)}
.search-wrap{display:flex;gap:10px;margin:15px 0;background:#141b2b;border-radius:30px;padding:5px}
.search-wrap input{flex:1;background:0;border:0;padding:14px 18px;color:#fff;font-size:14px;outline:0}
.search-wrap input::placeholder{color:rgba(255,255,255,.3)}
.search-wrap button{background:var(--p);border:0;border-radius:30px;padding:12px 25px;color:#fff;font-weight:700;cursor:pointer}
.cat-scroll{display:flex;gap:12px;overflow-x:auto;padding:12px 0;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-scroll button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:8px 20px;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap}
.cat-scroll button.active{background:var(--p);border-color:var(--p);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:15px;margin-top:15px}
.card{background:#141b2b;border-radius:16px;overflow:hidden;cursor:pointer;border:1px solid transparent;transition:.3s}
.card:hover{transform:translateY(-5px);border-color:var(--p)}
.card .poster{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;text-align:center;padding:10px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.8);background:#1a2335;position:relative}
.card .poster .title{position:absolute;bottom:10px;left:0;right:0;background:rgba(0,0,0,.6);padding:8px;font-size:11px}
.card .poster img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.card .info{padding:12px}
.card .info h4{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .info p{font-size:10px;color:rgba(255,255,255,.5)}
.player-wrap{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.98);z-index:99999;flex-direction:column;align-items:center;justify-content:center;padding:15px}
.player-wrap .top{position:absolute;top:0;width:100%;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.7);border-bottom:2px solid var(--p)}
.player-wrap .top .t{font-weight:700;font-size:16px}
.player-wrap .top .actions{display:flex;gap:10px;align-items:center}
.player-wrap .top .actions button{background:var(--p);border:0;color:#fff;padding:8px 16px;border-radius:30px;cursor:pointer;font-weight:700;font-size:12px}
.player-wrap .top .close{background:var(--p);border:0;color:#fff;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer}
.player-wrap iframe{width:100%;max-width:1100px;height:75vh;border-radius:16px;border:2px solid var(--p);background:#000}
.player-wrap .servers{position:absolute;bottom:30px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;background:rgba(0,0,0,.6);padding:12px 20px;border-radius:50px}
.player-wrap .servers button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:30px;padding:8px 18px;color:#fff;cursor:pointer;font-size:12px;transition:.2s}
.player-wrap .servers button.active{background:var(--p);border-color:var(--p)}
.player-wrap .servers button:hover{background:rgba(255,255,255,.2)}
.loading{text-align:center;padding:40px;color:rgba(255,255,255,.3)}
.footer{text-align:center;padding:30px 0 10px;border-top:1px solid rgba(255,255,255,.05);margin-top:20px}
.footer p{font-size:11px;color:rgba(255,255,255,.2)}
.footer span{color:var(--p)}
.custom-link-wrap{display:flex;gap:10px;margin-top:10px;padding:10px;background:rgba(255,255,255,.05);border-radius:16px;flex-wrap:wrap;width:95%;max-width:1100px;justify-content:center}
.custom-link-wrap input{flex:1;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:10px 16px;color:#fff;font-size:12px;outline:0;min-width:200px}
.custom-link-wrap input::placeholder{color:rgba(255,255,255,.3)}
.custom-link-wrap button{background:var(--p);border:0;border-radius:30px;padding:10px 20px;color:#fff;font-weight:700;cursor:pointer;font-size:12px}
</style>
</head>
<body>

<div class="header">
<h1>🎬 EDWARD</h1>
<p>Nonton Anime, Movie, Donghua & Drama Ilegal • 250+ Judul</p>
</div>

<div class="search-wrap">
<input id="search" placeholder="Cari judul..." onkeyup="if(event.key==='Enter') search()">
<button onclick="search()">🔍 Cari</button>
</div>

<div class="cat-scroll" id="cat">
<button class="active" onclick="setCat('all')">🔥 Semua</button>
<button onclick="setCat('anime')">🎌 Anime</button>
<button onclick="setCat('donghua')">🐉 Donghua</button>
<button onclick="setCat('movie')">🎬 Movie</button>
<button onclick="setCat('kdrama')">🇰🇷 K-Drama</button>
<button onclick="setCat('classic')">📼 Classic</button>
</div>

<div id="grid" class="grid"><div class="loading">⏳ Loading...</div></div>

<div class="footer"><p>© 2026 <span>EDWARD</span> • 100% Ilegal</p></div>

<div class="player-wrap" id="player">
<div class="top">
<span class="t" id="ptitle">🎬 Now Playing</span>
<div class="actions">
<button onclick="refreshPlayer()">🔄 Refresh</button>
<button onclick="nextServer()">⏭ Next</button>
<button class="close" onclick="closePlayer()">✕</button>
</div>
</div>
<iframe id="iframe" src="" allowfullscreen></iframe>
<div class="servers" id="sv"></div>
<div class="custom-link-wrap">
<input id="customLink" placeholder="Masukkan link streaming alternatif (opsional)...">
<button onclick="playCustomLink()">▶️ Putar</button>
</div>
</div>

<script>
// ============================================
// 3 SERVER PLAYER (STABIL & POWERFUL)
// ============================================
const SVR = [
    // Server 1: vidsrc.net - PALING STABIL
    id => `https://vidsrc.net/embed/movie/${id}`,
    // Server 2: 2embed.cc - BACKUP BAGUS
    id => `https://www.2embed.cc/embed/${id}`,
    // Server 3: multiembed.mov - ALTERNATIF TERBAIK
    id => `https://multiembed.mov/?video_id=${id}&tmdb=1`
];

const SVR_NAMES = ['🔥 Server 1', '⚡ Server 2', '🎯 Server 3'];

let curSvr = 0, curId = '', curCat = 'all', customUrl = '';

function getUrl(id){ 
    if (customUrl) return customUrl;
    if (id && SVR[curSvr]) return SVR[curSvr](id);
    return 'about:blank';
}

function switchSvr(i){
    curSvr = i;
    customUrl = '';
    document.querySelectorAll('#sv button').forEach((b,j) => b.classList.toggle('active', j === i));
    if(curId) {
        document.getElementById('iframe').src = getUrl(curId);
    }
}

function nextServer(){
    if (curSvr < SVR.length - 1) {
        switchSvr(curSvr + 1);
    } else {
        switchSvr(0);
    }
}

function refreshPlayer(){
    if(curId) {
        document.getElementById('iframe').src = getUrl(curId);
    } else if (customUrl) {
        document.getElementById('iframe').src = customUrl;
    }
}

function playCustomLink(){
    const link = document.getElementById('customLink').value.trim();
    if (!link) return alert('Masukkan link streaming dulu bos!');
    customUrl = link;
    document.getElementById('iframe').src = link;
    document.getElementById('player').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    document.getElementById('ptitle').textContent = '🎬 Custom Link';
    document.querySelectorAll('#sv button').forEach(b => b.classList.remove('active'));
}

// ============================================
// POSTER
// ============================================
const COLORS = ['#ff2d55','#00d4ff','#ff6b35','#ffd700','#7b2ffc','#00e676','#ff4081','#40c4ff','#ffab00','#e040fb','#00bcd4','#ff5722'];

function getColor(title) {
    let hash = 0;
    for (let i = 0; i < title.length; i++) {
        hash = title.charCodeAt(i) + ((hash << 5) - hash);
    }
    return COLORS[Math.abs(hash) % COLORS.length];
}

const POSTERS = {
    'tt0195714': 'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg',
    'tt0309593': 'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg',
    'tt0414982': 'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg',
    'tt1144884': 'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg',
    'tt1622979': 'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg',
    'tt27040740': 'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg',
    'tt12345678': 'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg',
    'tt6263850': 'https://m.media-amazon.com/images/M/MV5BZmU0M2Y1OGUtZjIxNi00ZjBkLTg1MjgtOWIyNThiZWIwYjRiXkEyXkFqcGdeQXVyMTQyMTMwOTk0._V1_.jpg',
    'tt2560140': 'https://cdn.myanimelist.net/images/anime/1000/110531.jpg',
    'tt9335498': 'https://cdn.myanimelist.net/images/anime/1286/99889.jpg',
    'tt0388629': 'https://cdn.myanimelist.net/images/anime/1244/138851.jpg',
    'tt12343534': 'https://cdn.myanimelist.net/images/anime/1171/109222.jpg',
    'tt26635464': 'https://cdn.myanimelist.net/images/anime/1303/138497.jpg',
    'tt0988824': 'https://cdn.myanimelist.net/images/anime/1460/98853.jpg',
    'tt0434665': 'https://cdn.myanimelist.net/images/anime/1220/142476.jpg',
    'tt11737520': 'https://cdn.myanimelist.net/images/anime/1806/126216.jpg',
    'tt19463462': 'https://m.media-amazon.com/images/M/MV5BZjAyZmE4OTAtYmVkZi00NThjLWIxYzgtNmU5NTViNzhhMmQxXkEyXkFqcGdeQXVyMTEyMjM2NDc2._V1_.jpg',
    'tt0068646': 'https://m.media-amazon.com/images/M/MV5BM2MyNjYxNmUtYTVlMC00MmU3LTg5NmUtMTk4OTg0YzA1MGIxXkEyXkFqcGdeQXVyNzkwMjQ5NzM@._V1_.jpg',
    'tt0111161': 'https://m.media-amazon.com/images/M/MV5BNDE3ODcxYzMtY2YzZC00NzA3LWFmYmEtY2QwYmU2ZGFiMGI1XkEyXkFqcGdeQXVyNjAwNDUxODI@._V1_.jpg',
    'tt0468569': 'https://m.media-amazon.com/images/M/MV5BMTMxNTMwODM0NF5BMl5BanBnXkFtZTcwODAyMTk2Mw@@._V1_.jpg'
};

function getPoster(id, title) {
    if (id && POSTERS[id]) return POSTERS[id];
    return null;
}

// ============================================
// DATABASE
// ============================================
const DB = [
{title:'Attack on Titan Final',id:'tt2560140',type:'Anime'},
{title:'Demon Slayer S4',id:'tt9335498',type:'Anime'},
{title:'One Piece (Latest)',id:'tt0388629',type:'Anime'},
{title:'Jujutsu Kaisen S3',id:'tt12343534',type:'Anime'},
{title:'Solo Leveling S2',id:'tt26635464',type:'Anime'},
{title:'Naruto Shippuden',id:'tt0988824',type:'Anime'},

{title:'My Hero Academia S7',id:'tt10839590',type:'Anime'},
{title:'Tokyo Revengers S3',id:'tt15340256',type:'Anime'},
{title:'Soul Land',id:'tt10544940',type:'Donghua'},
{title:'Battle Through Heavens',id:'tt10544942',type:'Donghua'},

{title:'Tian Guan Ci Fu',id:'tt10544952',type:'Donghua'},
{title:'Final Destination 1',id:'tt0195714',type:'Movie'},
{title:'Final Destination 2',id:'tt0309593',type:'Movie'},
{title:'Final Destination 3',id:'tt0414982',type:'Movie'},
{title:'The Final Destination 4',id:'tt1144884',type:'Movie'},
{title:'Final Destination 5',id:'tt1622979',type:'Movie'},
{title:'Final Destination: Bloodlines (2025)',id:'tt27040740',type:'Movie'},
{title:'Merah Putih One For All',id:'tt12345678',type:'Movie'},
{title:'Deadpool 3',id:'tt6263850',type:'Movie'},
{title:'Dune 3',id:'tt30933272',type:'Movie'},
{title:'Avatar 3',id:'tt17576734',type:'Movie'},
{title:'Avengers 5',id:'tt21361868',type:'Movie'},
{title:'Spider-Man 4',id:'tt31289056',type:'Movie'},
{title:'The Batman 2',id:'tt20118904',type:'Movie'},
{title:'Joker 2',id:'tt14858048',type:'Movie'},
{title:'Gladiator 2',id:'tt10366206',type:'Movie'},
{title:'Squid Game S3',id:'tt19463462',type:'K-Drama'},
{title:'All of Us Are Dead S2',id:'tt23898882',type:'K-Drama'},
{title:'The Glory S2',id:'tt20859782',type:'K-Drama'},
{title:'My Name',id:'tt15553894',type:'K-Drama'},
{title:'The Godfather',id:'tt0068646',type:'Classic'},
{title:'Shawshank Redemption',id:'tt0111161',type:'Classic'},
{title:'The Dark Knight',id:'tt0468569',type:'Classic'}
];

// ============================================
// RENDER SERVER BUTTON
// ============================================
function renderServerButtons() {
    const container = document.getElementById('sv');
    container.innerHTML = SVR.map((_, i) => 
        `<button class="${i === curSvr ? 'active' : ''}" onclick="switchSvr(${i})">${SVR_NAMES[i]}</button>`
    ).join('');
}

// ============================================
// FUNGSI UTAMA
// ============================================
function setCat(c){
    curCat = c;
    document.querySelectorAll('#cat button').forEach(b => b.classList.remove('active'));
    document.querySelector(`#cat button[onclick="setCat('${c}')"]`).classList.add('active');
    document.getElementById('search').value = '';
    render();
}

function search(){
    const q = document.getElementById('search').value.trim().toLowerCase();
    if(!q) return render();
    const f = DB.filter(i => i.title.toLowerCase().includes(q) || i.type.toLowerCase().includes(q));
    renderResults(f.length ? f : [{title:'Tidak ditemukan', id:null, type:'Error'}]);
}

function render(){
    let f = DB;
    if(curCat !== 'all') {
        f = DB.filter(i => 
            i.type.toLowerCase() === curCat.toLowerCase() ||
            (curCat === 'kdrama' && i.type === 'K-Drama') ||
            (curCat === 'classic' && i.type === 'Classic') ||
            (curCat === 'donghua' && i.type === 'Donghua')
        );
    }
    renderResults(f);
}

function renderResults(items){
    const g = document.getElementById('grid');
    if(!items || !items.length || (items.length === 1 && items[0].title === 'Tidak ditemukan')) {
        g.innerHTML = '<div class="loading">😞 Tidak ada hasil</div>';
        return;
    }
    g.innerHTML = items.map(i => {
        const poster = getPoster(i.id, i.title);
        const color = getColor(i.title);
        return `
        <div class="card" onclick="${i.id ? `play('${i.id}','${i.title.replace(/'/g, "\\'")}')` : ''}">
            <div class="poster" style="background:${color};">
                ${poster ? `<img src="${poster}" onerror="this.style.display='none'">` : ''}
                <span style="font-size:18px;font-weight:900;text-align:center;padding:10px;word-wrap:break-word;z-index:1;text-shadow:0 2px 10px rgba(0,0,0,.9);">${i.title}</span>
                <div class="title">${i.type}</div>
            </div>
            <div class="info">
                <h4>${i.title}</h4>
                <p>${i.type}</p>
            </div>
        </div>
    `}).join('');
}

function play(id, title){
    curId = id;
    customUrl = '';
    document.getElementById('ptitle').textContent = '🎬 ' + title;
    document.getElementById('iframe').src = getUrl(id);
    document.getElementById('player').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    document.getElementById('customLink').value = '';
    renderServerButtons();
}

function closePlayer(){
    document.getElementById('player').style.display = 'none';
    document.getElementById('iframe').src = '';
    curId = '';
    customUrl = '';
    document.body.style.overflow = 'auto';
    document.getElementById('customLink').value = '';
}

// ============================================
// INIT
// ============================================
window.onload = () => {
    render();
    document.querySelector('#cat button:first-child')?.classList.add('active');
    renderServerButtons();
};

document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closePlayer();
});
</script>
</body>
</html>
