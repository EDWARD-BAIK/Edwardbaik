<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - Nonton Gratis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#fff;font-family:'Segoe UI',sans-serif;padding:10px;min-height:100vh;overflow-x:hidden}
::selection{background:#ff2d55;color:#fff}

/* ===== BACKGROUND GERAK ===== */
.background-scene{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;overflow:hidden}
.sky{position:absolute;top:0;left:0;width:100%;height:60%;background:linear-gradient(180deg,#1a237e,#42a5f5,#81d4fa);animation:skyAnim 20s ease-in-out infinite alternate}
@keyframes skyAnim{
0%{background:linear-gradient(180deg,#1a237e,#42a5f5,#81d4fa)}
50%{background:linear-gradient(180deg,#0d47a1,#1e88e5,#4fc3f7)}
100%{background:linear-gradient(180deg,#1a237e,#42a5f5,#81d4fa)}
}
.sun{position:absolute;top:8%;right:10%;width:60px;height:60px;background:radial-gradient(circle,#ffeb3b,#ff9800);border-radius:50%;box-shadow:0 0 80px #ffeb3b;animation:sunAnim 15s ease-in-out infinite alternate}
@keyframes sunAnim{
0%{transform:translateX(0) scale(1)}
100%{transform:translateX(30px) scale(1.1)}
}
.clouds{position:absolute;top:10%;width:100%;height:100px;display:flex;gap:50px;animation:cloudMove 25s linear infinite}
.cloud{width:120px;height:40px;background:rgba(255,255,255,.2);border-radius:50px;filter:blur(3px)}
.cloud:nth-child(1){animation:cloudFloat 20s ease-in-out infinite}
.cloud:nth-child(2){animation:cloudFloat 25s ease-in-out infinite reverse}
.cloud:nth-child(3){animation:cloudFloat 30s ease-in-out infinite}
@keyframes cloudFloat{
0%{transform:translateX(-200px)}
100%{transform:translateX(calc(100vw + 200px))}
}
@keyframes cloudMove{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}
.mountains{position:absolute;bottom:25%;width:100%;height:150px;display:flex;gap:0}
.mountain{width:0;height:0;border-left:80px solid transparent;border-right:80px solid transparent;border-bottom:120px solid #2e7d32;filter:drop-shadow(0 5px 10px rgba(0,0,0,.3))}
.mountain:nth-child(1){border-bottom-color:#1b5e20;transform:scale(1.2)}
.mountain:nth-child(2){border-bottom-color:#2e7d32;transform:scale(1.5)}
.mountain:nth-child(3){border-bottom-color:#388e3c;transform:scale(1)}
.mountain:nth-child(4){border-bottom-color:#1b5e20;transform:scale(1.3)}
.trees{position:absolute;bottom:15%;width:100%;display:flex;gap:10px;justify-content:space-around;flex-wrap:wrap}
.tree{width:20px;height:40px;background:linear-gradient(180deg,#2e7d32,#1b5e20);clip-path:polygon(50% 0%,0% 100%,100% 100%);animation:treeSway 3s ease-in-out infinite alternate;transform-origin:bottom}
.tree:nth-child(odd){animation-delay:.5s}
.tree:nth-child(3n){height:50px;width:25px}
.tree:nth-child(5n){height:35px;width:18px}
@keyframes treeSway{
0%{transform:rotate(-3deg)}
100%{transform:rotate(3deg)}
}
.grass{position:absolute;bottom:0;width:100%;height:15%;background:linear-gradient(0deg,#2e7d32,#4caf50,#66bb6a);border-radius:50% 50% 0 0 / 20% 20% 0 0}
.grass-blade{position:absolute;bottom:0;width:4px;height:20px;background:#4caf50;border-radius:50% 50% 0 0;animation:grassSway 2s ease-in-out infinite alternate;transform-origin:bottom}
@keyframes grassSway{
0%{transform:rotate(-5deg)}
100%{transform:rotate(5deg)}
}

/* ===== OVERLAY ===== */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:0;pointer-events:none}

/* ===== KONTEN ===== */
.header{text-align:center;padding:15px 0 10px;border-bottom:2px solid #ff2d55;margin-bottom:10px;position:relative;z-index:1}
.header h1{font-size:26px;background:linear-gradient(135deg,#ff2d55,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.header p{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}

.search-wrap{display:flex;gap:8px;margin:10px 0;background:#141b2b;border-radius:30px;padding:4px;position:relative;z-index:1}
.search-wrap input{flex:1;background:0;border:0;padding:12px 16px;color:#fff;font-size:13px;outline:0}
.search-wrap input::placeholder{color:rgba(255,255,255,.3)}
.search-wrap button{background:#ff2d55;border:0;border-radius:30px;padding:10px 20px;color:#fff;font-weight:600;cursor:pointer}
.search-wrap button:active{transform:scale(.95)}

.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding:8px 0;margin-bottom:8px;scrollbar-width:none;position:relative;z-index:1}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-scroll button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:30px;padding:6px 16px;color:#aaa;font-size:11px;cursor:pointer;white-space:nowrap;transition:.2s}
.cat-scroll button.active{background:#ff2d55;border-color:#ff2d55;color:#fff}
.cat-scroll button:active{transform:scale(.95)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:10px;position:relative;z-index:1}
.card{background:#141b2b;border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid transparent;transition:.2s}
.card:active{transform:scale(.96)}
.card .poster{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;font-size:13px;font-weight:700;color:#fff;position:relative;background:#1a2335}
.card .poster img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.card .poster span{position:relative;z-index:1;text-shadow:0 2px 10px rgba(0,0,0,.8);padding:4px}
.card .poster .label{position:absolute;bottom:6px;left:6px;right:6px;background:rgba(0,0,0,.7);padding:4px;border-radius:6px;font-size:9px;font-weight:400;z-index:1}
.card .info{padding:10px 12px}
.card .info h4{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .info p{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}

.player-wrap{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:flex-start;padding:10px;padding-top:60px}
.player-wrap .top{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.8);border-bottom:2px solid #ff2d55;flex-wrap:wrap;gap:8px;z-index:10}
.player-wrap .top .t{font-size:14px;font-weight:600;max-width:60%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-wrap .top .actions{display:flex;gap:6px;flex-wrap:wrap}
.player-wrap .top .actions button{background:#ff2d55;border:0;border-radius:30px;padding:6px 14px;color:#fff;font-weight:600;font-size:11px;cursor:pointer}
.player-wrap .top .actions button:active{transform:scale(.95)}
.player-wrap .top .close{background:#ff2d55}
.player-wrap iframe{width:100%;max-width:1100px;height:65vh;border-radius:12px;border:2px solid #ff2d55;background:#000;flex-shrink:0;border:none;outline:none}

.player-wrap .server-divider{width:80%;max-width:800px;height:2px;background:linear-gradient(90deg,transparent,#ff2d55,transparent);margin:10px 0 8px 0;opacity:.6;flex-shrink:0}
.player-wrap .server-area{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;background:rgba(0,0,0,.7);padding:10px 16px;border-radius:30px;backdrop-filter:blur(8px);z-index:10;max-width:95%;border:1px solid rgba(255,45,85,.2);min-width:150px;flex-shrink:0}
.player-wrap .server-area button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:30px;padding:8px 12px;color:#fff;font-size:11px;cursor:pointer;transition:.2s;font-weight:500;text-align:center}
.player-wrap .server-area button.active{background:#ff2d55;border-color:#ff2d55;box-shadow:0 0 20px rgba(255,45,85,.3)}
.player-wrap .server-area button:active{transform:scale(.95)}
.player-wrap .server-area button:hover{background:rgba(255,45,85,.2)}

.loading{text-align:center;padding:30px;color:rgba(255,255,255,.3);font-size:13px}
.footer{text-align:center;padding:20px 0 8px;border-top:1px solid rgba(255,255,255,.05);margin-top:15px;position:relative;z-index:1}
.footer p{font-size:10px;color:rgba(255,255,255,.2)}
.footer span{color:#ff2d55}
</style>
</head>
<body>

<!-- ===== BACKGROUND ===== -->
<div class="background-scene">
<div class="sky"></div>
<div class="sun"></div>
<div class="clouds"><div class="cloud"></div><div class="cloud"></div><div class="cloud"></div></div>
<div class="mountains"><div class="mountain"></div><div class="mountain"></div><div class="mountain"></div><div class="mountain"></div></div>
<div class="trees">
<div class="tree"></div><div class="tree"></div><div class="tree"></div><div class="tree"></div>
<div class="tree"></div><div class="tree"></div><div class="tree"></div><div class="tree"></div>
<div class="tree"></div><div class="tree"></div><div class="tree"></div><div class="tree"></div>
</div>
<div class="grass"></div>
</div>
<div class="overlay"></div>

<!-- ===== KONTEN ===== -->
<div class="header">
<h1>🎬 EDWARD</h1>
<p>Nonton Anime & Movie Gratis • 100% GRATIS</p>
</div>

<div class="search-wrap">
<input id="search" placeholder="Cari judul..." onkeyup="if(event.key==='Enter') search()">
<button onclick="search()">🔍 Cari</button>
</div>

<div class="cat-scroll" id="cat">
<button class="active" onclick="setCat('all')">🔥 Semua</button>
<button onclick="setCat('anime')">🎌 Anime</button>
<button onclick="setCat('movie')">🎬 Movie</button>
<button onclick="setCat('classic')">📼 Classic</button>
</div>

<div id="grid" class="grid"></div>

<div class="footer"><p>© 2026 <span>EDWARD</span> • 100% GRATIS</p></div>

<div class="player-wrap" id="player">
<div class="top">
<span class="t" id="ptitle">🎬 Now Playing</span>
<div class="actions">
<button onclick="refreshPlayer()">🔄 Refresh</button>
<button onclick="nextServer()">⏭ Next</button>
<button class="close" onclick="closePlayer()">✕</button>
</div>
</div>
<iframe id="iframe" src="" allowfullscreen></iframe>
<div class="server-divider"></div>
<div class="server-area" id="sv"></div>
</div>

<script>
// ===== DATA FILM (DENGAN POSTER ASLI) =====
const FILMS = [
// ANIME
{title:'Attack on Titan',id:'tt2560140',type:'Anime',img:'https://m.media-amazon.com/images/M/MV5BNDFjYTI4MjctNjExMS00MjBjLWJhMzYtYzUyMTE4MzQ4NjgxXkEyXkFqcGc@._V1_.jpg'},
{title:'Demon Slayer',id:'tt9335498',type:'Anime',img:'https://m.media-amazon.com/images/M/MV5BZjZjNzI5MDctY2Y4YS00NmM4LTljMmItZTFkOTExNGI3ODRhXkEyXkFqcGc@._V1_.jpg'},
{title:'One Piece',id:'tt0388629',type:'Anime',img:'https://m.media-amazon.com/images/M/MV5BODcwNWE3OTMtMDc3MS00NDFjLWE3OTctNDU3NjI3NjBmMWQyXkEyXkFqcGc@._V1_.jpg'},
{title:'Jujutsu Kaisen',id:'tt12343534',type:'Anime',img:'https://m.media-amazon.com/images/M/MV5BZDg4YjRlMTAtNzY1Ny00NzA5LWEyNDYtZjk3ZThiYzA0ZDkzXkEyXkFqcGc@._V1_.jpg'},
{title:'Naruto',id:'tt0988824',type:'Anime',img:'https://m.media-amazon.com/images/M/MV5BZmQ5NGFiNWEtMmMyMC00MDdiLTg4YjktOGY5Yzc2MDUxMTE1XkEyXkFqcGc@._V1_.jpg'},
{title:'Bleach',id:'tt0434665',type:'Anime',img:'https://m.media-amazon.com/images/M/MV5BZjE0YjVjODQtZGY2NS00MDcyLThhMDAtZGQwMTZiOWNmNjRiXkEyXkFqcGc@._V1_.jpg'},
// MOVIE
{title:'The Lion',id:'tt6105098',type:'Movie',img:'https://m.media-amazon.com/images/M/MV5BOTk4ODU0MzYtODQyNi00ODI0LWIyZjAtY2ZlZDMzMTM0YzY4XkEyXkFqcGc@._V1_.jpg'},
{title:'Everything Everywhere All at Once',id:'tt6710474',type:'Movie',img:'https://m.media-amazon.com/images/M/MV5BYTdiOTM5MWMtYjRjZC00YjdmLTk5MTYtZDA5YzI5N2MxNjBjXkEyXkFqcGc@._V1_.jpg'},
{title:'Only the Brave',id:'tt3829920',type:'Movie',img:'https://m.media-amazon.com/images/M/MV5BMjA5NDM1MzE1MF5BMl5BanBnXkFtZTgwMjg4MjI4MjE@._V1_.jpg'},
{title:'Final Destination 1',id:'tt0195714',type:'Movie',img:'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg'},
{title:'Final Destination 2',id:'tt0309593',type:'Movie',img:'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg'},
{title:'Final Destination 3',id:'tt0414982',type:'Movie',img:'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg'},
{title:'Final Destination 4',id:'tt1144884',type:'Movie',img:'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg'},
{title:'Final Destination 5',id:'tt1622979',type:'Movie',img:'https://m.media-amazon.com/images/M/MV5BMTc5OTU2OTM0M15BMl5BanBnXkFtZTYwMTM1ODg5._V1_.jpg'},
{title:'Deadpool 3',id:'tt6263850',type:'Movie',img:'https://m.media-amazon.com/images/M/MV5BZmU0M2Y1OGUtZjIxNi00ZjBkLTg1MjgtOWIyNThiZWIwYjRiXkEyXkFqcGc@._V1_.jpg'},
// CLASSIC
{title:'The Godfather',id:'tt0068646',type:'Classic',img:'https://m.media-amazon.com/images/M/MV5BM2MyNjYxNmUtYTVlMC00MmU3LTg5NmUtMTk4OTg0YzA1MGIxXkEyXkFqcGc@._V1_.jpg'},
{title:'The Dark Knight',id:'tt0468569',type:'Classic',img:'https://m.media-amazon.com/images/M/MV5BMTMxNTMwODM0NF5BMl5BanBnXkFtZTcwODAyMTk2Mw@@._V1_.jpg'}
];

// ===== 2 SERVER =====
const SERVERS = [
    id => `https://vidsrc.in/embed/movie/${id}`,
    id => `https://vidsrc.me/embed/${id}`
];
const SERVER_NAMES = ['S1', 'S2'];

let curSvr = 0, curId = '', curCat = 'all';

function getUrl(id){ return SERVERS[curSvr](id); }

function switchSvr(i){ 
    curSvr = i; 
    document.querySelectorAll('#sv button').forEach((b,j) => b.classList.toggle('active', j === i)); 
    if(curId) document.getElementById('iframe').src = getUrl(curId); 
}

function nextServer(){ 
    const next = (curSvr + 1) % SERVERS.length; 
    switchSvr(next); 
}

function refreshPlayer(){ 
    if(curId) document.getElementById('iframe').src = getUrl(curId); 
}

function renderServers(){
    const container = document.getElementById('sv');
    container.innerHTML = SERVERS.map((_, i) => 
        `<button class="${i === curSvr ? 'active' : ''}" onclick="switchSvr(${i})">${SERVER_NAMES[i]}</button>`
    ).join('');
}

function render(){
    let items = FILMS;
    if(curCat !== 'all'){
        items = FILMS.filter(i => 
            i.type.toLowerCase() === curCat.toLowerCase() ||
            (curCat === 'classic' && i.type === 'Classic')
        );
    }
    const grid = document.getElementById('grid');
    if(!items.length){ grid.innerHTML='<div class="loading">😞 Tidak ada hasil</div>'; return; }
    grid.innerHTML = items.map(i => {
        return `<div class="card" onclick="play('${i.id}','${i.title.replace(/'/g,"\\'")}')">
            <div class="poster">
                <img src="${i.img}" onerror="this.style.display='none'">
                <span>${i.title}</span>
                <div class="label">${i.type}</div>
            </div>
            <div class="info"><h4>${i.title}</h4><p>${i.type}</p></div>
        </div>`;
    }).join('');
}

function search(){
    const q = document.getElementById('search').value.trim().toLowerCase();
    if(!q) return render();
    const f = FILMS.filter(i => i.title.toLowerCase().includes(q) || i.type.toLowerCase().includes(q));
    const grid = document.getElementById('grid');
    if(!f.length){ grid.innerHTML='<div class="loading">😞 Tidak ada hasil</div>'; return; }
    grid.innerHTML = f.map(i => {
        return `<div class="card" onclick="play('${i.id}','${i.title.replace(/'/g,"\\'")}')">
            <div class="poster">
                <img src="${i.img}" onerror="this.style.display='none'">
                <span>${i.title}</span>
                <div class="label">${i.type}</div>
            </div>
            <div class="info"><h4>${i.title}</h4><p>${i.type}</p></div>
        </div>`;
    }).join('');
}

function setCat(c){ 
    curCat = c; 
    document.querySelectorAll('#cat button').forEach(b => b.classList.remove('active')); 
    document.querySelector(`#cat button[onclick="setCat('${c}')"]`).classList.add('active'); 
    document.getElementById('search').value = ''; 
    render(); 
}

function play(id, title){
    curId = id;
    document.getElementById('ptitle').textContent = '🎬 ' + title;
    document.getElementById('iframe').src = getUrl(id);
    document.getElementById('player').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    renderServers();
}

function closePlayer(){
    document.getElementById('player').style.display = 'none';
    document.getElementById('iframe').src = '';
    curId = '';
    document.body.style.overflow = 'auto';
}

window.onload = function(){ 
    render(); 
    renderServers(); 
};
document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closePlayer(); });
</script>
</body>
</html>
