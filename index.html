<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e17;color:#fff;font-family:'Segoe UI',sans-serif;padding:15px}
:root{--p:#ff2d55;--s:#00d4ff}
.header{text-align:center;padding:20px 0 10px;border-bottom:2px solid var(--p)}
.header h1{font-size:28px;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.header p{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
.search-wrap{display:flex;gap:10px;margin:15px 0;background:#141b2b;border-radius:30px;padding:5px}
.search-wrap input{flex:1;background:0;border:0;padding:14px 18px;color:#fff;font-size:14px;outline:0}
.search-wrap input::placeholder{color:rgba(255,255,255,.3)}
.search-wrap button{background:var(--p);border:0;border-radius:30px;padding:12px 25px;color:#fff;font-weight:700;cursor:pointer;font-size:13px}
.search-wrap button:hover{opacity:.8}
.cat-scroll{display:flex;gap:12px;overflow-x:auto;padding:12px 0;margin-bottom:10px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-scroll button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:8px 20px;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap;transition:.2s}
.cat-scroll button.active{background:var(--p);border-color:var(--p);color:#fff}
.cat-scroll button:hover{background:rgba(255,45,87,.2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:15px;margin-top:15px}
.card{background:#141b2b;border-radius:16px;overflow:hidden;transition:.3s;cursor:pointer;border:1px solid transparent}
.card:hover{transform:translateY(-5px);border-color:var(--p)}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1a2335}
.card .info{padding:12px}
.card .info h4{font-size:13px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .info p{font-size:10px;color:rgba(255,255,255,.5)}
.card-wrap{position:relative}
.player-wrap{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.98);z-index:99999;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.player-wrap iframe{width:95%;max-width:1000px;height:75vh;border-radius:20px;border:2px solid var(--p);background:#000}
.player-wrap .close-btn{position:absolute;top:20px;right:20px;background:var(--p);border:0;color:#fff;width:50px;height:50px;border-radius:50%;font-size:24px;cursor:pointer;font-weight:700;z-index:999999}
.player-wrap .close-btn:hover{transform:scale(1.1)}
.player-wrap .server-switch{position:absolute;bottom:30px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;z-index:999999}
.player-wrap .server-switch button{background:rgba(255,255,255,.1);border:1px solid var(--p);border-radius:30px;padding:8px 18px;color:#fff;cursor:pointer;font-size:11px}
.player-wrap .server-switch button:hover{background:var(--p)}
.loading{text-align:center;padding:40px;color:rgba(255,255,255,.3);font-size:14px}
.footer{text-align:center;padding:30px 0 10px;border-top:1px solid rgba(255,255,255,.05);margin-top:20px}
.footer p{font-size:11px;color:rgba(255,255,255,.2)}
.footer span{color:var(--p)}
</style>

// PLAYER MULTI-SERVER (ANTI BLOKIR)
// ============================================
const PLAYER_SERVERS = [
    (id) => `https://multiembed.mov/?video_id=${id}&tmdb=1`,
    (id) => `https://www.2embed.cc/embed/${id}`,
    (id) => `https://vidsrc.me/embed/${id}`,
    (id) => `https://embed.su/embed/${id}`,
    (id) => `https://vidsrc.pro/embed/movie/${id}`
];

let currentServer = 0;
let currentId = '';

function getPlayerUrl(id) {
    try {
        return PLAYER_SERVERS[currentServer](id);
    } catch(e) {
        return PLAYER_SERVERS[0](id);
    }
}

function switchServer(idx) {
    currentServer = idx;
    if (currentId) {
        const iframe = document.getElementById('playerIframe');
        iframe.src = getPlayerUrl(currentId);
    }
}

// FUNGSI UTAMA
// ============================================
let currentCategory = 'all';

function setCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.cat-scroll button').forEach(b => b.classList.remove('active'));
    document.querySelector(`.cat-scroll button[onclick="setCategory('${cat}')"]`)?.classList.add('active');
    document.getElementById('searchInput').value = '';
    renderContent();
}

function searchMedia() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    if (!q) return renderContent();
    const filtered = CONTENT_DB.filter(item => 
        item.title.toLowerCase().includes(q) || 
        item.type.toLowerCase().includes(q)
    );
    renderResults(filtered.length ? filtered : [{title: 'Tidak ditemukan', id: null, type: 'Error', img: ''}]);
}

function renderContent() {
    let filtered = CONTENT_DB;
    if (currentCategory !== 'all') {
        filtered = CONTENT_DB.filter(item => 
            item.type.toLowerCase() === currentCategory.toLowerCase() ||
            (currentCategory === 'kdrama' && item.type === 'K-Drama') ||
            (currentCategory === 'classic' && item.type === 'Classic')
        );
    }
    renderResults(filtered);
}

function renderResults(items) {
    const grid = document.getElementById('resultGrid');
    if (!items || !items.length || (items.length === 1 && items[0].title === 'Tidak ditemukan')) {
        grid.innerHTML = '<div class="loading">😞 Tidak ada hasil</div>';
        return;
    }
    grid.innerHTML = items.map(item => `
        <div class="card-wrap">
            <div class="card" onclick="${item.id ? `playMedia('${item.id}')` : 'alert(\'ID tidak valid\')'}">
                <img src="${item.img || 'https://via.placeholder.com/200x300/1a2335/fff?text=No+Image'}" 
                     onerror="this.src='https://via.placeholder.com/200x300/1a2335/fff?text=Error'">
                <div class="info">
                    <h4>${item.title || 'Unknown'}</h4>
                    <p>${item.type || 'Media'}</p>
                </div>
            </div>
        </div>
    `).join('');
}

function playMedia(id) {
    currentId = id;
    const player = document.getElementById('playerWrap');
    const iframe = document.getElementById('playerIframe');
    iframe.src = getPlayerUrl(id);
    player.style.display = 'flex';
}

function closePlayer() {
    document.getElementById('playerWrap').style.display = 'none';
    document.getElementById('playerIframe').src = '';
    currentId = '';
}

// ============================================
// INIT
// ============================================
window.onload = () => {
    renderContent();
    document.querySelector('.cat-scroll button.active')?.classList.remove('active');
    document.querySelector('.cat-scroll button:first-child')?.classList.add('active');
};

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePlayer();
});
</script>
