<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD CODE LAB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#fff;font-family:'Segoe UI',sans-serif;padding:15px;min-height:100vh}
::selection{background:#ff2d55;color:#fff}

.header{text-align:center;padding:20px 0 10px;border-bottom:2px solid #00d4ff;margin-bottom:15px}
.header h1{font-size:32px;background:linear-gradient(135deg,#00d4ff,#ff2d55,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.header p{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:1px}
.header .sub{font-size:10px;color:rgba(255,255,255,.2);margin-top:2px}

.search-wrap{display:flex;gap:8px;margin:10px 0;background:#141b2b;border-radius:30px;padding:4px}
.search-wrap input{flex:1;background:0;border:0;padding:10px 16px;color:#fff;font-size:13px;outline:0}
.search-wrap input::placeholder{color:rgba(255,255,255,.3)}
.search-wrap button{background:#00d4ff;border:0;border-radius:30px;padding:8px 18px;color:#000;font-weight:700;cursor:pointer}

.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding:8px 0;margin-bottom:10px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-scroll button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:30px;padding:6px 16px;color:#aaa;font-size:11px;cursor:pointer;white-space:nowrap;transition:.2s}
.cat-scroll button.active{background:#00d4ff;border-color:#00d4ff;color:#000;font-weight:700}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px;margin-top:10px}
.card{background:#141b2b;border-radius:16px;padding:18px;border:1px solid rgba(255,255,255,.05);transition:.3s;cursor:pointer}
.card:hover{transform:translateY(-4px);border-color:#00d4ff;box-shadow:0 10px 30px rgba(0,212,255,.1)}
.card .icon{font-size:32px;margin-bottom:8px}
.card h3{font-size:16px;color:#fff;margin-bottom:4px}
.card p{font-size:12px;color:rgba(255,255,255,.5);line-height:1.5}
.card .tag{display:inline-block;background:rgba(0,212,255,.15);color:#00d4ff;padding:2px 12px;border-radius:20px;font-size:10px;margin-top:8px}
.card .tag.virus{background:rgba(255,45,85,.15);color:#ff2d55}
.card .tag.tools{background:rgba(255,215,0,.15);color:#ffd700}
.card .tag.code{background:rgba(0,255,136,.15);color:#00ff88}
.card .tag.apk{background:rgba(255,107,53,.15);color:#ff6b35}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal .top{position:absolute;top:0;left:0;right:0;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.8);border-bottom:2px solid #00d4ff}
.modal .top .t{font-size:18px;font-weight:700;color:#00d4ff}
.modal .top .close{background:#ff2d55;border:0;border-radius:50%;width:40px;height:40px;color:#fff;font-size:20px;cursor:pointer}
.modal .content{max-width:700px;width:100%;max-height:80vh;overflow-y:auto;background:#141b2b;border-radius:16px;padding:25px;border:1px solid rgba(0,212,255,.2)}
.modal .content h2{color:#00d4ff;margin-bottom:10px}
.modal .content p{color:rgba(255,255,255,.7);line-height:1.7;margin-bottom:10px}
.modal .content pre{background:#0a0e17;padding:15px;border-radius:10px;overflow-x:auto;font-size:12px;color:#00ff88;border:1px solid rgba(0,255,136,.1)}
.modal .content .btn{display:inline-block;background:#00d4ff;color:#000;padding:10px 24px;border-radius:30px;text-decoration:none;font-weight:700;margin-top:10px;border:0;cursor:pointer}

.footer{text-align:center;padding:15px 0 8px;border-top:1px solid rgba(255,255,255,.05);margin-top:15px}
.footer p{font-size:9px;color:rgba(255,255,255,.2)}
.footer span{color:#00d4ff}
</style>
</head>
<body>

<div class="header">
<h1>🧠 EDWARD CODE LAB</h1>
<p>Belajar Informatika • Tools • Coding • APK Builder</p>
<div class="sub">~ Powered by Edward ~</div>
</div>

<div class="search-wrap">
<input id="search" placeholder="Cari materi..." onkeyup="if(event.key==='Enter') search()">
<button onclick="search()">🔍 Cari</button>
</div>

<div class="cat-scroll" id="cat">
<button class="active" onclick="filterCat('all')">📚 Semua</button>
<button onclick="filterCat('informatika')">💻 Informatika</button>
<button onclick="filterCat('tools')">🛠️ Tools</button>
<button onclick="filterCat('virus')">☣️ Virus (Edukasi)</button>
<button onclick="filterCat('coding')">⌨️ Coding</button>
<button onclick="filterCat('apk')">📱 APK Builder</button>
</div>

<div id="grid" class="grid"></div>

<div class="footer"><p>© 2026 <span>EDWARD</span> • Edward Code Lab</p></div>

<div class="modal" id="modal">
<div class="top">
<span class="t" id="modalTitle">📚 Materi</span>
<button class="close" onclick="closeModal()">✕</button>
</div>
<div class="content" id="modalContent"></div>
</div>

<script>
// ============================================
// DATA MATERI
// ============================================
const DATA = [
    // INFORMATIKA
    {id:1, title:'Apa itu Informatika?', cat:'informatika', icon:'💻', desc:'Pengertian dasar informatika dan ruang lingkupnya.',
     content:'<h2>💻 Apa itu Informatika?</h2><p>Informatika adalah ilmu yang mempelajari tentang penggunaan komputer untuk mengolah dan menyimpan data.</p><p><strong>Ruang Lingkup:</strong></p><ul style="color:rgba(255,255,255,.7);padding-left:20px;margin:10px 0"><li>Algoritma & Pemrograman</li><li>Jaringan Komputer</li><li>Basis Data</li><li>Kecerdasan Buatan</li><li>Keamanan Siber</li></ul><p>Informatika bukan hanya tentang coding, tapi juga tentang logika dan pemecahan masalah.</p>'},
    {id:2, title:'Sejarah Komputer', cat:'informatika', icon:'🖥️', desc:'Perjalanan evolusi komputer dari masa ke masa.',
     content:'<h2>🖥️ Sejarah Komputer</h2><p><strong>Generasi Pertama (1940-1950):</strong> Tabung vakum, ENIAC.</p><p><strong>Generasi Kedua (1950-1960):</strong> Transistor.</p><p><strong>Generasi Ketiga (1960-1970):</strong> IC (Integrated Circuit).</p><p><strong>Generasi Keempat (1970-1980):</strong> Mikroprosesor.</p><p><strong>Generasi Kelima (1980-sekarang):</strong> AI dan komputasi modern.</p>'},
    {id:3, title:'Jaringan Komputer Dasar', cat:'informatika', icon:'🌐', desc:'Pengenalan jaringan LAN, WAN, dan internet.',
     content:'<h2>🌐 Jaringan Komputer Dasar</h2><p><strong>LAN (Local Area Network):</strong> Jaringan dalam area kecil.</p><p><strong>WAN (Wide Area Network):</strong> Jaringan luas antar kota/negara.</p><p><strong>Internet:</strong> Kumpulan jaringan global.</p><p><strong>Protokol:</strong> TCP/IP, HTTP, FTP.</p><p><strong>Perangkat:</strong> Router, Switch, Access Point.</p>'},
    
    // TOOLS
    {id:4, title:'Tools Developer Wajib', cat:'tools', icon:'🛠️', desc:'Daftar tools yang harus dikuasai developer.',
     content:'<h2>🛠️ Tools Developer Wajib</h2><p><strong>VS Code:</strong> Editor kode terbaik.</p><p><strong>Git & GitHub:</strong> Version control.</p><p><strong>Terminal/CMD:</strong> Command line interface.</p><p><strong>Postman:</strong> Testing API.</p><p><strong>Figma:</strong> Desain UI/UX.</p><p><strong>Docker:</strong> Containerisasi aplikasi.</p>'},
    {id:5, title:'Tools Ethical Hacking', cat:'tools', icon:'🔐', desc:'Tools untuk belajar keamanan siber secara legal.',
     content:'<h2>🔐 Tools Ethical Hacking</h2><p><strong>Kali Linux:</strong> OS untuk security testing.</p><p><strong>Nmap:</strong> Network scanning.</p><p><strong>Wireshark:</strong> Packet analysis.</p><p><strong>Metasploit:</strong> Framework exploit.</p><p><strong>Burp Suite:</strong> Web security testing.</p><p><em>⚠️ Gunakan hanya untuk pembelajaran!</em></p>'},
    
    // VIRUS (EDUKASI)
    {id:6, title:'Apa itu Virus?', cat:'virus', icon:'☣️', desc:'Pengertian virus komputer dan jenis-jenisnya.',
     content:'<h2>☣️ Apa itu Virus Komputer?</h2><p>Virus adalah program jahat yang dapat menggandakan diri dan menyebar ke sistem lain.</p><p><strong>Jenis:</strong></p><ul style="color:rgba(255,255,255,.7);padding-left:20px;margin:10px 0"><li>Worm</li><li>Trojan</li><li>Ransomware</li><li>Spyware</li><li>Rootkit</li></ul><p><em>⚠️ Edukasi ini untuk PEMBELAJARAN, bukan untuk digunakan!</em></p>'},
    {id:7, title:'Cara Melindungi dari Virus', cat:'virus', icon:'🛡️', desc:'Tips melindungi perangkat dari serangan virus.',
     content:'<h2>🛡️ Cara Melindungi dari Virus</h2><p><strong>1. Gunakan Antivirus:</strong> Install dan update antivirus.</p><p><strong>2. Jangan Klik Link Sembarangan:</strong> Phishing dan malware.</p><p><strong>3. Update Sistem:</strong> Patch keamanan terbaru.</p><p><strong>4. Backup Data:</strong> Cadangkan file penting.</p><p><strong>5. Gunakan Password Kuat:</strong> Kombinasi huruf, angka, simbol.</p>'},
    
    // CODING
    {id:8, title:'Dasar HTML & CSS', cat:'coding', icon:'🌐', desc:'Belajar membuat website dengan HTML dan CSS.',
     content:'<h2>🌐 Dasar HTML & CSS</h2><p><strong>HTML:</strong> Kerangka website.</p><pre>&lt;!DOCTYPE html&gt;&lt;html&gt;&lt;head&gt;&lt;title&gt;Hello&lt;/title&gt;&lt;/head&gt;&lt;body&gt;&lt;h1&gt;Hello World!&lt;/h1&gt;&lt;/body&gt;&lt;/html&gt;</pre><p><strong>CSS:</strong> Styling website.</p><pre>body { background: #0a0e17; color: #fff; } h1 { color: #00d4ff; }</pre>'},
    {id:9, title:'Dasar JavaScript', cat:'coding', icon:'📜', desc:'Belajar JavaScript untuk interaktivitas website.',
     content:'<h2>📜 Dasar JavaScript</h2><p>JavaScript membuat website interaktif.</p><pre>// Variabel dan Fungsi\nlet nama = "Edward";\nfunction sapa() {\n  alert("Halo " + nama);\n}\nsapa();</pre><p><strong>Event:</strong> onClick, onKeyUp, onMouseOver.</p>'},
    {id:10, title:'Python untuk Pemula', cat:'coding', icon:'🐍', desc:'Belajar Python dengan mudah.',
     content:'<h2>🐍 Python untuk Pemula</h2><pre># Hello World\nprint("Hello World!")\n\n# Variabel\nnama = "Edward"\numur = 20\n\n# Fungsi\ndef sapa():\n    print("Halo " + nama)\n\nsapa()</pre><p>Python mudah dipelajari dan serbaguna!</p>'},
    
    // APK BUILDER
    {id:11, title:'Cara Buat APK dari Website', cat:'apk', icon:'📱', desc:'Ubah website jadi APK Android dengan mudah.',
     content:'<h2>📱 Cara Buat APK dari Website</h2><p><strong>1. PWA2APK (Termux):</strong></p><pre>pkg update && pkg upgrade\npkg install nodejs -y\nnpm install -g pwa2apk\npwa2apk https://namasite.vercel.app</pre><p><strong>2. Website2APK (Online):</strong></p><p>Kunjungi <strong>website2apk.com</strong>, masukkan URL, build APK.</p><p><strong>3. HBuilder (PC):</strong></p><p>Buat project HTML5 App, build Android APK.</p>'},
    {id:12, title:'Cara Buat APK dengan Termux', cat:'apk', icon:'📱', desc:'Bikin APK langsung dari HP pake Termux.',
     content:'<h2>📱 Buat APK dengan Termux</h2><pre># Install Android SDK\npkg install openjdk-17 gradle android-sdk -y\n\n# Clone Capacitor\ngit clone https://github.com/ionic-team/capacitor\ncd capacitor\nnpm install\nnpx cap init EDWARD com.edward.app\nnpx cap add android\nnpx cap copy\nnpx cap sync\nnpx cap open android</pre><p>Hasil APK di folder <strong>android/app/build/outputs/apk/</strong></p>'},
    {id:13, title:'Cara Buat APK Online', cat:'apk', icon:'📱', desc:'Bikin APK tanpa install aplikasi.',
     content:'<h2>📱 Buat APK Online</h2><p><strong>1. website2apk.com</strong></p><p>Masukkan URL website → Build APK → Download.</p><p><strong>2. appmaker.xyz</strong></p><p>Bisa custom icon dan splash screen.</p><p><strong>3. appsgeyser.com</strong></p><p>Cocok untuk pemula.</p><p><em>⚠️ Hasil APK bisa langsung diinstall di HP Android.</em></p>'}
];

// ============================================
// RENDER
// ============================================
let currentFilter = 'all';

function render(filter) {
    const grid = document.getElementById('grid');
    const items = filter === 'all' ? DATA : DATA.filter(d => d.cat === filter);
    if (items.length === 0) {
        grid.innerHTML = '<div class="loading" style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,.3)">😞 Tidak ada materi</div>';
        return;
    }
    grid.innerHTML = items.map(d => `
        <div class="card" onclick="openModal(${d.id})">
            <div class="icon">${d.icon}</div>
            <h3>${d.title}</h3>
            <p>${d.desc}</p>
            <span class="tag ${d.cat}">${d.cat}</span>
        </div>
    `).join('');
}

function filterCat(cat) {
    currentFilter = cat;
    document.querySelectorAll('#cat button').forEach(b => b.classList.remove('active'));
    document.querySelector(`#cat button[onclick="filterCat('${cat}')"]`).classList.add('active');
    render(cat);
}

function search() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    if (!q) return render(currentFilter);
    const items = DATA.filter(d => d.title.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q) || d.cat.includes(q));
    const grid = document.getElementById('grid');
    if (items.length === 0) {
        grid.innerHTML = '<div class="loading" style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,.3)">😞 Tidak ada hasil</div>';
        return;
    }
    grid.innerHTML = items.map(d => `
        <div class="card" onclick="openModal(${d.id})">
            <div class="icon">${d.icon}</div>
            <h3>${d.title}</h3>
            <p>${d.desc}</p>
            <span class="tag ${d.cat}">${d.cat}</span>
        </div>
    `).join('');
}

// ============================================
// MODAL
// ============================================
function openModal(id) {
    const data = DATA.find(d => d.id === id);
    if (!data) return;
    document.getElementById('modalTitle').textContent = data.icon + ' ' + data.title;
    document.getElementById('modalContent').innerHTML = data.content + `<button class="btn" onclick="closeModal()">Tutup</button>`;
    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = 'auto';
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});

// ============================================
// START
// ============================================
render('all');
</script>
</body>
</html>
