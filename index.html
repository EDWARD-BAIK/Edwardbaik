<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDWARD CINEMA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:Arial,sans-serif;padding:15px}
.header{text-align:center;padding:20px;border-bottom:1px solid #222;margin-bottom:30px}
.header h1{color:#00ff88;font-size:32px}
.header p{color:#666;font-size:13px;margin-top:5px}
.search{display:flex;gap:10px;max-width:600px;margin:0 auto 30px}
.search input{flex:1;padding:12px 18px;border-radius:30px;border:1px solid #333;background:#111;color:#fff;font-size:14px;outline:none}
.search input:focus{border-color:#00ff88}
.search button{padding:12px 25px;border-radius:30px;border:none;background:#00ff88;color:#000;font-weight:bold;cursor:pointer}
.search .reset{background:#333;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:15px;max-width:1200px;margin:0 auto}
.card{background:#141414;border-radius:12px;overflow:hidden;cursor:pointer;transition:.3s}
.card:hover{transform:scale(1.03);border:1px solid #00ff88}
.card img{width:100%;height:240px;object-fit:cover}
.card .info{padding:12px}
.card .info h3{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .info .meta{font-size:12px;color:#666;display:flex;gap:10px;margin-top:5px}
.pagination{text-align:center;padding:30px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.pagination button{padding:8px 16px;border-radius:20px;border:1px solid #333;background:transparent;color:#fff;cursor:pointer}
.pagination button.active{background:#00ff88;color:#000;border-color:#00ff88}
.pagination button:disabled{opacity:.3;cursor:not-allowed}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:999;padding:20px}
.modal.show{display:flex;flex-direction:column;align-items:center;justify-content:center}
.modal .top{position:absolute;top:0;left:0;right:0;padding:15px 20px;display:flex;justify-content:space-between;background:#0a0a0a;border-bottom:1px solid #222}
.modal .top h2{color:#00ff88;font-size:16px}
.modal .top button{background:transparent;border:none;color:#fff;font-size:24px;cursor:pointer}
.modal .content{max-width:900px;width:100%;background:#111;border-radius:16px;padding:20px}
.modal .content iframe{width:100%;height:500px;border:none;border-radius:10px}
.modal .content h3{font-size:22px;margin-top:15px}
.modal .content .info{color:#666;font-size:14px;margin:5px 0}
.modal .content .desc{color:#888;font-style:italic;font-size:14px;margin:10px 0}
.modal .content .sources{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.modal .content .sources button{padding:6px 14px;border-radius:20px;border:1px solid #333;background:transparent;color:#fff;cursor:pointer;font-size:12px}
.modal .content .sources button.active{background:#00ff88;color:#000;border-color:#00ff88}
.modal .content .close-btn{padding:10px 30px;border-radius:30px;border:1px solid #333;background:transparent;color:#fff;cursor:pointer;margin-top:10px}
.footer{text-align:center;padding:30px 0 10px;color:#333;font-size:12px}
.loading{text-align:center;padding:50px;color:#666}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}.card img{height:180px}.modal .content iframe{height:250px}}
</style>
</head>

</div>

<input type="text" id="searchInput" placeholder="Cari film atau anime..." onkeyup="if(event.key==='Enter')searchMovies()">

</div>

<div class="grid" id="movieGrid"><div class="loading">Loading 1000 film...</div></div>
<div class="pagination" id="pagination"></div>
<div class="footer">EDWARD CINEMA © 2026</div>

<div class="modal" id="modal">
<div class="top"><h2 id="modalTitle">EDWARD CINEMA</h2><button onclick="closeModal()">✕</button></div>
<div class="content" id="modalContent"></div>
</div>

{id:9,title:"Princess Mononoke",year:1997,genre:"Anime",rating:"8.9",image:"https://image.tmdb.org/t/p/w200/9fL5tXgQzY6h5QkXgY5fL5tXgQz.jpg",embed:"https://vidsrc.me/embed/movie/128",desc:"Klasik Ghibli"},

{id:25,title:"Sewu Dino",year:2023,genre:"Horror",rating:"7.5",image:"https://image.tmdb.org/t/p/w200/8yW1Z5fL4tXgQzY6h5QkXgY5fL4tXgQz.jpg",embed:"https://vidsrc.me/embed/movie/823421",desc:"Horor Indonesia"},
{id:26,title:"Pengabdi Setan 2",year:2022,genre:"Horror",rating:"8.0",image:"https://image.tmdb.org/t/p/w200/8yW1Z5fL4tXgQzY6h5QkXgY5fL4tXgQz.jpg",embed:"https://vidsrc.me/embed/movie/823421",desc:"Horor Indonesia"},
{id:27,title:"The Raid 2",year:2014,genre:"Action",rating:"8.9",image:"https://image.tmdb.org/t/p/w200/8yW1Z5fL4tXgQzY6h5QkXgY5fL4tXgQz.jpg",embed:"https://vidsrc.me/embed/movie/823421",desc:"Aksi brutal"},
{id:28,title:"Imperfect",year:2019,genre:"Comedy",rating:"7.8",image:"https://image.tmdb.org/t/p/w200/8yW1Z5fL4tXgQzY6h5QkXgY5fL4tXgQz.jpg",embed:"https://vidsrc.me/embed/movie/823421",desc:"Komedi Indonesia"}
];

// ========== GENERATE 1000 FILM ==========
function generateMovies(){
    var all = [];
    for(var i=0;i<40;i++){
        MOVIE_DB.forEach(function(m){
            var nm = JSON.parse(JSON.stringify(m));
            nm.id = all.length + 1;
            if(i>0){
                nm.title = m.title + ' ' + (i+1);
                nm.year = m.year + (i%5);
                nm.rating = (parseFloat(m.rating) + (i%3)*0.1).toFixed(1);
                if(parseFloat(nm.rating)>9.5) nm.rating = '9.5';
            }
            all.push(nm);
        });
    }
    return all.slice(0,1000);
}

// ========== VARIABLES ==========
var allMovies = generateMovies();
var filteredMovies = allMovies.slice();
var currentPage = 1;
var perPage = 15;

// ========== RENDER ==========
function renderMovies(movies, page){
    var grid = document.getElementById('movieGrid');
    var pag = document.getElementById('pagination');
    
    if(!movies || movies.length===0){
        grid.innerHTML = '<div class="loading">Tidak ada film ditemukan</div>';
        pag.innerHTML = '';
        return;
    }
    
    var totalPages = Math.ceil(movies.length/perPage);
    var start = (page-1)*perPage;
    var end = start+perPage;
    var pageMovies = movies.slice(start,end);
    
    grid.innerHTML = pageMovies.map(function(m){
        return '<div class="card" onclick="openMovie('+m.id+')">'+
            '<img src="'+m.image+'" onerror="this.src=\'https://via.placeholder.com/170x240/222/666?text='+m.title.substring(0,10)+'\'">'+
            '<div class="info">'+
                '<h3>'+m.title+'</h3>'+
                '<div class="meta"><span>'+m.year+'</span><span>⭐'+m.rating+'</span><span>'+m.genre+'</span></div>'+
            '</div>'+
        '</div>';
    }).join('');
    
    var html = '';
    if(totalPages>1){
        html += '<button onclick="changePage('+(page-1)+')" '+(page<=1?'disabled':'')+'>Prev</button>';
        for(var i=1;i<=totalPages;i++){
            if(i<3 || i>totalPages-2 || (i>=page-2 && i<=page+2)){
                html += '<button onclick="changePage('+i+')" class="'+(i===page?'active':'')+'">'+i+'</button>';
            } else if(i===3 || i===totalPages-2){
                html += '<span>...</span>';
            }
        }
        html += '<button onclick="changePage('+(page+1)+')" '+(page>=totalPages?'disabled':'')+'>Next</button>';
    }
    pag.innerHTML = html;
}

function changePage(p){
    var tp = Math.ceil(filteredMovies.length/perPage);
    if(p<1 || p>tp) return;
    currentPage = p;
    renderMovies(filteredMovies, p);
    window.scrollTo({top:0,behavior:'smooth'});
}

function searchMovies(){
    var q = document.getElementById('searchInput').value.trim().toLowerCase();
    if(q){
        filteredMovies = allMovies.filter(function(m){
            return m.title.toLowerCase().includes(q) || m.genre.toLowerCase().includes(q);
        });
    } else {
        filteredMovies = allMovies.slice();
    }
    currentPage = 1;
    renderMovies(filteredMovies, 1);
}

function resetSearch(){
    document.getElementById('searchInput').value = '';
    filteredMovies = allMovies.slice();
    currentPage = 1;
    renderMovies(filteredMovies, 1);
}

// ========== OPEN MOVIE ==========
function openMovie(id){
    var m = allMovies.find(function(x){return x.id===id;});
    if(!m) return;
    
    var sources = [
        m.embed,
        'https://www.2embed.cc/embed/'+m.id,
        'https://embed.su/embed/movie/'+m.id
    ];
    
    document.getElementById('modalTitle').textContent = m.title;
    document.getElementById('modalContent').innerHTML = 
        '<div class="sources">'+
            '<button class="active" onclick="switchSource(0)">Source 1</button>'+
            '<button onclick="switchSource(1)">Source 2</button>'+
            '<button onclick="switchSource(2)">Source 3</button>'+
        '</div>'+
        '<iframe id="playerFrame" src="'+sources[0]+'" allowfullscreen></iframe>'+
        '<h3>'+m.title+'</h3>'+
        '<div class="info">'+m.year+' ⭐'+m.rating+' '+m.genre+'</div>'+
        '<div class="desc">'+m.desc+'</div>'+
        '<button class="close-btn" onclick="closeModal()">Tutup</button>';
    
    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
    window._sources = sources;
}

function switchSource(index){
    var src = window._sources;
    if(!src || index>=src.length) return;
    document.getElementById('playerFrame').src = src[index];
    var btns = document.querySelectorAll('.modal .sources button');
    btns.forEach(function(b,i){
        b.className = i===index ? 'active' : '';
    });
}

function closeModal(){
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = 'auto';
}

document.addEventListener('keydown', function(e){
    if(e.key==='Escape') closeModal();
});

renderMovies(filteredMovies, 1);
</script>
</body>
</html>
