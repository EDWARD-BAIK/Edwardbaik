<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - Nonton Ilegal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e17;color:#fff;font-family:'Segoe UI',sans-serif;padding:15px}
:root{--p:#ff2d55;--s:#00d4ff}
.header{text-align:center;padding:20px 0 10px;border-bottom:2px solid var(--p)}
.header h1{font-size:28px;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{font-size:11px;color:rgba(255,255,255,.4)}
.search-wrap{display:flex;gap:10px;margin:15px 0;background:#141b2b;border-radius:30px;padding:5px}
.search-wrap input{flex:1;background:0;border:0;padding:14px 18px;color:#fff;font-size:14px;outline:0}
.search-wrap input::placeholder{color:rgba(255,255,255,.3)}
.search-wrap button{background:var(--p);border:0;border-radius:30px;padding:12px 25px;color:#fff;font-weight:700;cursor:pointer}
.cat-scroll{display:flex;gap:12px;overflow-x:auto;padding:12px 0;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-scroll button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:30px;padding:8px 20px;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap}
.cat-scroll button.active{background:var(--p);border-color:var(--p);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:15px;margin-top:15px}
.card{background:#141b2b;border-radius:16px;overflow:hidden;cursor:pointer;border:1px solid transparent}
.card:hover{transform:translateY(-5px);border-color:var(--p)}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover}
.card .info{padding:12px}
.card .info h4{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .info p{font-size:10px;color:rgba(255,255,255,.5)}
.player-wrap{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.98);z-index:99999;flex-direction:column;align-items:center;justify-content:center;padding:15px}
.player-wrap .top{position:absolute;top:0;width:100%;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.7);border-bottom:2px solid var(--p)}
.player-wrap .top .t{font-weight:700;font-size:16px}
.player-wrap .top .actions{display:flex;gap:10px;align-items:center}
.player-wrap .top .actions button{background:var(--p);border:0;color:#fff;padding:8px 16px;border-radius:30px;cursor:pointer;font-weight:700;font-size:12px}
.player-wrap .top .close{background:var(--p);border:0;color:#fff;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer}
.player-wrap iframe{width:100%;max-width:1100px;height:75vh;border-radius:16px;border:2px solid var(--p);background:#000}
.player-wrap .servers{position:absolute;bottom:30px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;background:rgba(0,0,0,.6);padding:12px 20px;border-radius:50px}
.player-wrap .servers button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:30px;padding:8px 18px;color:#fff;cursor:pointer;font-size:11px}
.player-wrap .servers button.active{background:var(--p);border-color:var(--p)}
.loading{text-align:center;padding:40px;color:rgba(255,255,255,.3)}
.footer{text-align:center;padding:30px 0 10px;border-top:1px solid rgba(255,255,255,.05);margin-top:20px}
.footer p{font-size:11px;color:rgba(255,255,255,.2)}
.footer span{color:var(--p)}
</style>
</head>
<body>

<div class="header">
<h1>🎬 EDWARD</h1>
<p>Nonton Anime, Movie, Donghua & Drama Ilegal • 250+ Judul</p>
</div>

<div class="search-wrap">
<input id="search" placeholder="Cari judul..." onkeyup="if(event.key==='Enter') search()">
<button onclick="search()">🔍 Cari</button>
</div>

<div class="cat-scroll" id="cat">
<button class="active" onclick="setCat('all')">🔥 Semua</button>
<button onclick="setCat('anime')">🎌 Anime</button>
<button onclick="setCat('donghua')">🐉 Donghua</button>
<button onclick="setCat('movie')">🎬 Movie</button>
<button onclick="setCat('kdrama')">🇰🇷 K-Drama</button>
<button onclick="setCat('classic')">📼 Classic</button>
</div>

<div id="grid" class="grid"><div class="loading">⏳ Loading...</div></div>

<div class="footer"><p>© 2026 <span>EDWARD</span> • 100% Ilegal</p></div>

<div class="player-wrap" id="player">
<div class="top">
<span class="t" id="ptitle">🎬 Now Playing</span>
<div class="actions">
<button onclick="refreshPlayer()">🔄 Refresh</button>
<button class="close" onclick="closePlayer()">✕</button>
</div>
</div>
<iframe id="iframe" src="" allowfullscreen></iframe>
<div class="servers" id="sv">
<button class="active" onclick="switchSvr(0)">Server 1</button>
<button onclick="switchSvr(1)">Server 2</button>
<button onclick="switchSvr(2)">Server 3</button>
<button onclick="switchSvr(3)">Server 4</button>
<button onclick="switchSvr(4)">Server 5</button>
</div>
</div>

<script>
// ===== DATABASE =====

{title:'My Name',id:'tt15553894',type:'K-Drama',img:'https://m.media-amazon.com/images/M/MV5BYzA0NzA3NDUtZTE4Ny00MmE4LWE4NTAtNzA3ZDM5OTI1MWM2XkEyXkFqcGdeQXVyMTUzMTg2ODkz._V1_.jpg'},
{title:'The Godfather',id:'tt0068646',type:'Classic',img:'https://m.media-amazon.com/images/M/MV5BM2MyNjYxNmUtYTVlMC00MmU3LTg5NmUtMTk4OTg0YzA1MGIxXkEyXkFqcGdeQXVyNzkwMjQ5NzM@._V1_.jpg'},
{title:'Shawshank Redemption',id:'tt0111161',type:'Classic',img:'https://m.media-amazon.com/images/M/MV5BNDE3ODcxYzMtY2YzZC00NzA3LWFmYmEtY2QwYmU2ZGFiMGI1XkEyXkFqcGdeQXVyNjAwNDUxODI@._V1_.jpg'},
{title:'The Dark Knight',id:'tt0468569',type:'Classic',img:'https://m.media-amazon.com/images/M/MV5BMTMxNTMwODM0NF5BMl5BanBnXkFtZTcwODAyMTk2Mw@@._V1_.jpg'}
];

// ===== PLAYER SERVERS (5 LAPIS) =====
const SVR = [
    id => `https://multiembed.mov/?video_id=${id}&tmdb=1`,
    id => `https://vidsrc.me/embed/${id}`,
    id => `https://www.2embed.cc/embed/${id}`,
    id => `https://vidsrc.to/embed/movie/${id}`,
    id => `https://embed.su/embed/${id}`
];

let curSvr = 0, curId = '', curCat = 'all', retryCount = 0;

function getUrl(id){ return SVR[curSvr](id) }

function switchSvr(i){
    curSvr = i;
    document.querySelectorAll('#sv button').forEach((b,j) => b.classList.toggle('active', j === i));
    if(curId) {
        document.getElementById('iframe').src = getUrl(curId);
        retryCount = 0;
    }
}

function refreshPlayer(){
    if(curId) {
        document.getElementById('iframe').src = getUrl(curId);
        retryCount = 0;
    }
}

function setCat(c){
    curCat = c;
    document.querySelectorAll('#cat button').forEach(b => b.classList.remove('active'));
    document.querySelector(`#cat button[onclick="setCat('${c}')"]`).classList.add('active');
    document.getElementById('search').value = '';
    render();
}

function search(){
    const q = document.getElementById('search').value.trim().toLowerCase();
    if(!q) return render();
    const f = DB.filter(i => i.title.toLowerCase().includes(q) || i.type.toLowerCase().includes(q));
    renderResults(f.length ? f : [{title:'Tidak ditemukan', id:null, type:'Error', img:''}]);
}

function render(){
    let f = DB;
    if(curCat !== 'all') {
        f = DB.filter(i => 
            i.type.toLowerCase() === curCat.toLowerCase() ||
            (curCat === 'kdrama' && i.type === 'K-Drama') ||
            (curCat === 'classic' && i.type === 'Classic') ||
            (curCat === 'donghua' && i.type === 'Donghua')
        );
    }
    renderResults(f);
}

function renderResults(items){
    const g = document.getElementById('grid');
    if(!items || !items.length || (items.length === 1 && items[0].title === 'Tidak ditemukan')) {
        g.innerHTML = '<div class="loading">😞 Tidak ada hasil</div>';
        return;
    }
    g.innerHTML = items.map(i => `
        <div class="card" onclick="${i.id ? `play('${i.id}','${i.title.replace(/'/g, "\\'")}')` : ''}">
            <img src="${i.img || 'https://via.placeholder.com/200x300/1a2335/fff?text=No+Image'}" 
                 onerror="this.src='https://via.placeholder.com/200x300/1a2335/fff?text=Error'">
            <div class="info">
                <h4>${i.title}</h4>
                <p>${i.type}</p>
            </div>
        </div>
    `).join('');
}

function play(id, title){
    curId = id;
    retryCount = 0;
    document.getElementById('ptitle').textContent = '🎬 ' + title;
    document.getElementById('iframe').src = getUrl(id);
    document.getElementById('player').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    
    // Auto-retry if error
    setTimeout(() => {
        const iframe = document.getElementById('iframe');
        // Check if video loaded (can't directly detect, but we can retry if user clicks)
    }, 3000);
}

function closePlayer(){
    document.getElementById('player').style.display = 'none';
    document.getElementById('iframe').src = '';
    curId = '';
    document.body.style.overflow = 'auto';
}

// ===== INIT =====
window.onload = () => {
    render();
    document.querySelector('#cat button:first-child')?.classList.add('active');
};

document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closePlayer();
});
</script>
</body>
</html>
