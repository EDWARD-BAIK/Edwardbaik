<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - ESP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;padding:10px;min-height:100vh}
::selection{background:#ff2d55;color:#fff}
.header{text-align:center;padding:10px 0 5px;border-bottom:2px solid #00ff41;margin-bottom:10px}
.header h1{font-size:24px;color:#00ff41;text-shadow:0 0 20px rgba(0,255,65,.3);letter-spacing:2px}
.header h1 span{color:#ff2d55}
.header p{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stats div{background:#141b2b;border:1px solid rgba(0,255,65,.2);border-radius:8px;padding:6px;text-align:center}
.stats div span{display:block;font-size:20px;font-weight:700;color:#00ff41}
.stats div small{font-size:9px;color:rgba(255,255,255,.4)}
.camera-wrap{position:relative;width:100%;max-width:800px;margin:0 auto;border-radius:12px;overflow:hidden;border:2px solid #00ff41;background:#000}
.camera-wrap video{width:100%;display:block}
.camera-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.controls{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.controls button{background:rgba(0,255,65,.1);border:1px solid #00ff41;border-radius:30px;padding:8px 20px;color:#00ff41;font-weight:600;cursor:pointer;font-size:11px;font-family:'Courier New',monospace}
.controls button:active{transform:scale(.95)}
.controls button.active{background:#00ff41;color:#000}
.controls button.full{background:rgba(255,215,0,.1);border-color:#ffd700;color:#ffd700}
.footer{text-align:center;padding:10px 0 5px;border-top:1px solid rgba(255,255,255,.05);margin-top:10px}
.footer p{font-size:8px;color:rgba(255,255,255,.2)}
.footer span{color:#00ff41}
</style>
</head>
<body>

<div class="header">
<h1>👁️ ED<span>WARD</span> <span style="color:#00ff41;font-size:12px;">· ESP</span></h1>
<p>Edward-esp2026 · Real Face Detection</p>
</div>

<div class="stats">
<div><small>FACE</small><span id="objCount">0</span></div>
<div><small>FPS</small><span id="fpsCount">0</span></div>
<div><small>STATUS</small><span id="statusText" style="font-size:14px;">●</span></div>
</div>

<div class="camera-wrap" id="cameraWrap">
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
</div>

<div class="controls">
<button id="btnStart" class="active" onclick="startCamera()">📷 Start</button>
<button id="btnStop" onclick="stopCamera()">⏹ Stop</button>
<button class="full" onclick="toggleFullscreen()">⛶ Full</button>
</div>

<div class="footer"><p>© 2026 <span>EDWARD</span> · Edward-esp2026 · <span id="modelStatus">Loading MediaPipe...</span></p></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>

<script>
// ============================================
// REAL FACE DETECTION - MEDIAPIPE
// ============================================
let camera = null;
let running = false;
let animationId = null;
let frameCount = 0;
let lastFpsTime = Date.now();
let fps = 0;
let faceDetector = null;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const objCount = document.getElementById('objCount');
const fpsCount = document.getElementById('fpsCount');
const statusText = document.getElementById('statusText');
const modelStatus = document.getElementById('modelStatus');
const cameraWrap = document.getElementById('cameraWrap');

// ============================================
// FULLSCREEN
// ============================================
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        cameraWrap.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
}

// ============================================
// FACE DETECTION CALLBACK
// ============================================
function onResults(results) {
    if (!running) return;

    frameCount++;
    const now = Date.now();
    if (now - lastFpsTime > 1000) {
        fps = frameCount;
        frameCount = 0;
        lastFpsTime = now;
        fpsCount.textContent = fps;
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Gambar video mirror
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
    ctx.restore();

    const faces = results.detections || [];
    objCount.textContent = faces.length;

    if (faces.length === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.font = '13px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('Arahkan ke wajah', canvas.width/2, canvas.height/2);
        return;
    }

    const colors = ['#ff2d55','#00d4ff','#ffd700','#00ff41','#ff6b35','#7b2ffc'];

    faces.forEach((face, idx) => {
        const bbox = face.boundingBox;
        if (!bbox) return;
        
        const x = bbox.originX || 0;
        const y = bbox.originY || 0;
        const w = bbox.width || 0;
        const h = bbox.height || 0;
        const color = colors[idx % colors.length];

        // Tali/garis ESP
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.2;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 8]);
        
        ctx.beginPath();
        ctx.moveTo(x + w/2, y);
        ctx.lineTo(x + w/2, 0);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(x + w/2, y + h);
        ctx.lineTo(x + w/2, canvas.height);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(x, y + h/2);
        ctx.lineTo(0, y + h/2);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(x + w, y + h/2);
        ctx.lineTo(canvas.width, y + h/2);
        ctx.stroke();
        
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;

        // Bounding Box
        ctx.shadowColor = color;
        ctx.shadowBlur = 25;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.strokeRect(x, y, w, h);
        ctx.shadowBlur = 0;

        // Center cross
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.5;
        ctx.lineWidth = 1;
        const cx = x + w/2;
        const cy = y + h/2;
        const size = 10;
        ctx.beginPath();
        ctx.moveTo(cx - size, cy);
        ctx.lineTo(cx + size, cy);
        ctx.moveTo(cx, cy - size);
        ctx.lineTo(cx, cy + size);
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Jarak (estimasi berdasarkan ukuran)
        const dist = Math.round(50 - (w * h) / 2500);
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.6;
        ctx.font = '10px Courier New';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillText(Math.max(2, dist) + 'm', x + w - 6, y + 6);
        ctx.globalAlpha = 1;

        // Label
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.4;
        ctx.font = '9px Courier New';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillText('#' + (idx + 1), x + 6, y + h + 16);
        ctx.globalAlpha = 1;
    });
}

// ============================================
// START CAMERA
// ============================================
async function startCamera() {
    try {
        if (camera) {
            camera.stop();
            camera = null;
        }

        faceDetector = new FaceDetection({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`;
            }
        });

        faceDetector.setOptions({
            model: 'short',
            minDetectionConfidence: 0.5,
        });

        faceDetector.onResults(onResults);

        const videoElement = document.getElementById('video');
        
        camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceDetector.send({image: videoElement});
            },
            width: 640,
            height: 480
        });

        await camera.start();
        
        canvas.width = 640;
        canvas.height = 480;
        
        statusText.textContent = '●';
        statusText.style.color = '#00ff41';
        modelStatus.textContent = '✅ Face Detection Active';
        running = true;
        
        document.getElementById('btnStart').classList.remove('active');
        
    } catch(e) {
        alert('Error: ' + e.message);
        statusText.textContent = '✕';
        statusText.style.color = '#ff2d55';
        modelStatus.textContent = '❌ ' + e.message;
    }
}

function stopCamera() {
    running = false;
    if (camera) {
        camera.stop();
        camera = null;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    objCount.textContent = '0';
    statusText.textContent = '⬤';
    statusText.style.color = '#ff4444';
    document.getElementById('btnStart').classList.add('active');
}

// ============================================
// INIT
// ============================================
setTimeout(() => {
    startCamera();
}, 1000);
</script>
</body>
</html>
