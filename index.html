<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#e0e0e0;font-family:'Inter','Segoe UI',sans-serif;padding:20px;min-height:100vh;line-height:1.6}
::selection{background:#ff2d55;color:#fff}

.header{max-width:900px;margin:0 auto 30px;padding-bottom:20px;border-bottom:2px solid rgba(0,212,255,.1)}
.header h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#00d4ff,#ff2d55);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.header .sub{font-size:13px;color:rgba(255,255,255,.3);margin-top:2px}

.grid{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.card{background:#141b2b;border-radius:16px;padding:24px;border:1px solid rgba(255,255,255,.05);transition:.3s;cursor:pointer}
.card:hover{transform:translateY(-3px);border-color:#00d4ff;box-shadow:0 10px 30px rgba(0,212,255,.05)}
.card .meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:rgba(255,255,255,.3);margin-bottom:6px}
.card .meta .tag{background:rgba(0,212,255,.1);color:#00d4ff;padding:2px 10px;border-radius:20px}
.card .meta .time{color:rgba(255,255,255,.2)}
.card h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3}
.card h2:hover{color:#00d4ff}
.card p{font-size:14px;color:rgba(255,255,255,.5);line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card .btn-read{display:inline-block;margin-top:14px;color:#00d4ff;font-weight:600;font-size:13px;border-bottom:1px solid transparent;transition:.2s}
.card .btn-read:hover{border-bottom-color:#00d4ff}

.loading{text-align:center;padding:40px;color:rgba(255,255,255,.3)}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal .top{position:absolute;top:0;left:0;right:0;padding:15px 25px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.9);border-bottom:2px solid #00d4ff}
.modal .top .t{font-size:17px;font-weight:700;color:#00d4ff;max-width:70%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal .top .close{background:#ff2d55;border:0;border-radius:50%;width:40px;height:40px;color:#fff;font-size:20px;cursor:pointer}
.modal .content{max-width:750px;width:100%;max-height:80vh;overflow-y:auto;background:#141b2b;border-radius:16px;padding:35px;border:1px solid rgba(0,212,255,.2)}
.modal .content h2{color:#00d4ff;font-size:26px;margin-bottom:12px;line-height:1.3}
.modal .content .meta{font-size:12px;color:rgba(255,255,255,.3);margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid rgba(255,255,255,.05)}
.modal .content .meta .tag{color:#00d4ff}
.modal .content p{color:rgba(255,255,255,.85);line-height:1.9;margin-bottom:16px;font-size:16px}
.modal .content h3{color:#00d4ff;margin:20px 0 10px;font-size:18px}
.modal .content ul{color:rgba(255,255,255,.8);padding-left:25px;margin:12px 0}
.modal .content ul li{margin-bottom:8px}
.modal .content .btn{display:inline-block;background:#00d4ff;color:#000;padding:10px 28px;border-radius:30px;font-weight:700;margin-top:15px;border:0;cursor:pointer}
.modal .content pre{background:#0a0e17;padding:18px;border-radius:10px;overflow-x:auto;font-size:13px;color:#00ff88;border:1px solid rgba(0,255,136,.1);margin:15px 0;white-space:pre-wrap}
.modal .content .highlight{color:#ffd700;font-weight:600}
.modal .content blockquote{border-left:3px solid #00d4ff;padding-left:16px;margin:15px 0;color:rgba(255,255,255,.6)}
.modal .content img{max-width:100%;border-radius:10px;margin:15px 0}

.footer{max-width:900px;margin:30px auto 0;padding-top:15px;border-top:1px solid rgba(255,255,255,.05);text-align:center;font-size:11px;color:rgba(255,255,255,.2)}
.footer span{color:#00d4ff}

@media(max-width:600px){
  body{padding:12px}
  .header h1{font-size:22px}
  .card{padding:16px}
  .card h2{font-size:17px}
  .modal .content{padding:20px}
  .modal .content h2{font-size:20px}
}
</style>
</head>
<body>

<div class="header">
<h1>⚡ EDWARD</h1>
<div class="sub">Technical deep dives • Powered by API</div>
</div>

<div id="grid" class="grid"><div class="loading">⏳ Memuat artikel...</div></div>

<div class="footer"><p>© 2026 <span>EDWARD</span> • API Powered</p></div>

<div class="modal" id="modal">
<div class="top">
<span class="t" id="modalTitle">📄 Artikel</span>
<button class="close" onclick="closeModal()">✕</button>
</div>
<div class="content" id="modalContent"></div>
</div>

<script>
// ============================================
// API DEV.TO (ARTIKEL FULL)
// ============================================
const API_DEVTO = 'https://dev.to/api/articles?per_page=25';

// ============================================
// FALLBACK (KALO API ERROR)
// ============================================
const FALLBACK = [
{
  title: 'Top 7 Featured DEV Posts of the Week',
  tag: 'Top7',
  time: '3 min',
  desc: 'Welcome to this week\'s Top 7, where the DEV editorial team handpicks their favorite posts from the community.',
  content: '<h2>Top 7 Featured DEV Posts of the Week</h2><p>Welcome to this week\'s Top 7, where the DEV editorial team handpicks their favorite posts from the community. From AI deployment to web performance, here are the must-reads.</p>'
},
{
  title: '2B Gemma 4 QAT Deployment with GCE, NVIDIA L4, MCP, and Antigravity CLI',
  tag: 'AI',
  time: '15 min',
  desc: 'This article provides a step by step deployment guide for Gemma 4 to a Google Compute Engine hosted NVIDIA L4.',
  content: '<h2>2B Gemma 4 QAT Deployment</h2><p>This article provides a step by step deployment guide for Gemma 4 to a Google Compute Engine hosted NVIDIA L4 with MCP and Antigravity CLI.</p>'
},
{
  title: 'TPU Deployments with Gemma 31B, v6e-4, and Antigravity CLI',
  tag: 'AI',
  time: '26 min',
  desc: 'This article provides a step by step debugging guide for deploying Gemma 4 to a Google Cloud TPU.',
  content: '<h2>TPU Deployments with Gemma 31B</h2><p>This article provides a step by step debugging guide for deploying Gemma 4 to a Google Cloud TPU v6e-4 with Antigravity CLI.</p>'
}
];

// ============================================
// AMBIL DARI API + RENDER
// ============================================
async function fetchArticles() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">⏳ Memuat artikel dari API...</div>';
    
    try {
        const response = await fetch(API_DEVTO);
        if (!response.ok) throw new Error('API error');
        const data = await response.json();
        
        if (data && data.length > 0) {
            const articles = data.map(item => ({
                title: item.title || 'Untitled',
                tag: item.tag_list?.[0] || 'Tech',
                time: Math.ceil(item.reading_time_minutes || 3) + ' min',
                desc: item.description || item.summary || 'Artikel menarik tentang teknologi.',
                content: item.body_html || item.description || '<p>Baca selengkapnya di Dev.to</p>'
            }));
            renderArticles(articles);
            return;
        }
    } catch (e) {
        console.warn('API error, using fallback:', e);
    }
    
    renderArticles(FALLBACK);
}

// ============================================
// RENDER ARTIKEL
// ============================================
function renderArticles(articles) {
    const grid = document.getElementById('grid');
    if (!articles || articles.length === 0) {
        grid.innerHTML = '<div class="loading">😞 Tidak ada artikel</div>';
        return;
    }
    
    grid.innerHTML = articles.map((a, index) => `
        <div class="card" onclick="openModal(${index})">
            <div class="meta">
                <span class="tag">${a.tag || 'Tech'}</span>
                <span class="time">${a.time || '3 min'}</span>
            </div>
            <h2>${a.title}</h2>
            <p>${a.desc || 'Artikel menarik tentang teknologi dan pemrograman.'}</p>
            <div class="btn-read">Baca Selengkapnya →</div>
        </div>
    `).join('');
    
    window._articles = articles;
}

// ============================================
// MODAL - TAMPILKAN FULL ARTIKEL
// ============================================
function openModal(index) {
    const articles = window._articles || FALLBACK;
    const a = articles[index];
    if (!a) return;
    
    document.getElementById('modalTitle').textContent = '📄 ' + a.title;
    
    let content = `
        <div class="meta">
            <span class="tag">🏷️ ${a.tag || 'Tech'}</span>
            <span>⏱️ ${a.time || '3 min'}</span>
        </div>
        ${a.content || '<p>Konten tidak tersedia</p>'}
        <button class="btn" onclick="closeModal()">Tutup</button>
    `;
    
    document.getElementById('modalContent').innerHTML = content;
    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = 'auto';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

// ============================================
// START
// ============================================
fetchArticles();
</script>
</body>
</html>
