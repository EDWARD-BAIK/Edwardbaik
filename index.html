<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDWARD OMNI V.51.0</title>
    <style>
        :root { --neon: #00ff88; --bg: #050a0e; --red: #ff4757; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #1a1a1a; color: #fff; }
        .btn-spam { background: linear-gradient(45deg, var(--red), #ff00cc); color: #fff; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #log { margin-top: 15px; font-size: 11px; color: var(--neon); text-align: left; height: 120px; overflow: auto; background: #000; padding: 10px; border-radius: 10px; display: none; border: 1px solid #333; }
    </style>
</head>
<body>
    <h2 style="color:var(--neon)">EDWARD OMNI V.51.0</h2>
    <div class="card">
        <p style="font-size: 12px; color: #aaa;">INTERNAL TERMUX ENGINE ACTIVATED</p>
        <input type="number" id="targetNo" placeholder="Target (Contoh: 895429505000)">
        <input type="number" id="jumlah" placeholder="Jumlah Serangan (Max 999)">
        <button class="btn-spam" onclick="kirimSerangan()">LUNCURKAN SERANGAN 💣</button>
        <div id="log"></div>
    </div>

    <script>
        async function kirimSerangan() {
            const no = document.getElementById('targetNo').value;
            const jum = document.getElementById('jumlah').value;
            const log = document.getElementById('log');
            if(!no || !jum) return alert("Isi Target & Jumlah!");

            log.style.display = "block";
            log.innerHTML = "> Menghubungkan ke Termux...<br>";

            try {
                const response = await fetch('http://localhost:5000/spam', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target: no, jumlah: jum })
                });
                const res = await response.json();
                log.innerHTML += "> STATUS: " + res.message + " 🔥";
            } catch (e) {
                log.innerHTML += "> ERROR: Jalankan 'python bomber.py' di Termux!";
                log.style.color = "red";
            }
        }
    </script>
</body>
</html>
