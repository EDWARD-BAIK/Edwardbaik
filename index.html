<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - ESP Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;padding:10px;min-height:100vh;overflow:hidden}
::selection{background:#ff2d55;color:#fff}

.header{text-align:center;padding:10px 0 5px;border-bottom:2px solid #00ff41;margin-bottom:10px}
.header h1{font-size:24px;color:#00ff41;text-shadow:0 0 20px rgba(0,255,65,.3);letter-spacing:2px}
.header h1 span{color:#ff2d55}
.header p{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stats div{background:#141b2b;border:1px solid rgba(0,255,65,.2);border-radius:8px;padding:6px;text-align:center}
.stats div span{display:block;font-size:18px;font-weight:700;color:#00ff41}
.stats div small{font-size:8px;color:rgba(255,255,255,.4)}

.camera-wrap{position:relative;width:100%;max-width:800px;margin:0 auto;border-radius:12px;overflow:hidden;border:2px solid #00ff41;background:#000}
.camera-wrap video{width:100%;display:block}
.camera-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

.controls{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.controls button{background:rgba(0,255,65,.1);border:1px solid #00ff41;border-radius:30px;padding:8px 20px;color:#00ff41;font-weight:600;cursor:pointer;font-size:11px;font-family:'Courier New',monospace}
.controls button:active{transform:scale(.95)}
.controls button.active{background:#00ff41;color:#000}

.footer{text-align:center;padding:10px 0 5px;border-top:1px solid rgba(255,255,255,.05);margin-top:10px}
.footer p{font-size:8px;color:rgba(255,255,255,.2)}
.footer span{color:#00ff41}
</style>
</head>
<body>

<div class="header">
<h1>👁️ ED<span>WARD</span> <span style="color:#00ff41;font-size:12px;">· ESP LIVE</span></h1>
<p>Edward-esp2026 · Real-time Object Detection</p>
</div>

<div class="stats">
<div><small>OBJECTS</small><span id="objCount">0</span></div>
<div><small>FPS</small><span id="fpsCount">0</span></div>
<div><small>STATUS</small><span id="statusText" style="font-size:14px;">●</span></div>
</div>

<div class="camera-wrap">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
</div>

<div class="controls">
<button id="btnStart" class="active" onclick="startCamera()">📷 Start</button>
<button id="btnStop" onclick="stopCamera()">⏹ Stop</button>
</div>

<div class="footer"><p>© 2026 <span>EDWARD</span> · Edward-esp2026 · <span id="modelStatus">Loading...</span></p></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>

<script>
// ============================================
// EDWARD ESP LIVE - OBJECT DETECTION
// ============================================
let model = null;
let stream = null;
let running = false;
let animationId = null;
let frameCount = 0;
let lastFpsTime = Date.now();
let fps = 0;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const objCount = document.getElementById('objCount');
const fpsCount = document.getElementById('fpsCount');
const statusText = document.getElementById('statusText');
const modelStatus = document.getElementById('modelStatus');

// ============================================
// MAKHLUK HIDUP + BENDA
// ============================================
const LIVING = ['person','human','cat','dog','bird','horse','sheep','cow','bear','zebra','giraffe','elephant','lion','tiger','monkey','rabbit','fox','wolf','deer'];
const OBJECTS = ['car','bus','truck','bicycle','motorcycle','chair','table','book','phone','laptop','tv','remote','keyboard','mouse','bottle','cup','plate','knife','fork','spoon'];

function isLiving(label) {
    const l = label.toLowerCase();
    return LIVING.some(w => l.includes(w));
}

function isObject(label) {
    const l = label.toLowerCase();
    return OBJECTS.some(w => l.includes(w));
}

function getLabel(label) {
    const l = label.toLowerCase();
    if (l === 'person' || l.includes('person')) return '👤 MANUSIA';
    const animals = {
        'cat':'🐱 KUCING','dog':'🐶 ANJING','bird':'🐦 BURUNG','horse':'🐴 KUDA',
        'sheep':'🐑 DOMBA','cow':'🐄 SAPI','bear':'🐻 BERUANG','zebra':'🦓 ZEBRA',
        'giraffe':'🦒 JERAPAH','elephant':'🐘 GAJAH','lion':'🦁 SINGA','tiger':'🐯 HARIMAU',
        'monkey':'🐒 MONYET','rabbit':'🐰 KELINCI','fox':'🦊 RUBAH','wolf':'🐺 SERIGALA',
        'deer':'🦌 RUSA'
    };
    for (let [key, val] of Object.entries(animals)) {
        if (l.includes(key)) return val;
    }
    const objects = {
        'car':'🚗 MOBIL','bus':'🚌 BUS','truck':'🚚 TRUK','bicycle':'🚲 SEPEDA',
        'motorcycle':'🏍️ MOTOR','chair':'🪑 KURSI','table':'🪑 MEJA','book':'📖 BUKU',
        'phone':'📱 HP','laptop':'💻 LAPTOP','tv':'📺 TV','remote':'📟 REMOTE'
    };
    for (let [key, val] of Object.entries(objects)) {
        if (l.includes(key)) return val;
    }
    return label.toUpperCase();
}

function getColor(label) {
    const l = label.toLowerCase();
    if (isLiving(l)) return '#ff2d55';
    if (isObject(l)) return '#00d4ff';
    return '#00ff41';
}

// ============================================
// LOAD MODEL
// ============================================
async function loadModel() {
    modelStatus.textContent = 'Loading TensorFlow...';
    try {
        model = await cocoSsd.load({ base: 'mobilenet_v2' });
        modelStatus.textContent = '✅ Model Ready';
        statusText.textContent = '●';
        statusText.style.color = '#00ff41';
        return true;
    } catch(e) {
        modelStatus.textContent = '❌ Error: ' + e.message;
        return false;
    }
}

// ============================================
// CAMERA
// ============================================
async function startCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
            audio: false
        });
        video.srcObject = stream;
        await video.play();
        statusText.textContent = '●';
        statusText.style.color = '#00ff41';
        document.getElementById('btnStart').classList.remove('active');

        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;

        if (!running) { running = true; detectLoop(); }
    } catch(e) {
        alert('Error: ' + e.message);
        statusText.textContent = '✕';
        statusText.style.color = '#ff2d55';
    }
}

function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    running = false;
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    objCount.textContent = '0';
    statusText.textContent = '⬤';
    statusText.style.color = '#ff4444';
    document.getElementById('btnStart').classList.add('active');
}

// ============================================
// DETECTION LOOP
// ============================================
async function detectLoop() {
    if (!running) return;
    await detect();
    animationId = requestAnimationFrame(detectLoop);
}

async function detect() {
    if (!video.srcObject || video.readyState < 2 || !model) return;

    try {
        const predictions = await model.detect(video);

        frameCount++;
        const now = Date.now();
        if (now - lastFpsTime > 1000) {
            fps = frameCount;
            frameCount = 0;
            lastFpsTime = now;
            fpsCount.textContent = fps;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Filter: hanya living + objects
        const filtered = predictions.filter(p => isLiving(p.class) || isObject(p.class));

        filtered.forEach(pred => {
            const [x, y, w, h] = pred.bbox;
            const label = getLabel(pred.class);
            const score = Math.round(pred.score * 100);
            const color = getColor(pred.class);

            // Box
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0;

            // ESP Lines
            ctx.strokeStyle = color;
            ctx.globalAlpha = 0.15;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 6]);
            ctx.beginPath(); ctx.moveTo(x + w/2, y); ctx.lineTo(x + w/2, 0); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + w/2, y + h); ctx.lineTo(x + w/2, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, y + h/2); ctx.lineTo(0, y + h/2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + w, y + h/2); ctx.lineTo(canvas.width, y + h/2); ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;

            // Label
            const txt = `${label} ${score}%`;
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.9;
            ctx.shadowColor = color;
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.roundRect ? ctx.roundRect(x, y - 26, 120, 24, 6) : ctx.fillRect(x, y - 26, 120, 24);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#000';
            ctx.font = 'bold 11px Courier New';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom';
            ctx.fillText(txt, x + 6, y - 4);

            // Center dot
            ctx.beginPath();
            ctx.arc(x + w/2, y + h/2, 4, 0, 2 * Math.PI);
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 25;
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        objCount.textContent = filtered.length;

        if (filtered.length === 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.font = '14px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('Tidak ada objek terdeteksi', canvas.width/2, canvas.height/2);
        }

    } catch(e) {}
}

// ============================================
// INIT
// ============================================
async function init() {
    await loadModel();
    startCamera();
}

init();
</script>
</body>
</html>
