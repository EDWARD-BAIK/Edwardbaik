<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#d0d0d0;font-family:'Inter','Segoe UI',sans-serif;padding:20px;min-height:100vh;line-height:1.6;filter:grayscale(1)}
::selection{background:#555;color:#fff}
.header{max-width:960px;margin:0 auto 40px;padding-bottom:20px;border-bottom:2px solid rgba(255,255,255,.06)}
.header h1{font-size:32px;font-weight:800;color:#fff;letter-spacing:-0.5px}
.header .sub{font-size:14px;color:rgba(255,255,255,.25);margin-top:4px}
.header .lang{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.header .lang button{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:30px;padding:6px 18px;color:rgba(255,255,255,.4);font-size:11px;cursor:pointer;transition:.2s}
.header .lang button:hover{border-color:rgba(255,255,255,.2);color:#fff}
.header .lang button.active{border-color:#fff;color:#fff;background:rgba(255,255,255,.06)}
.grid{max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:24px}
.card{background:#141414;border-radius:20px;padding:28px 30px;border:1px solid rgba(255,255,255,.04);transition:.3s;cursor:pointer}
.card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.15);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.card .meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,.25);margin-bottom:10px}
.card .meta .tag{background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);padding:4px 14px;border-radius:30px;font-weight:500;font-size:11px}
.card .meta .time{color:rgba(255,255,255,.2)}
.card h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.3}
.card .desc{font-size:15px;color:rgba(255,255,255,.35);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card .author{font-size:13px;color:rgba(255,255,255,.15);margin-top:12px}
.loading{text-align:center;padding:60px;color:rgba(255,255,255,.2)}
.error{text-align:center;padding:60px;color:#ff4444}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.98);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal .top{position:absolute;top:0;left:0;right:0;padding:16px 30px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.9);border-bottom:1px solid rgba(255,255,255,.04)}
.modal .top .t{font-size:16px;font-weight:600;color:#fff;max-width:65%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal .top .close{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:50%;width:44px;height:44px;color:#fff;font-size:22px;cursor:pointer}
.modal .top .close:hover{background:rgba(255,255,255,.08)}
.modal .content{max-width:820px;width:100%;max-height:82vh;overflow-y:auto;background:#141414;border-radius:20px;padding:40px 45px;border:1px solid rgba(255,255,255,.04)}
.modal .content h2{color:#fff;font-size:28px;font-weight:800;margin-bottom:8px}
.modal .content .meta{font-size:13px;color:rgba(255,255,255,.2);margin-bottom:25px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:16px;flex-wrap:wrap}
.modal .content .meta .tag{color:rgba(255,255,255,.3)}
.modal .content p{color:rgba(255,255,255,.7);line-height:1.9;margin-bottom:18px;font-size:16px}
.modal .content .btn-close{display:inline-block;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#fff;padding:10px 30px;border-radius:30px;font-weight:600;margin-top:20px;cursor:pointer}
.modal .content .btn-close:hover{background:rgba(255,255,255,.08)}
.footer{max-width:960px;margin:40px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.04);text-align:center;font-size:12px;color:rgba(255,255,255,.1)}
.footer span{color:rgba(255,255,255,.2)}
@media(max-width:600px){body{padding:12px}.header h1{font-size:24px}.card{padding:18px}.card h2{font-size:18px}.modal .content{padding:20px}.modal .content h2{font-size:21px}}
</style>
</head>
<body>

<div class="header">
<h1>⚡ EDWARD</h1>
<div class="sub">Technical deep dives</div>
<div class="lang">
<button class="active" onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('id')">🇮🇩 Indonesia</button>
</div>
</div>

<div id="grid" class="grid"><div class="loading">⏳ Loading...</div></div>

<div class="footer"><p>© 2026 <span>EDWARD</span></p></div>

<div class="modal" id="modal">
<div class="top">
<span class="t" id="modalTitle">📄 Artikel</span>
<button class="close" onclick="closeModal()">✕</button>
</div>
<div class="content" id="modalContent"></div>
</div>

<script>
// ============================================
// DEV.TO API
// ============================================
let currentLang = 'en';
let allArticles = [];

async function fetchArticles() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">⏳ Loading...</div>';
    
    try {
        const res = await fetch('https://dev.to/api/articles?per_page=30');
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        allArticles = data;
        
        if (data && data.length > 0) {
            renderArticles(data);
        } else {
            grid.innerHTML = '<div class="error">😞 Tidak ada artikel</div>';
        }
    } catch (e) {
        grid.innerHTML = `<div class="error">⚠️ Error: ${e.message}</div>`;
    }
}

function renderArticles(articles) {
    const grid = document.getElementById('grid');
    if (!articles || articles.length === 0) {
        grid.innerHTML = '<div class="error">😞 Tidak ada artikel</div>';
        return;
    }
    
    const isId = currentLang === 'id';
    
    grid.innerHTML = articles.map((item, index) => {
        const tag = item.tag_list?.[0] || 'Tech';
        const title = item.title;
        const desc = item.description || item.summary || (isId ? 'Artikel dari developer.' : 'Article from developer.');
        const author = item.user?.name || 'Developer';
        const date = item.published_at ? new Date(item.published_at).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}) : '';
        const time = Math.ceil(item.reading_time_minutes || 3) + ' min';
        
        return `
            <div class="card" onclick="openModal(${index})">
                <div class="meta">
                    <span class="tag">${tag}</span>
                    <span class="time">⏱️ ${time}</span>
                    <span class="time">📅 ${date}</span>
                </div>
                <h2>${title}</h2>
                <div class="desc">${desc}</div>
                <div class="author">✍️ ${author}</div>
            </div>
        `;
    }).join('');
}

// ============================================
// TRANSLATE
// ============================================
async function translateText(text, targetLang) {
    if (targetLang === 'en') return text;
    try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=id&dt=t&q=${encodeURIComponent(text)}`;
        const res = await fetch(url);
        const data = await res.json();
        return data[0].map(item => item[0]).join('');
    } catch (e) {
        return text;
    }
}

async function openModal(index) {
    const article = allArticles[index];
    if (!article) return;
    
    document.getElementById('modalTitle').textContent = '📄 ' + article.title;
    document.getElementById('modalContent').innerHTML = '<div class="loading">⏳ Loading...</div>';
    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
    
    try {
        const res = await fetch(`https://dev.to/api/articles/${article.id}`);
        if (!res.ok) throw new Error('Gagal ambil detail');
        const detail = await res.json();
        
        let content = detail.body_markdown || detail.body_html || 'Konten tidak tersedia';
        content = content.replace(/<[^>]*>/g, '');
        
        // Translate if Indonesian
        let translatedContent = content;
        let translatedTitle = article.title;
        let translatedDesc = article.description || article.summary || '';
        
        if (currentLang === 'id') {
            translatedTitle = await translateText(article.title, 'id');
            translatedDesc = await translateText(article.description || article.summary || '', 'id');
            translatedContent = await translateText(content.slice(0, 3000), 'id');
            if (content.length > 3000) translatedContent += '...';
        }
        
        const paragraphs = translatedContent.split('\n\n').filter(p => p.trim()).map(p => `<p>${p}</p>`).join('');
        
        document.getElementById('modalContent').innerHTML = `
            <h2>${translatedTitle}</h2>
            <div class="meta">
                <span class="tag">🏷️ ${article.tag_list?.[0] || 'Tech'}</span>
                <span class="time">⏱️ ${Math.ceil(article.reading_time_minutes || 3)} min</span>
                <span class="time">📅 ${article.published_at ? new Date(article.published_at).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}) : ''}</span>
                <span class="time">✍️ ${article.user?.name || 'Developer'}</span>
            </div>
            ${paragraphs || '<p>Konten tidak tersedia</p>'}
            <button class="btn-close" onclick="closeModal()">Tutup</button>
        `;
    } catch (e) {
        document.getElementById('modalContent').innerHTML = `
            <h2>${article.title}</h2>
            <div class="meta">
                <span class="tag">🏷️ ${article.tag_list?.[0] || 'Tech'}</span>
                <span class="time">⏱️ ${Math.ceil(article.reading_time_minutes || 3)} min</span>
            </div>
            <p>⚠️ Gagal memuat konten</p>
            <button class="btn-close" onclick="closeModal()">Tutup</button>
        `;
    }
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = 'auto';
}

function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang button').forEach(b => b.classList.remove('active'));
    document.querySelector(`.lang button[onclick="setLang('${lang}')"]`).classList.add('active');
    renderArticles(allArticles);
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

fetchArticles();
</script>
</body>
</html>
