<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>EDWARD OMNI V.151</title>
    <style>
        :root { --neon: #00ff88; --bg: #050a0e; --red: #ff4757; --purple: #bc13fe; --blue: #00bdff; --gold: #ffd700; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin:0; padding: 15px; overflow-x: hidden; }
        .master-header { text-align: center; margin-bottom: 15px; }
        .master-name { font-size: 24px; font-weight: 800; background: linear-gradient(to right, var(--neon), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .card { background: rgba(15, 25, 35, 0.9); border: 1px solid rgba(0,255,136,0.2); border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        h3 { margin: 0 0 12px 0; font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; }
        input, select { background: rgba(0,0,0,0.5); border: 1px solid rgba(0,255,136,0.3); border-radius: 10px; color: var(--neon); padding: 12px; width: 100%; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; font-size: 11px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .btn-dork { background: linear-gradient(45deg, #004e92, #000428); color: #fff; border: 1px solid var(--blue); }
        .btn-hunt { background: linear-gradient(45deg, var(--gold), #b8860b); color: #000; }
        .log-box { display: none; margin-top: 12px; background: #000; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 9px; height: 120px; overflow-y: auto; border: 1px solid #1a1a1a; color: var(--neon); }
        #customNotif { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--neon); color: #000; padding: 12px 25px; border-radius: 50px; font-weight: 800; font-size: 11px; display: none; z-index: 10001; }
    </style>
</head>
<body>
    <div id="customNotif"></div>
    <div class="master-header">
        <p class="master-name">EDWARD OMNI V.151</p>
    </div>

    <div class="card">
        <h3>🔍 GOOGLE DORKING (MANTRA)</h3>
        <input type="text" id="dorkTarget" placeholder="Target Domain (misal: syfe.com)">
        <select id="dorkType">
            <option value="dir">Directory Listing (Intip Folder)</option>
            <option value="log">Log Files (Cari Password/Email)</option>
            <option value="config">Config Files (Cari Database)</option>
            <option value="env">Environmental Files (.env)</option>
            <option value="sub">Find Subdomains (Cari Anak Web)</option>
        </select>
        <button class="btn btn-dork" onclick="generateDork()">🔮 CAST MANTRA</button>
        <div id="dorkLog" class="log-box"></div>
    </div>

    <div class="card">
        <h3>🎁 BUG BOUNTY PAYLOAD</h3>
        <button class="btn btn-hunt" onclick="showPayload()">GENERATE PAYLOAD</button>
    </div>

    <div class="card">
        <h3>🛡️ DEEP SCANNER</h3>
        <button class="btn" style="background:#1a1a1a; color:var(--neon)" onclick="alert('Scanner Ready')">SCAN TARGET</button>
    </div>

    <script>
        function showNotif(msg) {
            const n = document.getElementById('customNotif');
            n.innerText = msg; n.style.display = 'block';
            setTimeout(() => { n.style.display = 'none'; }, 2000);
        }

        function generateDork() {
            const target = document.getElementById('dorkTarget').value || "target.com";
            const type = document.getElementById('dorkType').value;
            const log = document.getElementById('dorkLog');
            log.style.display = "block";
            
            let mantra = "";
            switch(type) {
                case 'dir': mantra = "site:" + target + " intitle:index.of"; break;
                case 'log': mantra = "site:" + target + " filetype:log"; break;
                case 'config': mantra = "site:" + target + " extension:config OR extension:conf"; break;
                case 'env': mantra = "site:" + target + " filetype:env \"DB_PASSWORD\""; break;
                case 'sub': mantra = "site:*." + target + " -www"; break;
            }

            log.innerHTML = "> Mantra Tercipta Master:<br><code style='color:var(--blue)'>" + mantra + "</code><br><br>> Menuju Google dalam 3 detik...";
            showNotif("MANTRA COPIED!");
            navigator.clipboard.writeText(mantra);
            
            setTimeout(() => {
                window.open("https://www.google.com/search?q=" + encodeURIComponent(mantra), "_blank");
            }, 3000);
        }

        function showPayload() { showNotif("PAYLOAD MODULE ACTIVE"); }
    </script>
</body>
</html>
