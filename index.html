<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDWARD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(180deg, #0b0e1a 0%, #1a1f33 100%);
        }

        .sky {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            transition: background 1.5s ease;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 70%;
            z-index: 1;
            pointer-events: none;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        .star.visible {
            opacity: 0.9;
        }

        .sun {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ffdd55 30%, #ff8800 100%);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(255, 200, 50, 0.8), 0 0 180px rgba(255, 150, 0, 0.4);
            transition: all 0.5s ease;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
        }

        .moon {
            position: absolute;
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 40% 35%, #f5f5ff, #b0b0d0);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(200, 200, 255, 0.3), 0 0 140px rgba(150, 150, 255, 0.1);
            transition: all 0.5s ease;
            transform: translate(-50%, -50%);
            z-index: 11;
            pointer-events: none;
        }
        .moon::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 18px;
            height: 18px;
            background: rgba(180, 180, 200, 0.25);
            border-radius: 50%;
            box-shadow: 25px 20px 0 4px rgba(180, 180, 200, 0.2), 45px 5px 0 3px rgba(180, 180, 200, 0.15);
        }

        .mountains {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            z-index: 5;
            pointer-events: none;
        }

        .village {
            position: absolute;
            bottom: 28%;
            left: 0;
            width: 100%;
            height: 12%;
            z-index: 6;
            pointer-events: none;
        }
        .house {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 16px;
            background: #2a1a0a;
            transition: background 1.5s ease;
            clip-path: polygon(0% 100%, 0% 40%, 50% 0%, 100% 40%, 100% 100%);
        }
        .house .window {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #1a1a2a;
            border-radius: 50%;
            transition: all 1.5s ease;
        }
        .house .window.on {
            background: #ffdd44;
            box-shadow: 0 0 8px #ffdd44;
        }

        .info {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            color: white;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            padding: 14px 28px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            pointer-events: none;
            min-width: 200px;
        }
        .info h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #00ff88;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.15);
        }
        .info .clock {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-top: 2px;
            font-variant-numeric: tabular-nums;
        }
        .info .status {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-top: 2px;
            opacity: 0.5;
            text-transform: uppercase;
        }

        .location {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .info {
                top: 16px;
                padding: 10px 16px;
                min-width: unset;
                width: 90%;
            }
            .info h1 {
                font-size: 20px;
            }
            .info .clock {
                font-size: 24px;
            }
            .sun {
                width: 55px;
                height: 55px;
            }
            .moon {
                width: 50px;
                height: 50px;
            }
            .house {
                width: 14px;
                height: 12px;
            }
            .house .window {
                width: 3px;
                height: 3px;
            }
            .location {
                font-size: 9px;
                padding: 4px 12px;
                bottom: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="sky" id="sky">
        <div class="stars" id="stars"></div>
        <div class="sun" id="sun"></div>
        <div class="moon" id="moon"></div>

        <svg class="mountains" viewBox="0 0 100 30" preserveAspectRatio="none">
            <polygon points="0,30 5,5 10,15 15,2 22,12 28,8 35,18 42,4 50,14 58,6 65,16 72,8 80,20 88,10 95,18 100,30" fill="#1a3a1a" id="mountainFill"/>
            <polygon points="0,30 5,5 10,15 15,2 22,12 28,8 35,18 42,4 50,14 58,6 65,16 72,8 80,20 88,10 95,18 100,30" fill="rgba(255,255,255,0.08)" id="snowFill"/>
        </svg>

        <div class="village" id="village"></div>

        <div class="info">
            <h1>EDWARD</h1>
            <div class="clock" id="clock">--:--:--</div>
            <div class="status" id="status">Mencari lokasi...</div>
        </div>

        <div class="location" id="location">🌍 Menunggu izin lokasi...</div>
    </div>

    <script>
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 70 + '%';
            const size = Math.random() * 2.5 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            starsContainer.appendChild(star);
        }
        const starElements = document.querySelectorAll('.star');

        const village = document.getElementById('village');
        const houses = [];
        for (let i = 0; i < 30; i++) {
            const house = document.createElement('div');
            house.className = 'house';
            const x = (i / 30) * 95 + 2.5;
            const size = 14 + Math.random() * 10;
            house.style.left = x + '%';
            house.style.width = size + 'px';
            house.style.height = (size * 0.8) + 'px';
            house.style.transform = 'scaleY(' + (0.7 + Math.random() * 0.6) + ')';
            
            const win = document.createElement('div');
            win.className = 'window';
            win.style.left = '30%';
            win.style.top = '30%';
            house.appendChild(win);
            
            const win2 = document.createElement('div');
            win2.className = 'window';
            win2.style.left = '55%';
            win2.style.top = '30%';
            house.appendChild(win2);
            
            village.appendChild(house);
            houses.push(house);
        }

        const sky = document.getElementById('sky');
        const sun = document.getElementById('sun');
        const moon = document.getElementById('moon');
        const mountainFill = document.getElementById('mountainFill');
        const snowFill = document.getElementById('snowFill');
        const clockEl = document.getElementById('clock');
        const statusEl = document.getElementById('status');
        const locationEl = document.getElementById('location');

        let userLat = -6.2088;
        let userLng = 106.8456;

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        userLat = pos.coords.latitude;
                        userLng = pos.coords.longitude;
                        locationEl.textContent = '🌍 ' + userLat.toFixed(4) + ', ' + userLng.toFixed(4);
                        statusEl.textContent = 'Lokasi ditemukan ✅';
                        updateSky();
                    },
                    function() {
                        locationEl.textContent = '⚠️ Izin lokasi ditolak, default Jakarta';
                        statusEl.textContent = 'Menggunakan default';
                        updateSky();
                    },
                    { enableHighAccuracy: true }
                );
            } else {
                locationEl.textContent = '⚠️ Geolocation tidak didukung';
                statusEl.textContent = 'Menggunakan default';
                updateSky();
            }
        }

        function getSunriseSunset(lat, lng, now) {
            var dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            var declination = 23.44 * Math.sin((360 / 365) * (dayOfYear - 81) * Math.PI / 180);
            var latRad = lat * Math.PI / 180;
            var declRad = declination * Math.PI / 180;
            var cosHourAngle = -Math.tan(latRad) * Math.tan(declRad);
            var hourAngle = Math.acos(Math.min(1, Math.max(-1, cosHourAngle))) * 180 / Math.PI;
            hourAngle = hourAngle / 15;
            var sunrise = 12 - hourAngle;
            var sunset = 12 + hourAngle;
            return { sunrise: sunrise, sunset: sunset };
        }

        function updateSky() {
            var now = new Date();
            var hours = now.getHours() + now.getMinutes() / 60;

            var sunData = getSunriseSunset(userLat, userLng, now);
            var sunrise = sunData.sunrise;
            var sunset = sunData.sunset;
            var isNight = hours < sunrise || hours > sunset;

            statusEl.textContent = isNight ? '🌙 Malam' : '☀️ Siang';

            if (isNight) {
                sky.style.background = 'linear-gradient(180deg, #05080f 0%, #0b1424 40%, #1a1f33 100%)';
            } else {
                var progress = (hours - sunrise) / (sunset - sunrise);
                var clamped = Math.min(1, Math.max(0, progress));
                var r = Math.round(20 + 135 * clamped);
                var g = Math.round(30 + 150 * (1 - Math.abs(clamped - 0.5) * 2));
                var b = Math.round(60 + 150 * (1 - clamped));
                sky.style.background = 'linear-gradient(180deg, rgb(' + r + ', ' + g + ', ' + b + ') 0%, rgb(' + Math.round(r/2) + ', ' + Math.round(g/2) + ', ' + Math.round(b/2) + ') 100%)';
            }

            var sunProgress = (hours - sunrise) / (sunset - sunrise);
            var sunClamped = Math.min(1, Math.max(0, sunProgress));
            var sunX = sunClamped * 90 + 5;
            var sunY = Math.sin(sunClamped * Math.PI) * 60 + 15;
            sun.style.left = sunX + '%';
            sun.style.top = sunY + '%';
            sun.style.opacity = isNight ? '0' : '1';

            var moonProgress = 1 - sunClamped;
            var moonX = moonProgress * 90 + 5;
            var moonY = Math.sin(moonProgress * Math.PI) * 60 + 15;
            moon.style.left = moonX + '%';
            moon.style.top = moonY + '%';
            moon.style.opacity = isNight ? '1' : '0.2';

            starElements.forEach(function(star) {
                var shouldShow = isNight && Math.random() > 0.3;
                if (shouldShow) {
                    star.classList.add('visible');
                } else {
                    star.classList.remove('visible');
                }
            });

            if (isNight) {
                mountainFill.setAttribute('fill', '#0a1a0a');
                snowFill.setAttribute('fill', 'rgba(255,255,255,0.03)');
            } else {
                mountainFill.setAttribute('fill', '#1a3a1a');
                snowFill.setAttribute('fill', 'rgba(255,255,255,0.08)');
            }

            houses.forEach(function(house) {
                var windows = house.querySelectorAll('.window');
                var on = isNight && Math.random() > 0.3;
                windows.forEach(function(w) {
                    if (on) {
                        w.className = 'window on';
                    } else {
                        w.className = 'window';
                    }
                });
            });

            clockEl.textContent = now.toLocaleTimeString('id-ID', { hour12: false });
        }

        setInterval(updateSky, 1000);
        getLocation();
        setInterval(updateSky, 30000);
    </script>
</body>
</html>
