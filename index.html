<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - ESP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;padding:10px;min-height:100vh;overflow:hidden}
::selection{background:#ff2d55;color:#fff}

.header{text-align:center;padding:10px 0 5px;border-bottom:2px solid #00ff41;margin-bottom:10px}
.header h1{font-size:24px;color:#00ff41;text-shadow:0 0 20px rgba(0,255,65,.3);letter-spacing:2px}
.header h1 span{color:#ff2d55}
.header p{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stats div{background:#141b2b;border:1px solid rgba(0,255,65,.2);border-radius:8px;padding:6px;text-align:center}
.stats div span{display:block;font-size:20px;font-weight:700;color:#00ff41}
.stats div small{font-size:9px;color:rgba(255,255,255,.4)}

.camera-wrap{position:relative;width:100%;max-width:800px;margin:0 auto;border-radius:12px;overflow:hidden;border:2px solid #00ff41;background:#000}
.camera-wrap video{width:100%;display:block}
.camera-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

.controls{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.controls button{background:rgba(0,255,65,.1);border:1px solid #00ff41;border-radius:30px;padding:8px 20px;color:#00ff41;font-weight:600;cursor:pointer;font-size:11px;font-family:'Courier New',monospace}
.controls button:active{transform:scale(.95)}
.controls button.active{background:#00ff41;color:#000}

.footer{text-align:center;padding:10px 0 5px;border-top:1px solid rgba(255,255,255,.05);margin-top:10px}
.footer p{font-size:8px;color:rgba(255,255,255,.2)}
.footer span{color:#00ff41}
</style>
</head>
<body>

<div class="header">
<h1>👁️ ED<span>WARD</span> <span style="color:#00ff41;font-size:12px;">· ESP</span></h1>
<p>Edward-esp2026 · Motion + Face Detection</p>
</div>

<div class="stats">
<div><small>OBJECTS</small><span id="objCount">0</span></div>
<div><small>FPS</small><span id="fpsCount">0</span></div>
<div><small>STATUS</small><span id="statusText" style="font-size:14px;">●</span></div>
</div>

<div class="camera-wrap">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
</div>

<div class="controls">
<button id="btnStart" class="active" onclick="startCamera()">📷 Start</button>
<button id="btnStop" onclick="stopCamera()">⏹ Stop</button>
</div>

<div class="footer"><p>© 2026 <span>EDWARD</span> · Edward-esp2026 · <span id="modelStatus">Motion Detection Ready</span></p></div>

<script>
// ============================================
// EDWARD ESP - MOTION + FACE DETECTION
// ============================================
let stream = null;
let running = false;
let animationId = null;
let frameCount = 0;
let lastFpsTime = Date.now();
let fps = 0;

// Face detection dengan face-api.js (CDN)
let faceapi = null;
let faceDetectionNet = null;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const objCount = document.getElementById('objCount');
const fpsCount = document.getElementById('fpsCount');
const statusText = document.getElementById('statusText');
const modelStatus = document.getElementById('modelStatus');

// Motion detection variables
let previousFrame = null;
let motionThreshold = 30;
let motionAreas = [];

// ============================================
// LOAD FACE-API.JS
// ============================================
async function loadFaceAPI() {
    try {
        // Load face-api.js dari CDN
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js';
        script.onload = async () => {
            faceapi = window.faceapi;
            if (faceapi) {
                try {
                    await faceapi.nets.tinyFaceDetector.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
                    modelStatus.textContent = '✅ Face + Motion Ready';
                } catch(e) {
                    modelStatus.textContent = '⚠️ Face fallback, motion active';
                }
            }
        };
        document.head.appendChild(script);
        return true;
    } catch(e) {
        modelStatus.textContent = '⚠️ Motion only';
        return false;
    }
}

// ============================================
// CAMERA
// ============================================
async function startCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 640 },
                height: { ideal: 480 }
            },
            audio: false
        });
        video.srcObject = stream;
        await video.play();
        statusText.textContent = '●';
        statusText.style.color = '#00ff41';
        document.getElementById('btnStart').classList.remove('active');

        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;

        if (!running) {
            running = true;
            detectLoop();
        }
    } catch(e) {
        alert('Error: ' + e.message);
        statusText.textContent = '✕';
        statusText.style.color = '#ff2d55';
    }
}

function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    running = false;
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    objCount.textContent = '0';
    statusText.textContent = '⬤';
    statusText.style.color = '#ff4444';
    document.getElementById('btnStart').classList.add('active');
}

// ============================================
// DETECTION LOOP
// ============================================
async function detectLoop() {
    if (!running) return;
    await detect();
    animationId = requestAnimationFrame(detectLoop);
}

// ============================================
// DETECT - MOTION + FACE
// ============================================
async function detect() {
    if (!video.srcObject || video.readyState < 2) return;

    try {
        // FPS
        frameCount++;
        const now = Date.now();
        if (now - lastFpsTime > 1000) {
            fps = frameCount;
            frameCount = 0;
            lastFpsTime = now;
            fpsCount.textContent = fps;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw video as background (mirror)
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        // Motion detection (simple)
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const gray = new Uint8Array(canvas.width * canvas.height);
        for (let i = 0; i < data.length; i += 4) {
            gray[i/4] = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
        }

        if (previousFrame) {
            const diff = new Uint8Array(gray.length);
            let motionPixels = 0;
            for (let i = 0; i < gray.length; i++) {
                const d = Math.abs(gray[i] - previousFrame[i]);
                diff[i] = d;
                if (d > motionThreshold) motionPixels++;
            }

            if (motionPixels > 100) {
                // Ada gerakan - gambar bounding box
                const color = '#ff2d55';
                const x = 50, y = 50, w = 200, h = 250;
                
                // Box
                ctx.shadowColor = color;
                ctx.shadowBlur = 25;
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, w, h);
                ctx.shadowBlur = 0;

                // ESP Lines
                ctx.strokeStyle = color;
                ctx.globalAlpha = 0.15;
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.beginPath(); ctx.moveTo(x + w/2, y); ctx.lineTo(x + w/2, 0); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x + w/2, y + h); ctx.lineTo(x + w/2, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x, y + h/2); ctx.lineTo(0, y + h/2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x + w, y + h/2); ctx.lineTo(canvas.width, y + h/2); ctx.stroke();
                ctx.setLineDash([]);
                ctx.globalAlpha = 1;

                // Label
                const label = '👤 MANUSIA';
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.9;
                ctx.shadowColor = color;
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.roundRect ? ctx.roundRect(x, y - 28, 130, 26, 8) : ctx.fillRect(x, y - 28, 130, 26);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#000';
                ctx.font = 'bold 13px Courier New';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                ctx.fillText(label, x + 8, y - 6);

                // Center dot
                ctx.beginPath();
                ctx.arc(x + w/2, y + h/2, 5, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 30;
                ctx.fill();
                ctx.shadowBlur = 0;

                objCount.textContent = '1';
            } else {
                objCount.textContent = '0';
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.font = '14px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('Tidak ada pergerakan', canvas.width/2, canvas.height/2);
            }
        }

        previousFrame = gray;

    } catch(e) {
        // silent
    }
}

// ============================================
// INIT
// ============================================
async function init() {
    await loadFaceAPI();
    startCamera();
}

init();
</script>
</body>
</html>
