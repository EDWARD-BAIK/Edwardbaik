<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - ESP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;padding:10px;min-height:100vh;overflow:hidden}
::selection{background:#ff2d55;color:#fff}

.header{text-align:center;padding:10px 0 5px;border-bottom:2px solid #00ff41;margin-bottom:10px}
.header h1{font-size:24px;color:#00ff41;text-shadow:0 0 20px rgba(0,255,65,.3);letter-spacing:2px}
.header h1 span{color:#ff2d55}
.header p{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stats div{background:#141b2b;border:1px solid rgba(0,255,65,.2);border-radius:8px;padding:6px;text-align:center}
.stats div span{display:block;font-size:20px;font-weight:700;color:#00ff41}
.stats div small{font-size:9px;color:rgba(255,255,255,.4)}

.camera-wrap{position:relative;width:100%;max-width:800px;margin:0 auto;border-radius:12px;overflow:hidden;border:2px solid #00ff41;background:#000}
.camera-wrap video{width:100%;display:block}
.camera-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

.controls{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.controls button{background:rgba(0,255,65,.1);border:1px solid #00ff41;border-radius:30px;padding:8px 20px;color:#00ff41;font-weight:600;cursor:pointer;font-size:11px;font-family:'Courier New',monospace}
.controls button:active{transform:scale(.95)}
.controls button.active{background:#00ff41;color:#000}

.footer{text-align:center;padding:10px 0 5px;border-top:1px solid rgba(255,255,255,.05);margin-top:10px}
.footer p{font-size:8px;color:rgba(255,255,255,.2)}
.footer span{color:#00ff41}
</style>
</head>
<body>

<div class="header">
<h1>👁️ ED<span>WARD</span> <span style="color:#00ff41;font-size:12px;">· ESP</span></h1>
<p>Edward-esp2026 · Face Detection</p>
</div>

<div class="stats">
<div><small>FACE</small><span id="faceCount">0</span></div>
<div><small>FPS</small><span id="fpsCount">0</span></div>
<div><small>STATUS</small><span id="statusText" style="font-size:14px;">●</span></div>
</div>

<div class="camera-wrap">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
</div>

<div class="controls">
<button id="btnStart" class="active" onclick="startCamera()">📷 Start</button>
<button id="btnStop" onclick="stopCamera()">⏹ Stop</button>
</div>

<div class="footer"><p>© 2026 <span>EDWARD</span> · Edward-esp2026 · <span id="modelStatus">Face Detection Ready</span></p></div>

<script>
// ============================================
// EDWARD ESP - FACE DETECTION (BUILT-IN)
// ============================================
let faceDetector = null;
let stream = null;
let running = false;
let animationId = null;
let frameCount = 0;
let lastFpsTime = Date.now();
let fps = 0;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const faceCount = document.getElementById('faceCount');
const fpsCount = document.getElementById('fpsCount');
const statusText = document.getElementById('statusText');
const modelStatus = document.getElementById('modelStatus');

// ============================================
// LOAD FACE DETECTOR
// ============================================
async function loadDetector() {
    try {
        if (typeof FaceDetector !== 'undefined') {
            faceDetector = new FaceDetector({
                maxDetectedFaces: 10,
                fastMode: true
            });
            modelStatus.textContent = '✅ Face Detection Ready';
            return true;
        } else {
            modelStatus.textContent = '⚠️ FaceDetector not supported';
            return false;
        }
    } catch(e) {
        modelStatus.textContent = '❌ ' + e.message;
        return false;
    }
}

// ============================================
// CAMERA
// ============================================
async function startCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 640 },
                height: { ideal: 480 }
            },
            audio: false
        });
        video.srcObject = stream;
        await video.play();
        statusText.textContent = '●';
        statusText.style.color = '#00ff41';
        document.getElementById('btnStart').classList.remove('active');

        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;

        if (!running) {
            running = true;
            detectLoop();
        }
    } catch(e) {
        alert('Error: ' + e.message);
        statusText.textContent = '✕';
        statusText.style.color = '#ff2d55';
    }
}

function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    running = false;
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    faceCount.textContent = '0';
    statusText.textContent = '⬤';
    statusText.style.color = '#ff4444';
    document.getElementById('btnStart').classList.add('active');
}

// ============================================
// DETECTION LOOP
// ============================================
async function detectLoop() {
    if (!running) return;
    await detect();
    animationId = requestAnimationFrame(detectLoop);
}

async function detect() {
    if (!video.srcObject || video.readyState < 2) return;

    try {
        // FPS
        frameCount++;
        const now = Date.now();
        if (now - lastFpsTime > 1000) {
            fps = frameCount;
            frameCount = 0;
            lastFpsTime = now;
            fpsCount.textContent = fps;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!faceDetector) {
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.font = '14px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('FaceDetector tidak tersedia', canvas.width/2, canvas.height/2);
            return;
        }

        const faces = await faceDetector.detect(video);
        faceCount.textContent = faces.length;

        if (faces.length > 0) {
            faces.forEach(face => {
                const box = face.boundingBox;
                const x = box.x || 0;
                const y = box.y || 0;
                const w = box.width || 0;
                const h = box.height || 0;
                const color = '#ff2d55';

                // Bounding Box
                ctx.shadowColor = color;
                ctx.shadowBlur = 25;
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, w, h);
                ctx.shadowBlur = 0;

                // ESP Lines
                ctx.strokeStyle = color;
                ctx.globalAlpha = 0.15;
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);

                ctx.beginPath();
                ctx.moveTo(x + w/2, y);
                ctx.lineTo(x + w/2, 0);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(x + w/2, y + h);
                ctx.lineTo(x + w/2, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(x, y + h/2);
                ctx.lineTo(0, y + h/2);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(x + w, y + h/2);
                ctx.lineTo(canvas.width, y + h/2);
                ctx.stroke();

                ctx.setLineDash([]);
                ctx.globalAlpha = 1;

                // Label
                const label = '👤 MANUSIA';
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.9;
                ctx.shadowColor = color;
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.roundRect ? ctx.roundRect(x, y - 28, 130, 26, 8) : ctx.fillRect(x, y - 28, 130, 26);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#000';
                ctx.font = 'bold 13px Courier New';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                ctx.fillText(label, x + 8, y - 6);

                // Center dot
                ctx.beginPath();
                ctx.arc(x + w/2, y + h/2, 5, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 30;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Distance (mock)
                const dist = Math.round(20 + Math.random() * 30);
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.5;
                ctx.font = '10px Courier New';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'top';
                ctx.fillText(dist + 'm', x + w - 6, y + 6);
                ctx.globalAlpha = 1;
            });
        } else {
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.font = '14px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('Tidak ada wajah terdeteksi', canvas.width/2, canvas.height/2);
        }

    } catch(e) {
        // silent
    }
}

// ============================================
// INIT
// ============================================
async function init() {
    await loadDetector();
    startCamera();
}

init();
</script>
</body>
</html>
