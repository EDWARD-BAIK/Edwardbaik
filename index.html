        button { background: var(--danger); color: #fff; border: none; padding: 15px; width: 90%; font-weight: bold; cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        .status-box { font-size: 10px; color: #777; background: #000; padding: 10px; border-radius: 5px; height: 100px; overflow-y: hidden; margin-top: 10px; text-align: left; border: 1px solid #222; }
