<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e17;color:#e0e0e0;font-family:'Inter','Segoe UI',sans-serif;padding:20px;min-height:100vh;line-height:1.6}
::selection{background:#ff2d55;color:#fff}

.header{max-width:960px;margin:0 auto 40px;padding-bottom:20px;border-bottom:2px solid rgba(0,212,255,.08)}
.header h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#00d4ff,#ff2d55);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.header .sub{font-size:14px;color:rgba(255,255,255,.3);margin-top:4px}

.grid{max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:24px}
.card{background:#141b2b;border-radius:20px;padding:28px 30px;border:1px solid rgba(255,255,255,.04);transition:.3s;cursor:pointer}
.card:hover{transform:translateY(-4px);border-color:#00d4ff;box-shadow:0 20px 60px rgba(0,212,255,.06)}
.card .meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,.3);margin-bottom:10px}
.card .meta .tag{background:rgba(0,212,255,.1);color:#00d4ff;padding:4px 14px;border-radius:30px;font-weight:500;font-size:11px}
.card .meta .time{color:rgba(255,255,255,.25)}
.card h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;line-height:1.3}
.card .desc{font-size:15px;color:rgba(255,255,255,.45);line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card .author{font-size:13px;color:rgba(255,255,255,.2);margin-top:12px;display:flex;align-items:center;gap:8px}
.card .author img{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.05)}

.loading{text-align:center;padding:60px;color:rgba(255,255,255,.3);font-size:16px}
.error{text-align:center;padding:60px;color:#ff2d55;font-size:16px}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.96);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.modal.show{display:flex}
.modal .top{position:absolute;top:0;left:0;right:0;padding:16px 30px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,212,255,.1)}
.modal .top .t{font-size:16px;font-weight:600;color:#00d4ff;max-width:65%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal .top .close{background:rgba(255,45,85,.15);border:1px solid rgba(255,45,85,.2);border-radius:50%;width:44px;height:44px;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal .top .close:hover{background:#ff2d55}
.modal .content{max-width:820px;width:100%;max-height:82vh;overflow-y:auto;background:#141b2b;border-radius:20px;padding:40px 45px;border:1px solid rgba(0,212,255,.08);margin-top:10px}
.modal .content::-webkit-scrollbar{width:6px}
.modal .content::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:10px}
.modal .content h2{color:#fff;font-size:28px;font-weight:800;margin-bottom:8px;line-height:1.3}
.modal .content .meta{font-size:13px;color:rgba(255,255,255,.3);margin-bottom:25px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:16px;flex-wrap:wrap}
.modal .content .meta .tag{color:#00d4ff}
.modal .content p{color:rgba(255,255,255,.85);line-height:1.9;margin-bottom:18px;font-size:16px}
.modal .content h3{color:#00d4ff;margin:28px 0 12px;font-size:19px;font-weight:700}
.modal .content ul{color:rgba(255,255,255,.75);padding-left:28px;margin:14px 0}
.modal .content ul li{margin-bottom:8px}
.modal .content .btn-close{display:inline-block;background:#00d4ff;color:#000;padding:10px 30px;border-radius:30px;font-weight:700;margin-top:20px;border:0;cursor:pointer}
.modal .content .btn-close:hover{background:#00b8e6}
.modal .content pre{background:#0a0e17;padding:20px;border-radius:12px;overflow-x:auto;font-size:13px;color:#00ff88;border:1px solid rgba(0,255,136,.06);margin:18px 0;white-space:pre-wrap}
.modal .content .highlight{color:#ffd700;font-weight:600}
.modal .content blockquote{border-left:3px solid #00d4ff;padding-left:20px;margin:18px 0;color:rgba(255,255,255,.5);font-style:italic}
.modal .content img{max-width:100%;border-radius:12px;margin:18px 0}

.footer{max-width:960px;margin:40px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.04);text-align:center;font-size:12px;color:rgba(255,255,255,.15)}
.footer span{color:#00d4ff}

@media(max-width:600px){
  body{padding:12px}
  .header h1{font-size:24px}
  .card{padding:18px}
  .card h2{font-size:18px}
  .modal .content{padding:20px}
  .modal .content h2{font-size:21px}
}
</style>
</head>
<body>

<div class="header">
<h1>⚡ EDWARD</h1>
<div class="sub">Technical deep dives • Powered by API</div>
</div>

<div id="grid" class="grid"><div class="loading">⏳ Loading...</div></div>

<div class="footer"><p>© 2026 <span>EDWARD</span> • API Powered</p></div>

<div class="modal" id="modal">
<div class="top">
<span class="t" id="modalTitle">📄 Artikel</span>
<button class="close" onclick="closeModal()">✕</button>
</div>
<div class="content" id="modalContent"></div>
</div>

<script>
// ============================================
// API 1: DEV.TO (LIST ARTIKEL)
// API 2: DEV.TO SINGLE (FULL KONTEN)
// ============================================
const API_DEVTO = 'https://dev.to/api/articles?per_page=30';

// ============================================
// MARKDOWN → HTML SEDERHANA
// ============================================
function markdownToHtml(text) {
    if (!text) return '<p>Konten tidak tersedia</p>';
    
    let html = text;
    
    // Code block
    html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
    
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    
    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    
    // Italic
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    
    // Heading
    html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
    html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
    html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
    
    // List
    html = html.replace(/^- (.*$)/gim, '<li>$1</li>');
    html = html.replace(/\n<li>([\s\S]*?)<\/li>/g, '<ul><li>$1</li></ul>');
    
    // Paragraph
    html = html.replace(/\n\n/g, '</p><p>');
    html = '<p>' + html + '</p>';
    
    // Fix double <p><p>
    html = html.replace(/<p><p>/g, '<p>');
    html = html.replace(/<\/p><\/p>/g, '</p>');
    
    // Fix list inside p
    html = html.replace(/<p><ul>/g, '<ul>');
    html = html.replace(/<\/ul><\/p>/g, '</ul>');
    
    return html;
}

// ============================================
// FETCH + RENDER
// ============================================
async function fetchArticles() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loading">⏳ Loading...</div>';
    
    try {
        const response = await fetch(API_DEVTO);
        if (!response.ok) throw new Error('Gagal mengambil data');
        const data = await response.json();
        
        if (data && data.length > 0) {
            const articles = data.map(item => ({
                id: item.id,
                title: item.title || 'Untitled',
                tag: item.tag_list?.[0] || 'Tech',
                time: Math.ceil(item.reading_time_minutes || 3) + ' min',
                desc: item.description || item.summary || 'Artikel menarik tentang teknologi.',
                // Body markdown (full konten)
                content: item.body_markdown || item.body_html || item.description || '<p>Konten tidak tersedia</p>',
                author: item.user?.name || 'Anonymous',
                authorImg: item.user?.profile_image || '',
                published: item.published_at ? new Date(item.published_at).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'}) : ''
            }));
            renderArticles(articles);
        } else {
            grid.innerHTML = '<div class="error">😞 Tidak ada artikel</div>';
        }
    } catch (e) {
        grid.innerHTML = `<div class="error">⚠️ Error: ${e.message}</div>`;
        console.error('API Error:', e);
    }
}

function renderArticles(articles) {
    const grid = document.getElementById('grid');
    if (!articles || articles.length === 0) {
        grid.innerHTML = '<div class="error">😞 Tidak ada artikel</div>';
        return;
    }
    
    grid.innerHTML = articles.map((a, index) => `
        <div class="card" onclick="openModal(${index})">
            <div class="meta">
                <span class="tag">${a.tag || 'Tech'}</span>
                <span class="time">⏱️ ${a.time || '3 min'}</span>
                ${a.published ? `<span class="time">📅 ${a.published}</span>` : ''}
            </div>
            <h2>${a.title}</h2>
            <div class="desc">${a.desc || 'Artikel menarik tentang teknologi dan pemrograman.'}</div>
            <div class="author">
                ${a.authorImg ? `<img src="${a.authorImg}" alt="${a.author}">` : ''}
                <span>${a.author || 'Anonymous'}</span>
            </div>
        </div>
    `).join('');
    
    window._articles = articles;
}

// ============================================
// MODAL - FULL KONTEN (Markdown → HTML)
// ============================================
function openModal(index) {
    const articles = window._articles || [];
    const a = articles[index];
    if (!a) return;
    
    document.getElementById('modalTitle').textContent = '📄 ' + a.title;
    
    // Convert markdown ke HTML
    const fullContent = markdownToHtml(a.content);
    
    document.getElementById('modalContent').innerHTML = `
        <h2>${a.title}</h2>
        <div class="meta">
            <span class="tag">🏷️ ${a.tag || 'Tech'}</span>
            <span class="time">⏱️ ${a.time || '3 min'}</span>
            ${a.published ? `<span class="time">📅 ${a.published}</span>` : ''}
        </div>
        ${fullContent}
        <button class="btn-close" onclick="closeModal()">Tutup</button>
    `;
    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = 'auto';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

// ============================================
// START
// ============================================
fetchArticles();
</script>
</body>
</html>
