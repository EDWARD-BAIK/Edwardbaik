<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDWARD - ESP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:'Courier New',monospace;padding:10px;min-height:100vh}
::selection{background:#ff2d55;color:#fff}
.header{text-align:center;padding:10px 0 5px;border-bottom:2px solid #00ff41;margin-bottom:10px}
.header h1{font-size:24px;color:#00ff41;text-shadow:0 0 20px rgba(0,255,65,.3);letter-spacing:2px}
.header h1 span{color:#ff2d55}
.header p{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stats div{background:#141b2b;border:1px solid rgba(0,255,65,.2);border-radius:8px;padding:6px;text-align:center}
.stats div span{display:block;font-size:20px;font-weight:700;color:#00ff41}
.stats div small{font-size:9px;color:rgba(255,255,255,.4)}
.camera-wrap{position:relative;width:100%;max-width:800px;margin:0 auto;border-radius:12px;overflow:hidden;border:2px solid #00ff41;background:#000}
.camera-wrap video{width:100%;display:block}
.camera-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.controls{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.controls button{background:rgba(0,255,65,.1);border:1px solid #00ff41;border-radius:30px;padding:8px 20px;color:#00ff41;font-weight:600;cursor:pointer;font-size:11px;font-family:'Courier New',monospace}
.controls button:active{transform:scale(.95)}
.controls button.active{background:#00ff41;color:#000}
.controls button.full{background:rgba(255,215,0,.1);border-color:#ffd700;color:#ffd700}
.footer{text-align:center;padding:10px 0 5px;border-top:1px solid rgba(255,255,255,.05);margin-top:10px}
.footer p{font-size:8px;color:rgba(255,255,255,.2)}
.footer span{color:#00ff41}
</style>
</head>
<body>

<div class="header">
<h1>👁️ ED<span>WARD</span> <span style="color:#00ff41;font-size:12px;">· ESP</span></h1>
<p>Edward-esp2026 · Multi Target Tracker</p>
</div>

<div class="stats">
<div><small>TARGETS</small><span id="objCount">0</span></div>
<div><small>FPS</small><span id="fpsCount">0</span></div>
<div><small>STATUS</small><span id="statusText" style="font-size:14px;">●</span></div>
</div>

<div class="camera-wrap" id="cameraWrap">
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
</div>

<div class="controls">
<button id="btnStart" class="active" onclick="startCamera()">📷 Start</button>
<button id="btnStop" onclick="stopCamera()">⏹ Stop</button>
<button id="btnReset" onclick="resetTracker()">🔄 Reset</button>
<button class="full" onclick="toggleFullscreen()">⛶ Full</button>
</div>

<div class="footer"><p>© 2026 <span>EDWARD</span> · Edward-esp2026 · <span id="modelStatus">ESP Active</span></p></div>

<script>
let stream = null;
let running = false;
let animationId = null;
let frameCount = 0;
let lastFpsTime = Date.now();
let fps = 0;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const objCount = document.getElementById('objCount');
const fpsCount = document.getElementById('fpsCount');
const statusText = document.getElementById('statusText');
const modelStatus = document.getElementById('modelStatus');
const cameraWrap = document.getElementById('cameraWrap');

let targets = [];
let trackingId = 0;

// ============================================
// FULLSCREEN
// ============================================
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        cameraWrap.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
}

// ============================================
// CAMERA
// ============================================
async function startCamera() {
    try {
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                width: { ideal: 640 },
                height: { ideal: 480 }
            },
            audio: false
        });

        video.srcObject = stream;
        video.muted = true;
        
        await new Promise(resolve => {
            video.onloadedmetadata = () => resolve();
            setTimeout(resolve, 1500);
        });

        await video.play();
        
        statusText.textContent = '●';
        statusText.style.color = '#00ff41';
        document.getElementById('btnStart').classList.remove('active');

        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;

        if (!running) {
            running = true;
            detectLoop();
        }
    } catch(e) {
        alert('Error: ' + e.message);
        statusText.textContent = '✕';
        statusText.style.color = '#ff2d55';
    }
}

function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;
    running = false;
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    objCount.textContent = '0';
    targets = [];
    statusText.textContent = '⬤';
    statusText.style.color = '#ff4444';
    document.getElementById('btnStart').classList.add('active');
}

function resetTracker() {
    targets = [];
    objCount.textContent = '0';
}

// ============================================
// DETECTION LOOP
// ============================================
async function detectLoop() {
    if (!running) return;
    await detect();
    animationId = requestAnimationFrame(detectLoop);
}

function detect() {
    if (!video.srcObject || video.readyState < 2) return;

    try {
        frameCount++;
        const now = Date.now();
        if (now - lastFpsTime > 1000) {
            fps = frameCount;
            frameCount = 0;
            lastFpsTime = now;
            fpsCount.textContent = fps;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        // ============================================
        // SIMULASI 3 TARGET ESP
        // ============================================
        const w = canvas.width;
        const h = canvas.height;
        const time = Date.now() / 1000;

        // Target 1 - bergerak pelan
        const t1x = 100 + Math.sin(time * 0.5) * 60;
        const t1y = 120 + Math.cos(time * 0.7) * 50;
        const t1w = 80 + Math.sin(time * 0.3) * 10;
        const t1h = 100 + Math.cos(time * 0.4) * 10;

        // Target 2 - bergerak di sisi lain
        const t2x = w - 180 + Math.sin(time * 0.6 + 2) * 50;
        const t2y = 150 + Math.cos(time * 0.5 + 1) * 60;
        const t2w = 70 + Math.sin(time * 0.4 + 1) * 8;
        const t2h = 90 + Math.cos(time * 0.3 + 2) * 8;

        // Target 3 - kecil (jarak jauh)
        const t3x = w/2 - 30 + Math.sin(time * 0.8 + 3) * 100;
        const t3y = 80 + Math.cos(time * 0.6 + 4) * 40;
        const t3w = 40 + Math.sin(time * 0.5 + 3) * 6;
        const t3h = 50 + Math.cos(time * 0.4 + 4) * 6;

        const simulatedTargets = [
            {id:1, x:t1x, y:t1y, w:t1w, h:t1h},
            {id:2, x:t2x, y:t2y, w:t2w, h:t2h},
            {id:3, x:t3x, y:t3y, w:t3w, h:t3h}
        ];

        targets = simulatedTargets;
        objCount.textContent = targets.length;

        const COLORS = ['#ff2d55','#00d4ff','#ffd700'];

        targets.forEach((t, idx) => {
            const color = COLORS[idx % COLORS.length];
            const x = t.x;
            const y = t.y;
            const w = t.w;
            const h = t.h;

            // Tali/garis ESP
            ctx.strokeStyle = color;
            ctx.globalAlpha = 0.25;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 8]);
            
            ctx.beginPath();
            ctx.moveTo(x + w/2, y);
            ctx.lineTo(x + w/2, 0);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x + w/2, y + h);
            ctx.lineTo(x + w/2, canvas.height);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x, y + h/2);
            ctx.lineTo(0, y + h/2);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x + w, y + h/2);
            ctx.lineTo(canvas.width, y + h/2);
            ctx.stroke();
            
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;

            // Bounding Box
            ctx.shadowColor = color;
            ctx.shadowBlur = 25;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.strokeRect(x, y, w, h);
            ctx.shadowBlur = 0;

            // Center cross
            ctx.strokeStyle = color;
            ctx.globalAlpha = 0.5;
            ctx.lineWidth = 1;
            const cx = x + w/2;
            const cy = y + h/2;
            const size = 10;
            ctx.beginPath();
            ctx.moveTo(cx - size, cy);
            ctx.lineTo(cx + size, cy);
            ctx.moveTo(cx, cy - size);
            ctx.lineTo(cx, cy + size);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Jarak
            const dist = Math.round(50 - (w * h) / 2000);
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.6;
            ctx.font = '10px Courier New';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'top';
            ctx.fillText(Math.max(3, dist) + 'm', x + w - 6, y + 6);
            ctx.globalAlpha = 1;

            // Label ID
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.4;
            ctx.font = '9px Courier New';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom';
            ctx.fillText('#' + t.id, x + 6, y + h + 16);
            ctx.globalAlpha = 1;
        });

        // Info
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.font = '10px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('SIMULASI ESP • ' + targets.length + ' target', canvas.width/2, canvas.height - 10);

    } catch(e) {}
}

// ============================================
// INIT
// ============================================
setTimeout(() => {
    startCamera();
}, 500);
</script>
</body>
</html>
